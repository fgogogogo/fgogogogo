<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月度消费统计</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .charts-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .chart-card {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .chart-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .chart-title {
            text-align: center;
            font-size: 18px;
            color: #5a6c7d;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .chart-container {
            position: relative;
            height: 350px;
        }

        .summary {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .summary-item {
            text-align: center;
        }

        .summary-value {
            font-size: 36px;
            font-weight: 300;
            color: #3498db;
        }

        .summary-label {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 2024年3月 消费统计</h1>

        <div class="summary">
            <div class="summary-item">
                <div class="summary-value">¥8,456</div>
                <div class="summary-label">本月总支出</div>
            </div>
            <div class="summary-item">
                <div class="summary-value">¥273</div>
                <div class="summary-label">日均消费</div>
            </div>
            <div class="summary-item">
                <div class="summary-value">12</div>
                <div class="summary-label">消费品类</div>
            </div>
        </div>

        <div class="charts-wrapper">
            <div class="chart-card">
                <div class="chart-title">每日消费趋势</div>
                <div class="chart-container">
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">消费品类占比</div>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 生成3月份的模拟数据
        const daysInMonth = 31;
        const dailyLabels = Array.from({length: daysInMonth}, (_, i) => `${i + 1}日`);
        const dailyData = [
            120, 85, 320, 150, 200, 450, 180,
            95, 280, 160, 220, 380, 140, 190,
            310, 175, 130, 290, 210, 165, 340,
            110, 245, 185, 270, 155, 400, 230,
            145, 295, 180
        ];

        // 简约配色方案
        const primaryColor = '#3498db';
        const primaryColorLight = 'rgba(52, 152, 219, 0.1)';
        const primaryColorHover = '#2980b9';

        // 品类数据
        const categoryLabels = ['餐饮', '交通', '购物', '娱乐', '住房', '医疗', '教育', '其他'];
        const categoryData = [2850, 980, 2100, 650, 1200, 320, 856, 500];
        const categoryColors = [
            '#3498db', // 蓝
            '#2ecc71', // 绿
            '#e74c3c', // 红
            '#f39c12', // 橙
            '#9b59b6', // 紫
            '#1abc9c', // 青
            '#34495e', // 深蓝灰
            '#95a5a6'  // 灰
        ];
        const categoryColorsHover = [
            '#2980b9',
            '#27ae60',
            '#c0392b',
            '#e67e22',
            '#8e44ad',
            '#16a085',
            '#2c3e50',
            '#7f8c8d'
        ];

        // 每日消费折线图
        const dailyCtx = document.getElementById('dailyChart').getContext('2d');
        new Chart(dailyCtx, {
            type: 'line',
            data: {
                labels: dailyLabels,
                datasets: [{
                    label: '消费金额 (¥)',
                    data: dailyData,
                    borderColor: primaryColor,
                    backgroundColor: primaryColorLight,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointHoverRadius: 6,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: primaryColor,
                    pointBorderWidth: 2,
                    pointHoverBackgroundColor: primaryColorHover,
                    pointHoverBorderColor: primaryColorHover,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        titleColor: '#2c3e50',
                        bodyColor: '#2c3e50',
                        borderColor: 'rgba(0, 0, 0, 0.05)',
                        borderWidth: 1,
                        padding: 12,
                        displayColors: false,
                        callbacks: {
                            label: function(context) {
                                return `消费: ¥${context.parsed.y}`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            color: '#95a5a6',
                            font: {
                                size: 11
                            },
                            maxTicksLimit: 15
                        }
                    },
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: 'rgba(0, 0, 0, 0.03)',
                            drawBorder: false
                        },
                        ticks: {
                            color: '#95a5a6',
                            font: {
                                size: 11
                            },
                            callback: function(value) {
                                return '¥' + value;
                            }
                        }
                    }
                }
            }
        });

        // 品类占比柱状图
        const categoryCtx = document.getElementById('categoryChart').getContext('2d');
        new Chart(categoryCtx, {
            type: 'bar',
            data: {
                labels: categoryLabels,
                datasets: [{
                    label: '消费金额 (¥)',
                    data: categoryData,
                    backgroundColor: categoryColors,
                    hoverBackgroundColor: categoryColorsHover,
                    borderRadius: 6,
                    borderSkipped: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        titleColor: '#2c3e50',
                        bodyColor: '#2c3e50',
                        borderColor: 'rgba(0, 0, 0, 0.05)',
                        borderWidth: 1,
                        padding: 12,
                        displayColors: false,
                        callbacks: {
                            label: function(context) {
                                const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                const percentage = ((context.parsed.y / total) * 100).toFixed(1);
                                return `消费: ¥${context.parsed.y} (${percentage}%)`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            color: '#5a6c7d',
                            font: {
                                size: 12
                            }
                        }
                    },
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: 'rgba(0, 0, 0, 0.03)',
                            drawBorder: false
                        },
                        ticks: {
                            color: '#95a5a6',
                            font: {
                                size: 11
                            },
                            callback: function(value) {
                                return '¥' + value;
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
