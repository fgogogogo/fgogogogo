<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子鱼缸</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: sans-serif;
  }
  .container {
    position: relative;
    cursor: crosshair;
  }
  svg {
    filter: drop-shadow(0 20px 60px rgba(0,0,0,0.5));
    border-radius: 20px;
  }
  h1 {
    text-align: center;
    color: #88ccff;
    margin-bottom: 16px;
    font-size: 28px;
    text-shadow: 0 2px 10px rgba(100,180,255,0.5);
    letter-spacing: 6px;
  }
  .hint {
    text-align: center;
    color: rgba(136,204,255,0.5);
    margin-top: 12px;
    font-size: 14px;
    letter-spacing: 2px;
  }
  @keyframes tailWag1 {
    0%, 100% { transform: rotate(-10deg) skewY(-2deg); }
    50% { transform: rotate(10deg) skewY(2deg); }
  }
  @keyframes tailWag2 {
    0%, 100% { transform: rotate(12deg) skewY(3deg); }
    50% { transform: rotate(-12deg) skewY(-3deg); }
  }
  @keyframes bubbleRise {
    0% { opacity: 0.7; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-180px) scale(0.3); }
  }
  .bubble {
    animation: bubbleRise 4s ease-in infinite;
  }
  .sand-ripple {
    animation: shimmer 3s ease-in-out infinite alternate;
  }
  @keyframes shimmer {
    0% { opacity: 0.15; }
    100% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div>
  <h1>🐠 电子鱼缸 🐠</h1>
  <div class="container" id="tank"></div>
  <div class="hint">点击鱼缸投喂饲料</div>
</div>

<script>
const W = 900, H = 600;
const TANK_PAD = 40;
const WATER_TOP = 70;
const id = (tag) => document.getElementById(tag);

function createSVG() {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.id = 'fishTank';
  return svg;
}

function createDefs(svg) {
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

  // Water gradient
  const waterGrad = addGradient(defs, 'waterGrad', [
    { offset: '0%', color: '#4fc3f7', opacity: 0.35 },
    { offset: '40%', color: '#0288d1', opacity: 0.5 },
    { offset: '100%', color: '#01579b', opacity: 0.7 }
  ], '0%', '0%', '0%', '100%');

  // Sand gradient
  addGradient(defs, 'sandGrad', [
    { offset: '0%', color: '#d4a76a' },
    { offset: '50%', color: '#c4944f' },
    { offset: '100%', color: '#a67c3d' }
  ], '0%', '0%', '0%', '100%');

  // Fish body gradient (large)
  addRadialGradient(defs, 'fishBody1', [
    { offset: '0%', color: '#ffd54f' },
    { offset: '40%', color: '#ffb300' },
    { offset: '75%', color: '#ff8f00' },
    { offset: '100%', color: '#e65100' }
  ]);

  // Fish body gradient (small)
  addRadialGradient(defs, 'fishBody2', [
    { offset: '0%', color: '#ffe082' },
    { offset: '40%', color: '#ffca28' },
    { offset: '75%', color: '#ffa000' },
    { offset: '100%', color: '#ef6c00' }
  ]);

  // Glass reflection
  addGradient(defs, 'glassReflect', [
    { offset: '0%', color: '#ffffff', opacity: 0.12 },
    { offset: '30%', color: '#ffffff', opacity: 0.04 },
    { offset: '70%', color: '#ffffff', opacity: 0.0 },
    { offset: '100%', color: '#ffffff', opacity: 0.06 }
  ], '0%', '0%', '100%', '100%');

  // Plant gradient
  addGradient(defs, 'plantGrad', [
    { offset: '0%', color: '#66bb6a' },
    { offset: '100%', color: '#2e7d32' }
  ], '0%', '0%', '0%', '100%');

  // Stone gradient
  addRadialGradient(defs, 'stoneGrad', [
    { offset: '0%', color: '#a1887f' },
    { offset: '70%', color: '#795548' },
    { offset: '100%', color: '#5d4037' }
  ]);

  // Glass edge gradient
  addGradient(defs, 'glassEdge', [
    { offset: '0%', color: 'rgba(255,255,255,0.3)' },
    { offset: '100%', color: 'rgba(255,255,255,0.05)' }
  ], '0%', '0%', '100%', '0%');

  // Filter for glow
  const filter = el(defs, 'filter', { id: 'glow' });
  el(filter, 'feGaussianBlur', { stdDeviation: '3', result: 'blur' });
  const merge = el(filter, 'feMerge');
  el(merge, 'feMergeNode', { in: 'blur' });
  el(merge, 'feMergeNode', { in: 'SourceGraphic' });

  svg.appendChild(defs);
}

function addGradient(parent, id, stops, x1, y1, x2, y2) {
  const g = el(parent, 'linearGradient', { id, x1, y1, x2, y2 });
  stops.forEach(s => {
    const st = el(g, 'stop', { offset: s.offset, 'stop-color': s.color });
    if (s.opacity !== undefined) st.setAttribute('stop-opacity', s.opacity);
  });
  return g;
}

function addRadialGradient(parent, id, stops) {
  const g = el(parent, 'radialGradient', { id, cx: '35%', cy: '40%', r: '65%', fx: '25%', fy: '30%' });
  stops.forEach(s => {
    const st = el(g, 'stop', { offset: s.offset, 'stop-color': s.color });
    if (s.opacity !== undefined) st.setAttribute('stop-opacity', s.opacity);
  });
  return g;
}

function el(parent, tag, attrs = {}) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

function drawTank(svg) {
  const tankGroup = el(svg, 'g', { id: 'tankBg' });

  // Tank outline - rounded rectangle
  el(tankGroup, 'rect', {
    x: TANK_PAD, y: TANK_PAD,
    width: W - TANK_PAD * 2, height: H - TANK_PAD * 2,
    rx: 16, ry: 16,
    fill: '#0d1b2a', stroke: 'rgba(255,255,255,0.3)', 'stroke-width': 3
  });

  // Water
  el(tankGroup, 'rect', {
    x: TANK_PAD + 2, y: TANK_PAD + 2,
    width: W - TANK_PAD * 2 - 4, height: H - TANK_PAD * 2 - 4,
    rx: 14, ry: 14,
    fill: 'url(#waterGrad)'
  });

  // Sand bottom
  const sandPath = `M ${TANK_PAD + 2} ${H - TANK_PAD - 100}
    Q 150 ${H - TANK_PAD - 120} 250 ${H - TANK_PAD - 90}
    Q 380 ${H - TANK_PAD - 60} 450 ${H - TANK_PAD - 95}
    Q 550 ${H - TANK_PAD - 115} 650 ${H - TANK_PAD - 85}
    Q 750 ${H - TANK_PAD - 60} 820 ${H - TANK_PAD - 90}
    L ${W - TANK_PAD - 2} ${H - TANK_PAD - 2}
    L ${TANK_PAD + 2} ${H - TANK_PAD - 2} Z`;
  el(tankGroup, 'path', { d: sandPath, fill: 'url(#sandGrad)', opacity: 0.9 });

  // Sand ripple/shimmer overlay
  el(tankGroup, 'rect', {
    x: TANK_PAD + 2, y: H - TANK_PAD - 80,
    width: W - TANK_PAD * 2 - 4, height: 78,
    rx: 0, ry: 0,
    fill: 'rgba(255,255,255,0.1)', class: 'sand-ripple'
  });
}

function drawStones(svg) {
  const stonesGroup = el(svg, 'g', { id: 'stones' });
  const stoneData = [
    { cx: 200, cy: H - TANK_PAD - 78, rx: 22, ry: 14 },
    { cx: 260, cy: H - TANK_PAD - 72, rx: 16, ry: 10 },
    { cx: 500, cy: H - TANK_PAD - 82, rx: 25, ry: 16 },
    { cx: 560, cy: H - TANK_PAD - 70, rx: 13, ry: 9 },
    { cx: 700, cy: H - TANK_PAD - 76, rx: 20, ry: 13 },
    { cx: 340, cy: H - TANK_PAD - 68, rx: 12, ry: 8 },
    { cx: 450, cy: H - TANK_PAD - 86, rx: 18, ry: 11 },
  ];
  stoneData.forEach(s => {
    el(stonesGroup, 'ellipse', {
      cx: s.cx, cy: s.cy, rx: s.rx, ry: s.ry,
      fill: 'url(#stoneGrad)', stroke: 'rgba(0,0,0,0.2)', 'stroke-width': 1
    });
    // Highlight
    el(stonesGroup, 'ellipse', {
      cx: s.cx - s.rx * 0.25, cy: s.cy - s.ry * 0.3,
      rx: s.rx * 0.35, ry: s.ry * 0.3,
      fill: 'rgba(255,255,255,0.15)'
    });
  });
}

function createPlant(svg, baseX, baseY, height, lean) {
  const g = el(svg, 'g');

  function drawLeaf(bx, by, h, w, angle) {
    const path = `M ${bx} ${by}
      Q ${bx + w * 0.5} ${by - h * 0.4} ${bx + w * 0.8} ${by - h}
      Q ${bx} ${by - h * 0.7} ${bx - w * 0.3} ${by - h * 0.3} Z`;
    return path;
  }

  // 3-5 leaves per plant
  for (let i = 0; i < 4; i++) {
    const offsetX = (i - 1.5) * 8 + lean * 10;
    const leafH = height * (0.7 + Math.random() * 0.3);
    const leafW = 15 + Math.random() * 10;
    const angle = lean * 5 + (i - 1.5) * 8;
    const path = drawLeaf(baseX + offsetX, baseY, leafH, leafW, angle);

    const colors = ['#43a047', '#388e3c', '#2e7d32', '#4caf50', '#66bb6a'];
    el(g, 'path', {
      d: path,
      fill: colors[i % colors.length],
      opacity: 0.85,
      transform: `rotate(${angle}, ${baseX + offsetX}, ${baseY})`
    });
  }

  return g;
}

function drawPlants(svg) {
  const plantsGroup = el(svg, 'g', { id: 'plants' });
  const sandY = H - TANK_PAD - 90;

  const plantPositions = [
    { x: 130, y: sandY, h: 120, lean: -15 },
    { x: 160, y: sandY + 5, h: 100, lean: -8 },
    { x: 350, y: sandY + 10, h: 90, lean: 10 },
    { x: 600, y: sandY - 5, h: 110, lean: -12 },
    { x: 640, y: sandY + 5, h: 95, lean: 5 },
    { x: 780, y: sandY + 10, h: 85, lean: 15 },
  ];

  plantPositions.forEach(p => {
    const plant = createPlant(plantsGroup, p.x, p.y, p.h, p.lean);
    plantsGroup.appendChild(plant);
  });
}

function drawBubbles(svg) {
  const bubblesGroup = el(svg, 'g', { id: 'bubbles' });
  for (let i = 0; i < 6; i++) {
    const cx = 100 + Math.random() * (W - 200);
    const cy = H - TANK_PAD - 100 + Math.random() * 40;
    const r = 2 + Math.random() * 5;
    const bubble = el(bubblesGroup, 'circle', {
      cx, cy, r,
      fill: 'rgba(255,255,255,0.2)',
      stroke: 'rgba(255,255,255,0.3)',
      'stroke-width': 0.5
    });
    bubble.style.animation = `bubbleRise ${3 + Math.random() * 4}s ease-in ${Math.random() * 5}s infinite`;
  }
}

function drawGlassReflection(svg) {
  // Left reflection stripe
  el(svg, 'rect', {
    x: TANK_PAD + 4, y: TANK_PAD + 4,
    width: 80, height: H - TANK_PAD * 2 - 8,
    rx: 12,
    fill: 'url(#glassReflect)',
    'pointer-events': 'none'
  });

  // Top reflection
  el(svg, 'rect', {
    x: TANK_PAD + 4, y: TANK_PAD + 4,
    width: W - TANK_PAD * 2 - 8, height: 40,
    rx: 12,
    fill: 'rgba(255,255,255,0.06)',
    'pointer-events': 'none'
  });

  // Diagonal highlight
  el(svg, 'line', {
    x1: TANK_PAD + 15, y1: TANK_PAD + 15,
    x2: TANK_PAD + 150, y2: TANK_PAD + 15,
    stroke: 'rgba(255,255,255,0.15)', 'stroke-width': 2,
    'stroke-linecap': 'round', 'pointer-events': 'none'
  });

  // Glass border highlights
  el(svg, 'rect', {
    x: TANK_PAD, y: TANK_PAD,
    width: W - TANK_PAD * 2, height: H - TANK_PAD * 2,
    rx: 16, ry: 16,
    fill: 'none', stroke: 'url(#glassEdge)', 'stroke-width': 2,
    'pointer-events': 'none'
  });
}

// ---- FISH ----
class Fish {
  constructor(svg, size, startX, startY, bodyGradId) {
    this.size = size; // multiplier
    this.x = startX;
    this.y = startY;
    this.targetX = startX;
    this.targetY = startY;
    this.speed = size > 1 ? 1.2 : 1.8;
    this.bodyGradId = bodyGradId;
    this.direction = Math.random() > 0.5 ? 1 : -1;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 0.5;
    this.wanderTimer = 0;
    this.chasingFood = null;
    this.tailWagSpeed = size > 1 ? 0.4 : 0.55;

    this.group = el(svg, 'g', { id: size > 1 ? 'fish1' : 'fish2' });
    this.buildFish();
    this.update();
  }

  buildFish() {
    const s = this.size;

    // Shadow under fish
    el(this.group, 'ellipse', {
      cx: 0, cy: 5 * s, rx: 35 * s, ry: 6 * s,
      fill: 'rgba(0,0,0,0.1)'
    });

    // Tail fin
    this.tailGroup = el(this.group, 'g', {});
    const tailPath = `M ${-30 * s} 0
      Q ${-50 * s} ${-20 * s} ${-55 * s} ${-25 * s}
      Q ${-40 * s} ${-5 * s} ${-35 * s} 0
      Q ${-40 * s} ${5 * s} ${-55 * s} ${25 * s}
      Q ${-50 * s} ${20 * s} ${-30 * s} 0 Z`;
    el(this.tailGroup, 'path', {
      d: tailPath, fill: '#ef6c00', opacity: 0.85
    });

    // Body
    el(this.group, 'ellipse', {
      cx: 0, cy: 0, rx: 35 * s, ry: 18 * s,
      fill: `url(#${this.bodyGradId})`,
      stroke: '#e65100', 'stroke-width': 0.8 * s
    });

    // Body scales pattern
    for (let row = -1; row <= 1; row++) {
      for (let col = -2; col <= 1; col++) {
        const sx = col * 12 * s;
        const sy = row * 8 * s;
        el(this.group, 'path', {
          d: `M ${sx} ${sy - 3 * s} A ${5 * s} ${4 * s} 0 0 1 ${sx + 6 * s} ${sy + 2 * s}`,
          fill: 'none', stroke: 'rgba(230,81,0,0.2)', 'stroke-width': 0.5
        });
      }
    }

    // Dorsal fin (top)
    el(this.group, 'path', {
      d: `M ${-10 * s} ${-17 * s}
        Q ${-5 * s} ${-32 * s} ${8 * s} ${-30 * s}
        Q ${12 * s} ${-28 * s} ${15 * s} ${-17 * s} Z`,
      fill: '#ef6c00', opacity: 0.75
    });

    // Pectoral fin (bottom)
    el(this.group, 'path', {
      d: `M ${-5 * s} ${12 * s}
        Q ${-10 * s} ${28 * s} ${5 * s} ${26 * s}
        Q ${10 * s} ${22 * s} ${8 * s} ${14 * s} Z`,
      fill: '#ff8f00', opacity: 0.6
    });

    // Belly highlight
    el(this.group, 'ellipse', {
      cx: 3 * s, cy: 8 * s, rx: 20 * s, ry: 7 * s,
      fill: 'rgba(255,255,200,0.2)'
    });

    // Eye white
    el(this.group, 'circle', {
      cx: 22 * s, cy: -4 * s, r: 6 * s,
      fill: '#ffffff'
    });
    // Eye pupil
    el(this.group, 'circle', {
      cx: 23.5 * s, cy: -4 * s, r: 3.5 * s,
      fill: '#1a1a1a'
    });
    // Eye highlight
    el(this.group, 'circle', {
      cx: 24.5 * s, cy: -5.5 * s, r: 1.5 * s,
      fill: '#ffffff'
    });

    // Mouth
    el(this.group, 'path', {
      d: `M ${33 * s} ${2 * s} Q ${36 * s} ${1 * s} ${34 * s} ${4 * s}`,
      fill: 'none', stroke: '#bf360c', 'stroke-width': 1.2 * s
    });

    // Whiskers (barbels) - koi characteristic
    el(this.group, 'path', {
      d: `M ${34 * s} ${3 * s} Q ${42 * s} ${0 * s} ${45 * s} ${2 * s}`,
      fill: 'none', stroke: '#bf360c', 'stroke-width': 0.8 * s
    });
    el(this.group, 'path', {
      d: `M ${34 * s} ${5 * s} Q ${42 * s} ${8 * s} ${44 * s} ${7 * s}`,
      fill: 'none', stroke: '#bf360c', 'stroke-width': 0.8 * s
    });
  }

  update() {
    const scaleX = this.direction;
    this.group.setAttribute('transform',
      `translate(${this.x}, ${this.y}) scale(${scaleX}, 1)`
    );
  }

  updateTail(time) {
    const angle = Math.sin(time * this.tailWagSpeed) * 15;
    this.tailGroup.setAttribute('transform',
      `translate(${-30 * this.size}, 0) rotate(${angle}) translate(${30 * this.size}, 0)`
    );
  }

  wander(bounds) {
    this.wanderTimer--;
    if (this.wanderTimer <= 0) {
      this.vx += (Math.random() - 0.5) * 1.5;
      this.vy += (Math.random() - 0.5) * 0.8;
      this.wanderTimer = 30 + Math.random() * 60;
    }

    // Damping
    this.vx *= 0.98;
    this.vy *= 0.98;

    // Clamp speed
    const maxSpeed = this.speed * 2;
    this.vx = Math.max(-maxSpeed, Math.min(maxSpeed, this.vx));
    this.vy = Math.max(-maxSpeed * 0.6, Math.min(maxSpeed * 0.6, this.vy));

    this.x += this.vx;
    this.y += this.vy;

    // Boundary
    const margin = 50;
    if (this.x < bounds.left + margin) { this.x = bounds.left + margin; this.vx = Math.abs(this.vx) + 0.5; }
    if (this.x > bounds.right - margin) { this.x = bounds.right - margin; this.vx = -Math.abs(this.vx) - 0.5; }
    if (this.y < bounds.top + margin) { this.y = bounds.top + margin; this.vy = Math.abs(this.vy) + 0.3; }
    if (this.y > bounds.bottom - margin * 1.5) { this.y = bounds.bottom - margin * 1.5; this.vy = -Math.abs(this.vy) - 0.3; }

    // Random direction nudge
    if (Math.abs(this.vx) > 0.3) {
      this.direction = this.vx > 0 ? 1 : -1;
    }
  }

  chase(food, bounds) {
    if (!food || food.eaten) {
      this.chasingFood = null;
      return;
    }

    const dx = food.x - this.x;
    const dy = food.y - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 15 * this.size) {
      // Eat!
      food.eaten = true;
      food.element.remove();
      this.chasingFood = null;
      // Small burst of speed away after eating
      this.vx = (Math.random() - 0.5) * 3;
      this.vy = -Math.random() * 2;
      return;
    }

    // Accelerate toward food
    const acc = this.speed * 2.5 / Math.max(dist, 1);
    this.vx += dx * acc;
    this.vy += dy * acc;

    // Clamp
    const maxChaseSpeed = this.speed * 4;
    const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (currentSpeed > maxChaseSpeed) {
      this.vx = (this.vx / currentSpeed) * maxChaseSpeed;
      this.vy = (this.vy / currentSpeed) * maxChaseSpeed;
    }

    this.x += this.vx;
    this.y += this.vy;

    // Still respect boundaries loosely
    if (this.x < bounds.left + 30) this.vx += 0.5;
    if (this.x > bounds.right - 30) this.vx -= 0.5;
    if (this.y < bounds.top + 30) this.vy += 0.5;
    if (this.y > bounds.bottom - 30) this.vy -= 0.5;

    if (Math.abs(dx) > 3) {
      this.direction = dx > 0 ? 1 : -1;
    }
  }
}

// ---- FOOD ----
class Food {
  constructor(svg, x, y) {
    this.x = x;
    this.y = y;
    this.eaten = false;
    this.sinkSpeed = 0.3 + Math.random() * 0.2;
    this.bottomY = H - TANK_PAD - 100 + Math.random() * 15;
    this.settled = false;

    this.group = el(svg, 'g', {});

    // Multiple pellets
    const count = 3 + Math.floor(Math.random() * 4);
    for (let i = 0; i < count; i++) {
      const px = (Math.random() - 0.5) * 16;
      const py = (Math.random() - 0.5) * 16;
      const r = 2 + Math.random() * 1.5;
      el(this.group, 'circle', {
        cx: px, cy: py, r,
        fill: '#8d6e63', stroke: '#5d4037', 'stroke-width': 0.5
      });
      el(this.group, 'circle', {
        cx: px - r * 0.2, cy: py - r * 0.2, r: r * 0.35,
        fill: 'rgba(255,255,255,0.2)'
      });
    }

    this.group.setAttribute('transform', `translate(${this.x}, ${this.y})`);

    // Splash effect
    const splash = el(svg, 'g', {});
    for (let i = 0; i < 5; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 8 + Math.random() * 12;
      const drop = el(splash, 'circle', {
        cx: x + Math.cos(angle) * dist,
        cy: y + Math.sin(angle) * dist * 0.5,
        r: 1 + Math.random() * 1.5,
        fill: 'rgba(255,255,255,0.5)'
      });
      drop.style.transition = 'all 0.5s ease-out';
      setTimeout(() => {
        drop.setAttribute('cx', x + Math.cos(angle) * dist * 2);
        drop.setAttribute('cy', y + Math.sin(angle) * dist);
        drop.setAttribute('r', '0');
        drop.setAttribute('opacity', '0');
      }, 50);
    }
    setTimeout(() => splash.remove(), 600);

    this.element = this.group;
  }

  update() {
    if (this.eaten) return;
    if (!this.settled) {
      this.y += this.sinkSpeed;
      // Gentle sway while sinking
      this.x += Math.sin(Date.now() * 0.003 + this.x) * 0.15;
      if (this.y >= this.bottomY) {
        this.y = this.bottomY;
        this.settled = true;
      }
      this.group.setAttribute('transform', `translate(${this.x}, ${this.y})`);
    }
  }
}

// ---- INIT ----
const svg = createSVG();
document.getElementById('tank').appendChild(svg);

createDefs(svg);
drawTank(svg);
drawStones(svg);
drawPlants(svg);
drawBubbles(svg);

// Food layer
const foodLayer = el(svg, 'g', { id: 'foodLayer' });

// Fish go above food
const fishLayer = el(svg, 'g', { id: 'fishLayer' });

// Glass reflection on top
drawGlassReflection(svg);

const bounds = { left: TANK_PAD, top: WATER_TOP, right: W - TANK_PAD, bottom: H - TANK_PAD - 60 };

const fish1 = new Fish(fishLayer, 1.2, 350, 280, 'fishBody1');
const fish2 = new Fish(fishLayer, 0.8, 600, 220, 'fishBody2');
const fishes = [fish1, fish2];
const foods = [];

// Click handler - drop food
svg.addEventListener('click', (e) => {
  const rect = svg.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  // Only drop inside tank
  if (mx > TANK_PAD + 20 && mx < W - TANK_PAD - 20 &&
      my > TANK_PAD + 20 && my < H - TANK_PAD - 60) {
    const food = new Food(foodLayer, mx, my);
    foods.push(food);

    // Assign fish to chase this food
    fishes.forEach(f => {
      if (!f.chasingFood || f.chasingFood.eaten) {
        f.chasingFood = food;
      }
    });
  }
});

// ---- GAME LOOP ----
let frameCount = 0;
function gameLoop() {
  frameCount++;
  const time = frameCount;

  // Update fish
  fishes.forEach(f => {
    if (f.chasingFood && !f.chasingFood.eaten) {
      f.chase(f.chasingFood, bounds);
    } else {
      // Look for any uneaten food
      const available = foods.find(food => !food.eaten);
      if (available) {
        f.chasingFood = available;
      } else {
        f.chasingFood = null;
        f.wander(bounds);
      }
    }
    f.update();
    f.updateTail(time);
  });

  // Update food
  foods.forEach(f => f.update());

  // Cleanup eaten food from array periodically
  if (frameCount % 120 === 0) {
    for (let i = foods.length - 1; i >= 0; i--) {
      if (foods[i].eaten) foods.splice(i, 1);
    }
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
