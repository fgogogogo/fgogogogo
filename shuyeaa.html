<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风吹树叶 · Wind & Leaves</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(180deg,
      #87CEEB 0%,
      #B0E0E6 30%,
      #98D8C8 60%,
      #556B2F 85%,
      #3D5C35 100%
    );
    display: flex;
    justify-content: center;
    align-items: flex-end;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  /* ===== 场景层 ===== */
  .scene {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* ===== 风力指示器 ===== */
  .wind-indicator {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    z-index: 100;
    background: rgba(0,0,0,0.2);
    padding: 10px 16px;
    border-radius: 10px;
    backdrop-filter: blur(8px);
    line-height: 1.8;
  }
  .wind-indicator .value {
    font-weight: bold;
    color: #fff;
  }

  /* ===== 控制面板 ===== */
  .controls {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    background: rgba(0,0,0,0.3);
    padding: 12px 18px;
    border-radius: 12px;
    backdrop-filter: blur(8px);
    color: #fff;
    font-size: 13px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .controls label {
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .controls input[type="range"] {
    width: 100px;
    accent-color: #7CB342;
  }
  .controls .btn {
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.3s;
  }
  .controls .btn:hover {
    background: rgba(255,255,255,0.25);
  }

  /* ===== 树 ===== */
  .tree-container {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 90vh;
  }

  /* 树干 */
  .trunk {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 180px;
    background: linear-gradient(90deg, #5D4037, #795548, #5D4037);
    border-radius: 4px 4px 0 0;
    z-index: 2;
  }

  /* ===== 枝条 ===== */
  .branch {
    position: absolute;
    bottom: 180px;
    left: 50%;
    transform-origin: bottom center;
    z-index: 1;
  }

  .branch-stem {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(90deg, #5D4037, #795548, #5D4037);
    border-radius: 3px;
    transform-origin: bottom center;
  }

  /* 枝条摇摆动画 - 通过 JS 动态设置 */
  .branch-stem {
    animation-name: sway;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
    animation-direction: alternate;
  }

  /* ===== 叶子 ===== */
  .leaf {
    position: absolute;
    width: 24px;
    height: 16px;
    border-radius: 50% 0 50% 0;
    transform-origin: bottom center;
    will-change: transform;
    pointer-events: none;
  }

  /* 叶子基础摇摆 */
  .leaf {
    animation-name: leafSway;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
    animation-direction: alternate;
  }

  /* ===== 飘落的叶子 ===== */
  .falling-leaf {
    position: absolute;
    width: 14px;
    height: 10px;
    border-radius: 50% 0 50% 0;
    opacity: 0.9;
    pointer-events: none;
    z-index: 3;
    will-change: transform;
  }

  .falling-leaf::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 30%;
    width: 60%;
    height: 1px;
    background: rgba(0,0,0,0.15);
    transform: rotate(-30deg);
  }

  /* ===== 草地 ===== */
  .ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 80px;
    background: linear-gradient(180deg, #4A7C3E 0%, #3D6B35 100%);
    z-index: 0;
  }

  /* 草丛摇摆 */
  .grass-blade {
    position: absolute;
    bottom: 0;
    width: 4px;
    background: linear-gradient(to top, #4A7C3E, #7CB342);
    border-radius: 2px 2px 0 0;
    transform-origin: bottom center;
    animation: grassSway ease-in-out infinite alternate;
    will-change: transform;
  }

  /* ===== 风的视觉粒子 ===== */
  .wind-particle {
    position: absolute;
    height: 1px;
    background: rgba(255,255,255,0.3);
    border-radius: 1px;
    pointer-events: none;
    will-change: transform;
  }

  /* ===== Keyframes ===== */
  @keyframes sway {
    0% { transform: translateX(-50%) rotate(var(--sway-neg, -3deg)); }
    100% { transform: translateX(-50%) rotate(var(--sway-pos, 3deg)); }
  }

  @keyframes leafSway {
    0% {
      transform: rotate(var(--leaf-neg, -15deg)) translateX(var(--leaf-x-neg, 0px));
    }
    100% {
      transform: rotate(var(--leaf-pos, 15deg)) translateX(var(--leaf-x-pos, 0px));
    }
  }

  @keyframes grassSway {
    0% { transform: rotate(var(--grass-neg, -8deg)); }
    100% { transform: rotate(var(--grass-pos, 8deg)); }
  }

  @keyframes leafFall {
    0% {
      opacity: 0.9;
      transform: translate(0, 0) rotate(0deg) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate(var(--fall-x, 200px), var(--fall-y, 300px)) rotate(var(--fall-rot, 360deg)) scale(0.5);
    }
  }
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="wind-indicator" id="windIndicator">
    风力: <span class="value" id="windLevel">微风</span><br>
    风速: <span class="value" id="windSpeed">2.3</span> m/s<br>
    方向: <span class="value" id="windDir">东风</span>
  </div>

  <div class="controls">
    <label>风力
      <input type="range" id="windControl" min="0" max="100" value="35">
    </label>
    <button class="btn" id="burstBtn">一阵风</button>
    <button class="btn" id="calmBtn">平静</button>
    <button class="btn" id="leafBtn">落叶</button>
  </div>

  <div class="tree-container" id="treeContainer">
    <div class="trunk"></div>
    <div id="branches"></div>
  </div>

  <div class="ground" id="ground"></div>
</div>

<script>
// ============================================================
// 风力系统核心
// ============================================================
const WindSystem = {
  baseWind: 0.35,          // 基础风力 0~1
  gustStrength: 0,          // 阵风强度
  gustDecay: 0.96,          // 阵风衰减
  turbulence: 0,            // 湍流
  time: 0,
  autoMode: true,           // 自动变化模式
  targetWind: 0.35,

  // 风向 (角度, 0=正右)
  windDirection: 0,

  update(dt) {
    this.time += dt;

    if (this.autoMode) {
      // 使用多层 Perlin-like 噪声模拟自然风力变化
      const n1 = Math.sin(this.time * 0.3) * 0.15;
      const n2 = Math.sin(this.time * 0.73 + 1.5) * 0.1;
      const n3 = Math.sin(this.time * 1.7 + 3.2) * 0.08;
      const n4 = Math.sin(this.time * 0.12) * 0.12;

      // 缓慢趋向目标
      this.targetWind += (Math.sin(this.time * 0.05) * 0.3 + 0.5 - this.targetWind) * 0.01;
      this.targetWind = Math.max(0.05, Math.min(1, this.targetWind));

      this.baseWind = this.targetWind + n1 + n2 + n3 + n4;
      this.baseWind = Math.max(0.02, Math.min(1, this.baseWind));
    }

    // 阵风衰减
    this.gustStrength *= this.gustDecay;
    if (this.gustStrength < 0.01) this.gustStrength = 0;

    // 湍流
    this.turbulence = Math.sin(this.time * 2.3) * Math.cos(this.time * 1.1) * 0.15;

    // 风向微摆
    this.windDirection = Math.sin(this.time * 0.08) * 15;
  },

  // 获取综合风力 (考虑阵风和湍流)
  getWind() {
    return Math.max(0, Math.min(1.5, this.baseWind + this.gustStrength + this.turbulence));
  },

  // 触发一阵风
  triggerGust(strength = 0.5) {
    this.gustStrength = strength;
  },

  // 平静
  calm() {
    this.baseWind = 0.08;
    this.gustStrength = 0;
    this.targetWind = 0.08;
  },

  setWind(level) {
    this.autoMode = false;
    this.targetWind = level;
    this.baseWind = level;
  },

  getWindLabel(wind) {
    if (wind < 0.15) return '无风';
    if (wind < 0.3) return '微风';
    if (wind < 0.5) return '和风';
    if (wind < 0.7) return '清风';
    if (wind < 0.9) return '强风';
    return '疾风';
  },

  getWindDirLabel(deg) {
    const dirs = ['东风', '东南风', '南风', '西南风', '西风', '西北风', '北风', '东北风'];
    const idx = Math.round(((deg + 180 + 22.5) % 360) / 45) % 8;
    return dirs[idx];
  }
};

// ============================================================
// 树与枝叶生成
// ============================================================
const branchesEl = document.getElementById('branches');
const leaves = [];      // 所有叶子引用
const branches = [];    // 所有枝条引用

// 叶子颜色调色板
const leafColors = [
  'linear-gradient(135deg, #7CB342, #558B2F)',
  'linear-gradient(135deg, #8BC34A, #689F38)',
  'linear-gradient(135deg, #9CCC65, #7CB342)',
  'linear-gradient(135deg, #AED581, #8BC34A)',
  'linear-gradient(135deg, #CDDC39, #9CCC65)',
  'linear-gradient(135deg, #FFB74D, #F57C00)',
  'linear-gradient(135deg, #FF8A65, #E64A19)',
];

function createTree() {
  // 定义枝条结构: [层级, 角度, 长度, 起始高度比例, 左右偏移, 子枝数量, 叶子数量]
  const branchData = [
    // 主干分支
    { level: 0, angle: -55, len: 140, heightRatio: 0.85, offsetX: 0, subCount: 3, leafCount: 12 },
    { level: 0, angle: 55,  len: 140, heightRatio: 0.85, offsetX: 0, subCount: 3, leafCount: 12 },
    { level: 0, angle: -65, len: 110, heightRatio: 0.72, offsetX: 0, subCount: 2, leafCount: 8 },
    { level: 0, angle: 65,  len: 110, heightRatio: 0.72, offsetX: 0, subCount: 2, leafCount: 8 },
    { level: 0, angle: -45, len: 90,  heightRatio: 0.58, offsetX: 0, subCount: 2, leafCount: 6 },
    { level: 0, angle: 45,  len: 90,  heightRatio: 0.58, offsetX: 0, subCount: 2, leafCount: 6 },
    { level: 0, angle: -30, len: 60,  heightRatio: 0.45, offsetX: 0, subCount: 1, leafCount: 4 },
    { level: 0, angle: 30,  len: 60,  heightRatio: 0.45, offsetX: 0, subCount: 1, leafCount: 4 },
  ];

  branchData.forEach((data, i) => {
    const branch = createBranch(data, i);
    branchesEl.appendChild(branch.el);
    branches.push(branch);

    // 创建子枝
    for (let s = 0; s < data.subCount; s++) {
      const subAngle = data.angle > 0
        ? data.angle - 15 - s * 20
        : data.angle + 15 + s * 20;
      const subData = {
        level: 1,
        angle: subAngle,
        len: data.len * (0.5 + Math.random() * 0.3),
        heightRatio: 0.7 + Math.random() * 0.3,
        offsetX: (Math.random() - 0.5) * 20,
        subCount: 0,
        leafCount: Math.floor(data.leafCount * 0.4 * Math.random()) + 2
      };
      const subBranch = createBranch(subData, i * 100 + s, branch.stemEl);
      branch.el.appendChild(subBranch.el);
      branches.push(subBranch);
    }
  });
}

function createBranch(data, id, parentEl) {
  const el = document.createElement('div');
  el.className = 'branch';
  el.style.cssText = `
    bottom: ${data.heightRatio * 180}px;
    transform: rotate(${data.angle}deg);
  `;

  const stemEl = document.createElement('div');
  stemEl.className = 'branch-stem';
  const stemWidth = 4 - data.level * 1.5;
  stemEl.style.cssText = `
    width: ${Math.max(2, stemWidth)}px;
    height: ${data.len}px;
  `;

  el.appendChild(stemEl);

  // 在枝条上创建叶子
  const branchLeaves = [];
  for (let l = 0; l < data.leafCount; l++) {
    const leaf = createLeaf(data, l);
    stemEl.appendChild(leaf.el);
    branchLeaves.push(leaf);
    leaves.push(leaf);
  }

  return { el, stemEl, data, id, leaves: branchLeaves };
}

function createLeaf(branchData, index) {
  const el = document.createElement('div');
  el.className = 'leaf';

  const colorIdx = Math.random() < 0.85
    ? Math.floor(Math.random() * 5)
    : 5 + Math.floor(Math.random() * 2); // 少量黄/红叶

  el.style.background = leafColors[colorIdx];
  el.style.boxShadow = `inset 1px 1px 2px rgba(255,255,255,0.2)`;

  // 叶子在枝条上的位置
  const posRatio = 0.15 + Math.random() * 0.7;
  const side = Math.random() > 0.5 ? 1 : -1;
  const offsetAngle = (Math.random() - 0.5) * 40;

  el.style.cssText += `
    bottom: ${posRatio * branchData.len}px;
    left: 50%;
    transform-origin: bottom center;
    transform: rotate(${offsetAngle}deg) translateX(${side * (8 + Math.random() * 8)}px);
  `;

  // 随机缩放
  const scale = 0.7 + Math.random() * 0.6;
  el.style.transform += ` scale(${scale})`;

  // 每片叶子的个性化参数
  const leaf = {
    el,
    baseAngle: offsetAngle,
    side,
    posRatio,
    phase: Math.random() * Math.PI * 2,
    phaseSpeed: 1.5 + Math.random() * 2,
    swayAmp: 8 + Math.random() * 20,
    tiltAmp: 2 + Math.random() * 6,
    lastWind: 0
  };

  return leaf;
}

// ============================================================
// 动画更新系统
// ============================================================
let lastTime = performance.now();
const scene = document.getElementById('scene');
const windIndicator = {
  level: document.getElementById('windLevel'),
  speed: document.getElementById('windSpeed'),
  dir: document.getElementById('windDir')
};

function updateAnimations(timestamp) {
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;

  WindSystem.update(dt);
  const wind = WindSystem.getWind();
  const dirRad = WindSystem.windDirection * Math.PI / 180;

  // 更新风力指示器
  windIndicator.level.textContent = WindSystem.getWindLabel(wind);
  windIndicator.speed.textContent = (wind * 8).toFixed(1);
  windIndicator.dir.textContent = WindSystem.getWindDirLabel(WindSystem.windDirection);

  // 更新所有枝条
  branches.forEach(branch => {
    const level = branch.data.level;
    // 越高的枝条受风力影响越大
    const levelFactor = 1 + level * 0.5;
    const swayDeg = wind * 12 * levelFactor;
    const swayNeg = -swayDeg - Math.sin(branch.id * 0.7 + WindSystem.time * 0.5) * 2;
    const swayPos = swayDeg + Math.cos(branch.id * 0.5 + WindSystem.time * 0.3) * 2;

    branch.stemEl.style.setProperty('--sway-neg', `${swayNeg}deg`);
    branch.stemEl.style.setProperty('--sway-pos', `${swayPos}deg`);
    branch.stemEl.style.animationDuration = `${1.5 + wind * 0.5}s`;
  });

  // 更新所有叶子
  leaves.forEach(leaf => {
    const time = WindSystem.time;
    const phase = leaf.phase + time * leaf.phaseSpeed;

    // 风力对叶子的直接影响
    const windEffect = wind * leaf.swayAmp;
    const turbulence = Math.sin(time * 3.7 + leaf.phase) * wind * 5;

    // 叶子摇摆 (绕自身轴旋转 + 平移)
    const leafRot = leaf.baseAngle + Math.sin(phase) * (3 + windEffect * 0.5) + windEffect * 0.3;
    const leafRot2 = leaf.baseAngle + Math.cos(phase * 0.7) * (3 + windEffect * 0.5) + turbulence;

    // 叶子随风方向的位移
    const xOffset = Math.sin(phase * 1.3) * leaf.tiltAmp + wind * 6 * Math.cos(dirRad);
    const xOffset2 = Math.cos(phase * 0.9) * leaf.tiltAmp + wind * 6 * Math.cos(dirRad);

    leaf.el.style.setProperty('--leaf-neg', `${leafRot}deg`);
    leaf.el.style.setProperty('--leaf-pos', `${leafRot2}deg`);
    leaf.el.style.setProperty('--leaf-x-neg', `${xOffset}px`);
    leaf.el.style.setProperty('--leaf-x-pos', `${xOffset2}px`);
    leaf.el.style.animationDuration = `${0.6 + Math.random() * 0.4 + wind * 0.3}s`;

    // 高风力时叶子有翻转效果
    if (wind > 0.5) {
      const flip3d = Math.sin(time * 2 + leaf.phase) * wind * 15;
      leaf.el.style.transform = leaf.el.style.transform.replace(
        /scale\([^)]*\)/,
        `scale(${0.7 + Math.random() * 0.3}) rotateY(${flip3d}deg)`
      );
    }

    // 随机触发落叶
    if (wind > 0.6 && Math.random() < 0.0003 * wind) {
      detachLeaf(leaf);
    }
  });

  // 更新草地
  updateGrass(wind, dirRad);

  // 更新风粒子
  updateWindParticles(wind);

  // 更新飘落的叶子
  updateFallingLeaves();

  requestAnimationFrame(updateAnimations);
}

// ============================================================
// 草地
// ============================================================
const grassBlades = [];
const groundEl = document.getElementById('ground');

function initGrass() {
  const count = 120;
  for (let i = 0; i < count; i++) {
    const blade = document.createElement('div');
    blade.className = 'grass-blade';
    const x = (i / count) * 100;
    const h = 15 + Math.random() * 35;
    const phase = Math.random() * Math.PI * 2;
    blade.style.cssText = `
      left: ${x}%;
      height: ${h}px;
      opacity: ${0.4 + Math.random() * 0.5};
    `;
    groundEl.appendChild(blade);
    grassBlades.push({ el: blade, phase, h, amp: 5 + Math.random() * 12 });
  }
}

function updateGrass(wind, dirRad) {
  grassBlades.forEach(blade => {
    const sway = wind * blade.amp;
    const turb = Math.sin(WindSystem.time * 4 + blade.phase) * 3;
    blade.el.style.setProperty('--grass-neg', `${-sway - turb}deg`);
    blade.el.style.setProperty('--grass-pos', `${sway + turb}deg`);
    blade.el.style.animationDuration = `${0.4 + wind * 0.2}s`;
  });
}

// ============================================================
// 风粒子 (风的视觉表现)
// ============================================================
const windParticles = [];
const MAX_PARTICLES = 30;

function updateWindParticles(wind) {
  // 根据风力生成粒子
  if (wind > 0.2 && windParticles.length < MAX_PARTICLES && Math.random() < wind * 0.15) {
    const particle = document.createElement('div');
    particle.className = 'wind-particle';
    const y = Math.random() * window.innerHeight * 0.8;
    const len = 20 + Math.random() * 60 * wind;
    particle.style.cssText = `
      top: ${y}px;
      left: -${len}px;
      width: ${len}px;
      opacity: ${0.1 + wind * 0.15};
    `;
    scene.appendChild(particle);
    windParticles.push({
      el: particle,
      x: -len,
      y,
      speed: 150 + wind * 400 + Math.random() * 100,
      len,
      opacity: 0.1 + wind * 0.15
    });
  }

  // 更新粒子位置
  for (let i = windParticles.length - 1; i >= 0; i--) {
    const p = windParticles[i];
    p.x += p.speed * 0.016;
    p.y += Math.sin(p.x * 0.01 + WindSystem.time) * 0.5;

    if (p.x > window.innerWidth + p.len) {
      p.el.remove();
      windParticles.splice(i, 1);
    } else {
      p.el.style.transform = `translate(${p.x}px, ${p.y - (p.y || 0)}px)`;
      // 淡出
      const progress = p.x / (window.innerWidth + p.len);
      p.el.style.opacity = p.opacity * (1 - progress * 0.5);
    }
  }
}

// ============================================================
// 飘落的叶子
// ============================================================
const fallingLeaves = [];

function detachLeaf(leaf) {
  if (!leaf.el.parentNode) return;

  const rect = leaf.el.getBoundingClientRect();
  const color = leaf.el.style.background;

  leaf.el.remove();

  // 从数组中移除
  const idx = leaves.indexOf(leaf);
  if (idx > -1) leaves.splice(idx, 1);

  // 创建飘落叶子
  const fallEl = document.createElement('div');
  fallEl.className = 'falling-leaf';
  fallEl.style.background = color;
  fallEl.style.left = `${rect.left + rect.width / 2}px`;
  fallEl.style.top = `${rect.top}px`;

  const fallX = 100 + Math.random() * 300 * WindSystem.getWind();
  const fallY = 150 + Math.random() * 400;
  const fallRot = 200 + Math.random() * 600;

  fallEl.style.setProperty('--fall-x', `${fallX}px`);
  fallEl.style.setProperty('--fall-y', `${fallY}px`);
  fallEl.style.setProperty('--fall-rot', `${fallRot}deg`);
  fallEl.style.animation = `leafFall ${3 + Math.random() * 4}s ease-in forwards`;

  scene.appendChild(fallEl);
  fallingLeaves.push({ el: fallEl, startTime: performance.now(), duration: 5000 });
}

function spawnFallingLeaf() {
  const colorIdx = Math.floor(Math.random() * leafColors.length);
  const fallEl = document.createElement('div');
  fallEl.className = 'falling-leaf';
  fallEl.style.background = leafColors[colorIdx];
  fallEl.style.left = `${200 + Math.random() * (window.innerWidth - 400)}px`;
  fallEl.style.top = `${-20}px`;

  const wind = WindSystem.getWind();
  const fallX = 50 + Math.random() * 200 + wind * 100;
  const fallY = 100 + Math.random() * window.innerHeight * 0.6;
  const fallRot = 200 + Math.random() * 600;

  fallEl.style.setProperty('--fall-x', `${fallX}px`);
  fallEl.style.setProperty('--fall-y', `${fallY}px`);
  fallEl.style.setProperty('--fall-rot', `${fallRot}deg`);
  fallEl.style.animation = `leafFall ${4 + Math.random() * 5}s ease-in forwards`;

  scene.appendChild(fallEl);
  fallingLeaves.push({ el: fallEl, startTime: performance.now(), duration: 9000 });
}

function updateFallingLeaves() {
  const now = performance.now();
  for (let i = fallingLeaves.length - 1; i >= 0; i--) {
    const fl = fallingLeaves[i];
    if (now - fl.startTime > fl.duration) {
      if (fl.el.parentNode) fl.el.remove();
      fallingLeaves.splice(i, 1);
    }
  }
}

// ============================================================
// 交互控制
// ============================================================
document.getElementById('windControl').addEventListener('input', (e) => {
  WindSystem.setWind(e.target.value / 100);
});

document.getElementById('burstBtn').addEventListener('click', () => {
  WindSystem.triggerGust(0.4 + Math.random() * 0.4);
  // 触发一批落叶
  for (let i = 0; i < 3 + Math.random() * 5; i++) {
    setTimeout(() => spawnFallingLeaf(), i * 100);
  }
});

document.getElementById('calmBtn').addEventListener('click', () => {
  WindSystem.calm();
});

document.getElementById('leafBtn').addEventListener('click', () => {
  for (let i = 0; i < 5 + Math.random() * 8; i++) {
    setTimeout(() => spawnFallingLeaf(), i * 150);
  }
});

// ============================================================
// 初始化
// ============================================================
createTree();
initGrass();
requestAnimationFrame(updateAnimations);

// 随机自动落叶
setInterval(() => {
  const wind = WindSystem.getWind();
  if (wind > 0.25 && Math.random() < wind * 0.3) {
    spawnFallingLeaf();
  }
}, 3000);
</script>
