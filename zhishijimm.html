<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指示剂变色实验模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .main-content {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls {
            flex: 1;
            min-width: 250px;
        }

        .control-group {
            margin-bottom: 25px;
        }

        .control-group label {
            display: block;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .option-btn {
            padding: 12px 20px;
            border: 2px solid #ddd;
            background: #f8f9fa;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }

        .option-btn:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .option-btn.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #764ba2;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .mix-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .mix-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.4);
        }

        .mix-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .reset-btn:hover {
            background: #ee5a5a;
        }

        .display-area {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .test-tube-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 300px;
        }

        .test-tube {
            position: relative;
            width: 60px;
            height: 200px;
            border: 4px solid #aaa;
            border-top: none;
            border-radius: 0 0 30px 30px;
            background: linear-gradient(to right, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            overflow: hidden;
        }

        .test-tube::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 20px;
            border: 4px solid #aaa;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            background: linear-gradient(to right, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
        }

        .liquid {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 0;
            background: transparent;
            transition: background-color 1.5s ease-in-out, height 1s ease-out;
        }

        .liquid::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 0;
            right: 0;
            height: 20px;
            background: inherit;
            border-radius: 50%;
            filter: brightness(1.1);
            opacity: 0.6;
        }

        .bubbles {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100%;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: rise 2s ease-in infinite;
        }

        @keyframes rise {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.6;
            }
            100% {
                transform: translateY(-150px) scale(0.5);
                opacity: 0;
            }
        }

        .info-box {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            width: 100%;
            min-height: 120px;
            transition: all 0.3s ease;
        }

        .info-box.active {
            background: #e8f4ff;
            border-left-color: #38ef7d;
        }

        .info-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .info-content {
            color: #666;
            line-height: 1.6;
        }

        .formula {
            background: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin-top: 10px;
            display: inline-block;
            border: 1px solid #ddd;
        }

        .color-indicator {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
        }

        .color-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #333;
        }

        .reaction-display {
            margin-top: 15px;
            padding: 12px;
            background: linear-gradient(135deg, #fff9c4 0%, #ffeb3b 100%);
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .reaction-display.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 指示剂变色实验模拟器</h1>

        <div class="main-content">
            <div class="controls">
                <div class="control-group">
                    <label>选择指示剂</label>
                    <div class="options">
                        <button class="option-btn" data-type="indicator" data-value="litmus">石蕊</button>
                        <button class="option-btn" data-type="indicator" data-value="phenolphthalein">酚酞</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>选择溶液</label>
                    <div class="options">
                        <button class="option-btn" data-type="solution" data-value="vinegar">醋（酸性）</button>
                        <button class="option-btn" data-type="solution" data-value="lime">石灰水（碱性）</button>
                        <button class="option-btn" data-type="solution" data-value="salt">盐水（中性）</button>
                    </div>
                </div>

                <button class="mix-btn" id="mixBtn" disabled>🧪 混合试剂</button>
                <button class="reset-btn" id="resetBtn">🔄 重新开始</button>
            </div>

            <div class="display-area">
                <div class="test-tube-container">
                    <div class="test-tube">
                        <div class="liquid" id="liquid"></div>
                        <div class="bubbles" id="bubbles"></div>
                    </div>
                </div>

                <div class="info-box" id="infoBox">
                    <div class="info-title">实验说明</div>
                    <div class="info-content">请选择指示剂和溶液，然后点击"混合试剂"观察颜色变化。</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 配置数据
        const config = {
            indicators: {
                litmus: {
                    name: '石蕊',
                    color: '#9370DB', // 紫色
                    reactions: {
                        vinegar: {
                            resultColor: '#DC143C', // 红色
                            principle: '石蕊指示剂在酸性溶液中变红',
                            formula: '石蕊 + H⁺ → 红色',
                            explanation: '醋酸（CH₃COOH）电离产生H⁺，使石蕊变红'
                        },
                        lime: {
                            resultColor: '#4169E1', // 蓝色
                            principle: '石蕊指示剂在碱性溶液中变蓝',
                            formula: '石蕊 + OH⁻ → 蓝色',
                            explanation: '氢氧化钙（Ca(OH)₂）电离产生OH⁻，使石蕊变蓝'
                        },
                        salt: {
                            resultColor: '#9370DB', // 保持紫色
                            principle: '石蕊指示剂在中性溶液中保持紫色',
                            formula: '石蕊 + H₂O → 紫色（不变色）',
                            explanation: '盐水呈中性，石蕊保持原本的紫色'
                        }
                    }
                },
                phenolphthalein: {
                    name: '酚酞',
                    color: '#F5F5F5', // 无色
                    reactions: {
                        vinegar: {
                            resultColor: '#F5F5F5', // 无色
                            principle: '酚酞在酸性溶液中无色',
                            formula: '酚酞 + H⁺ → 无色',
                            explanation: '醋酸呈酸性，酚酞保持无色状态'
                        },
                        lime: {
                            resultColor: '#FF1493', // 粉红色
                            principle: '酚酞在碱性溶液中变红',
                            formula: '酚酞 + OH⁻ → 粉红色',
                            explanation: '氢氧化钙呈碱性，使酚酞呈现粉红色'
                        },
                        salt: {
                            resultColor: '#F5F5F5', // 无色
                            principle: '酚酞在中性溶液中无色',
                            formula: '酚酞 + H₂O → 无色（不变色）',
                            explanation: '盐水呈中性，酚酞保持无色状态'
                        }
                    }
                }
            },
            solutions: {
                vinegar: { name: '醋', type: '酸性', formula: 'CH₃COOH' },
                lime: { name: '石灰水', type: '碱性', formula: 'Ca(OH)₂' },
                salt: { name: '盐水', type: '中性', formula: 'NaCl' }
            }
        };

        // 状态
        let selectedIndicator = null;
        let selectedSolution = null;
        let isMixed = false;

        // DOM 元素
        const optionBtns = document.querySelectorAll('.option-btn');
        const mixBtn = document.getElementById('mixBtn');
        const resetBtn = document.getElementById('resetBtn');
        const liquid = document.getElementById('liquid');
        const infoBox = document.getElementById('infoBox');
        const bubblesContainer = document.getElementById('bubbles');

        // 选择事件
        optionBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (isMixed) return;

                const type = btn.dataset.type;
                const value = btn.dataset.value;

                // 移除同类型的其他选择
                document.querySelectorAll(`.option-btn[data-type="${type}"]`).forEach(b => {
                    b.classList.remove('selected');
                });

                // 添加当前选择
                btn.classList.add('selected');

                // 更新状态
                if (type === 'indicator') {
                    selectedIndicator = value;
                } else {
                    selectedSolution = value;
                }

                // 检查是否可以混合
                mixBtn.disabled = !(selectedIndicator && selectedSolution);

                // 更新液体预览颜色
                updateLiquidPreview();
            });
        });

        function updateLiquidPreview() {
            if (!selectedIndicator) {
                liquid.style.height = '0';
                return;
            }

            liquid.style.height = '60%';
            liquid.style.backgroundColor = config.indicators[selectedIndicator].color;
        }

        // 混合按钮事件
        mixBtn.addEventListener('click', () => {
            if (!selectedIndicator || !selectedSolution || isMixed) return;

            isMixed = true;
            mixBtn.disabled = true;

            // 添加气泡效果
            createBubbles();

            // 获取反应结果
            const indicator = config.indicators[selectedIndicator];
            const solution = config.solutions[selectedSolution];
            const reaction = indicator.reactions[selectedSolution];

            // 添加过渡效果 - 先稍微加深
            liquid.style.height = '70%';
            setTimeout(() => {
                // 颜色变化
                liquid.style.backgroundColor = reaction.resultColor;
            }, 500);

            // 更新信息显示
            setTimeout(() => {
                updateInfoBox(indicator, solution, reaction);
            }, 1000);
        });

        function createBubbles() {
            bubblesContainer.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    bubble.style.width = Math.random() * 8 + 4 + 'px';
                    bubble.style.height = bubble.style.width;
                    bubble.style.left = Math.random() * 80 + 10 + '%';
                    bubble.style.animationDelay = Math.random() * 0.5 + 's';
                    bubblesContainer.appendChild(bubble);
                }, i * 200);
            }
        }

        function updateInfoBox(indicator, solution, reaction) {
            infoBox.classList.add('active');

            infoBox.innerHTML = `
                <div class="info-title">🔬 实验结果</div>
                <div class="info-content">
                    <p><strong>混合：</strong>${indicator.name} + ${solution.name}</p>
                    <p><strong>溶液性质：</strong>${solution.type}（${solution.formula}）</p>
                    <div class="color-indicator">
                        <div class="color-circle" style="background-color: ${reaction.resultColor}"></div>
                        <span>变色结果</span>
                    </div>
                    <div class="formula">${reaction.formula}</div>
                    <p style="margin-top: 10px;">${reaction.principle}</p>
                    <p><em>${reaction.explanation}</em></p>
                </div>
            `;
        }

        // 重置按钮事件
        resetBtn.addEventListener('click', () => {
            isMixed = false;
            selectedIndicator = null;
            selectedSolution = null;

            // 重置按钮状态
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            mixBtn.disabled = true;

            // 重置液体
            liquid.style.height = '0';
            liquid.style.backgroundColor = 'transparent';

            // 清除气泡
            bubblesContainer.innerHTML = '';

            // 重置信息框
            infoBox.classList.remove('active');
            infoBox.innerHTML = `
                <div class="info-title">实验说明</div>
                <div class="info-content">请选择指示剂和溶液，然后点击"混合试剂"观察颜色变化。</div>
            `;
        });
    </script>
</body>
</html>
