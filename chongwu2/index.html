<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 宠物饮水量记录器</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🐾 宠物饮水量记录器</h1>
            <p class="subtitle">守护毛孩子的健康每一天</p>
        </header>

        <div class="main-content">
            <!-- 宠物信息卡 -->
            <section class="pet-info-card">
                <div class="pet-avatar">
                    <span class="pet-emoji" id="petEmoji">🐱</span>
                </div>
                <div class="pet-details">
                    <input type="text" id="petName" class="pet-name-input" placeholder="给宠物取个名字吧~" value="小白">
                    <div class="pet-stats">
                        <div class="stat-item">
                            <span class="stat-label">体重</span>
                            <input type="number" id="petWeight" class="stat-input" value="4" min="0.1" step="0.1">
                            <span class="stat-unit">kg</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">建议日饮水</span>
                            <span class="stat-value" id="recommendedWater">160</span>
                            <span class="stat-unit">ml</span>
                        </div>
                    </div>
                </div>
                <div class="pet-type-selector">
                    <button class="type-btn active" data-type="cat" data-emoji="🐱">猫咪</button>
                    <button class="type-btn" data-type="dog" data-emoji="🐕">狗狗</button>
                    <button class="type-btn" data-type="other" data-emoji="🐰">其他</button>
                </div>
            </section>

            <!-- 今日饮水记录 -->
            <section class="today-section">
                <h2 class="section-title">💧 今日饮水</h2>
                <div class="today-input">
                    <div class="input-group">
                        <label for="waterAmount">本次添加水量</label>
                        <div class="input-row">
                            <input type="number" id="waterAmount" placeholder="输入水量" min="1" max="1000">
                            <span class="input-unit">ml</span>
                        </div>
                    </div>
                    <button class="add-btn" id="addWaterBtn">
                        <span class="btn-icon">+</span>
                        添加记录
                    </button>
                </div>
                <div class="today-stats">
                    <div class="today-total">
                        <span class="today-label">今日总计</span>
                        <span class="today-value" id="todayTotal">0</span>
                        <span class="today-unit">ml</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                        </div>
                        <span class="progress-text" id="progressText">0%</span>
                    </div>
                </div>
                <div class="quick-add-buttons">
                    <button class="quick-btn" data-amount="50">+50ml</button>
                    <button class="quick-btn" data-amount="100">+100ml</button>
                    <button class="quick-btn" data-amount="150">+150ml</button>
                    <button class="quick-btn" data-amount="200">+200ml</button>
                </div>
            </section>

            <!-- 数据图表区域 -->
            <section class="chart-section">
                <h2 class="section-title">📊 7天饮水趋势</h2>
                <div class="chart-container">
                    <canvas id="waterChart"></canvas>
                </div>
                <div class="chart-stats">
                    <div class="stat-card">
                        <span class="stat-card-label">7天平均</span>
                        <span class="stat-card-value" id="avg7Days">0</span>
                        <span class="stat-card-unit">ml/天</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-card-label">最高记录</span>
                        <span class="stat-card-value" id="max7Days">0</span>
                        <span class="stat-card-unit">ml</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-card-label">达标天数</span>
                        <span class="stat-card-value" id="达标天数">0</span>
                        <span class="stat-card-unit">天</span>
                    </div>
                </div>
            </section>

            <!-- 历史记录 -->
            <section class="history-section">
                <h2 class="section-title">📝 近期记录</h2>
                <div class="history-list" id="historyList">
                    <p class="empty-state">暂无记录，快来添加第一条吧~</p>
                </div>
                <button class="clear-data-btn" id="clearDataBtn">清除所有数据</button>
            </section>
        </div>

        <footer class="footer">
            <p>💚 用爱记录每一天的饮水健康</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
