<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>篝火燃烧场景</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 50%, #2a2a2a 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            text-align: center;
        }

        canvas {
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(255, 100, 0, 0.3);
        }

        h1 {
            color: #ff6b35;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
            font-size: 2em;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: linear-gradient(to bottom, #ff6b35, #ff4500);
            color: white;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 篝火燃烧场景 🔥</h1>
        <canvas id="fireCanvas" width="800" height="600"></canvas>
        <div class="controls">
            <button onclick="toggleFire()">暂停/继续</button>
            <button onclick="addFlame()">添加火焰</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fireCanvas');
        const ctx = canvas.getContext('2d');
        let isRunning = true;

        // 粒子类
        class Particle {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // 'fire', 'spark', 'smoke'
                this.reset();
            }

            reset() {
                if (this.type === 'fire') {
                    // 火焰粒子
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = -Math.random() * 3 - 2;
                    this.life = 1;
                    this.decay = Math.random() * 0.02 + 0.015;
                    this.size = Math.random() * 20 + 30;
                    this.color = this.getFireColor();
                } else if (this.type === 'spark') {
                    // 火星粒子
                    this.vx = (Math.random() - 0.5) * 4;
                    this.vy = -Math.random() * 5 - 3;
                    this.life = 1;
                    this.decay = Math.random() * 0.03 + 0.02;
                    this.size = Math.random() * 3 + 2;
                    this.color = `255, ${Math.floor(Math.random() * 100 + 150)}, 0`;
                } else if (this.type === 'smoke') {
                    // 烟雾粒子
                    this.vx = (Math.random() - 0.5) * 1;
                    this.vy = -Math.random() * 1.5 - 0.5;
                    this.life = 1;
                    this.decay = Math.random() * 0.01 + 0.005;
                    this.size = Math.random() * 30 + 20;
                    this.color = '50, 50, 50';
                }
            }

            getFireColor() {
                // 火焰颜色从黄到红
                const colors = [
                    '255, 255, 0',    // 黄色
                    '255, 200, 0',    // 橙黄
                    '255, 150, 0',    // 橙色
                    '255, 100, 0',    // 深橙
                    '255, 50, 0'      // 红色
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;

                if (this.type === 'fire') {
                    this.size *= 0.98;
                    this.vx += (Math.random() - 0.5) * 0.2;
                } else if (this.type === 'smoke') {
                    this.size *= 0.995;
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;

                if (this.type === 'fire' || this.type === 'smoke') {
                    // 创建径向渐变
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, this.size
                    );

                    if (this.type === 'fire') {
                        gradient.addColorStop(0, `rgba(${this.color}, ${this.life})`);
                        gradient.addColorStop(0.5, `rgba(${this.color}, ${this.life * 0.5})`);
                        gradient.addColorStop(1, `rgba(${this.color}, 0)`);
                    } else {
                        gradient.addColorStop(0, `rgba(${this.color}, ${this.life * 0.3})`);
                        gradient.addColorStop(1, `rgba(${this.color}, 0)`);
                    }

                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'spark') {
                    ctx.fillStyle = `rgb(${this.color})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();

                    // 添加发光效果
                    ctx.shadowColor = `rgb(${this.color})`;
                    ctx.shadowBlur = 10;
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        // 木柴类
        class Log {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.width = 120;
                this.height = 20;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // 木柴主体
                const gradient = ctx.createLinearGradient(0, 0, this.width, 0);
                gradient.addColorStop(0, '#3d2914');
                gradient.addColorStop(0.5, '#5c3d1e');
                gradient.addColorStop(1, '#3d2914');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(-this.width/2, -this.height/2, this.width, this.height, 5);
                ctx.fill();

                // 木柴纹理
                ctx.strokeStyle = '#2a1d0f';
                ctx.lineWidth = 2;
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.moveTo(-this.width/2 + i * 25, -5);
                    ctx.lineTo(-this.width/2 + i * 25, 5);
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        // 粒子系统
        let fireParticles = [];
        let sparkParticles = [];
        let smokeParticles = [];
        const logs = [];

        // 初始化木柴
        function initLogs() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height - 150;

            log1 = new Log(centerX, centerY, Math.PI / 6);
            log2 = new Log(centerX, centerY, -Math.PI / 6);
            log3 = new Log(centerX - 30, centerY + 15, 0);

            logs.push(log1, log2, log3);
        }

        // 创建火焰粒子
        function createFireParticles() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height - 150;

            for (let i = 0; i < 3; i++) {
                const x = centerX + (Math.random() - 0.5) * 60;
                const y = centerY + (Math.random() - 0.5) * 30;
                fireParticles.push(new Particle(x, y, 'fire'));
            }

            // 随机创建火星
            if (Math.random() < 0.3) {
                const x = centerX + (Math.random() - 0.5) * 80;
                const y = centerY;
                sparkParticles.push(new Particle(x, y, 'spark'));
            }

            // 创建烟雾
            if (Math.random() < 0.2) {
                const x = centerX + (Math.random() - 0.5) * 40;
                const y = centerY - 50;
                smokeParticles.push(new Particle(x, y, 'smoke'));
            }
        }

        // 更新粒子
        function updateParticles() {
            // 更新火焰粒子
            fireParticles = fireParticles.filter(p => {
                p.update();
                return p.life > 0;
            });

            // 更新火星粒子
            sparkParticles = sparkParticles.filter(p => {
                p.update();
                return p.life > 0;
            });

            // 更新烟雾粒子
            smokeParticles = smokeParticles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        // 绘制场景
        function draw() {
            // 清空画布并绘制背景
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制地面
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

            // 绘制篝火光晕
            const centerX = canvas.width / 2;
            const centerY = canvas.height - 150;

            const glowGradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, 200
            );
            glowGradient.addColorStop(0, 'rgba(255, 100, 0, 0.3)');
            glowGradient.addColorStop(0.5, 'rgba(255, 50, 0, 0.1)');
            glowGradient.addColorStop(1, 'rgba(255, 0, 0, 0)');

            ctx.fillStyle = glowGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制木柴
            logs.forEach(log => log.draw());

            // 绘制烟雾（在火焰后面）
            smokeParticles.forEach(p => p.draw());

            // 绘制火焰
            fireParticles.forEach(p => p.draw());

            // 绘制火星
            sparkParticles.forEach(p => p.draw());
        }

        // 动画循环
        function animate() {
            if (!isRunning) return;

            createFireParticles();
            updateParticles();
            draw();

            requestAnimationFrame(animate);
        }

        // 控制函数
        function toggleFire() {
            isRunning = !isRunning;
            if (isRunning) {
                animate();
            }
        }

        function addFlame() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height - 150;

            for (let i = 0; i < 20; i++) {
                const x = centerX + (Math.random() - 0.5) * 60;
                const y = centerY + (Math.random() - 0.5) * 30;
                fireParticles.push(new Particle(x, y, 'fire'));
            }
        }

        // 初始化
        function init() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            initLogs();
            animate();
        }

        init();
    </script>
</body>
</html>
