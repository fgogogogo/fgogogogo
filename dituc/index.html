<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地图标记点 - 店铺/景点位置</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        #container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .sidebar {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            max-height: calc(100vh - 40px);
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .sidebar-header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .sidebar-header p {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .location-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .location-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .location-item:hover {
            background: #f5f5f5;
            border-color: #667eea;
        }

        .location-item.active {
            background: #f0ebff;
            border-color: #667eea;
        }

        .location-name {
            font-weight: 600;
            font-size: 15px;
            color: #333;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .location-icon {
            font-size: 18px;
        }

        .location-address {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
        }

        .location-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            margin-top: 8px;
        }

        .type-shop {
            background: #ffeaa7;
            color: #d35400;
        }

        .type-spot {
            background: #a8e6cf;
            color: #00b894;
        }

        /* Custom scrollbar */
        .location-list::-webkit-scrollbar {
            width: 6px;
        }

        .location-list::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .location-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        /* Custom popup style */
        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 8px;
            padding: 0;
        }

        .custom-popup .leaflet-popup-content {
            margin: 0;
            padding: 15px;
            min-width: 200px;
        }

        .popup-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .popup-address {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        /* Custom marker icon */
        .custom-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .custom-marker:hover {
            transform: rotate(-45deg) scale(1.1);
        }

        .custom-marker span {
            transform: rotate(45deg);
            font-size: 18px;
        }

        .marker-shop {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .marker-spot {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="map"></div>
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>📍 地图标记点</h1>
                <p>点击列表或地图标记查看详情</p>
            </div>
            <div class="location-list" id="locationList"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
</body>
</html>
