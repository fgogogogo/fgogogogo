<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指示剂变色实验模拟器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }
  h1 {
    font-size: 28px;
    margin-bottom: 30px;
    text-align: center;
    background: linear-gradient(90deg, #f0a0a0, #a0d0ff, #f0a0a0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .main-container {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 1000px;
    width: 100%;
  }

  /* 控制面板 */
  .control-panel {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 28px;
    min-width: 280px;
    backdrop-filter: blur(10px);
  }
  .control-panel h2 {
    font-size: 16px;
    color: #a0c4ff;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .control-panel h2::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 16px;
    background: #a0c4ff;
    border-radius: 2px;
  }

  .option-group {
    margin-bottom: 24px;
  }
  .option-group label {
    display: block;
    font-size: 13px;
    color: #999;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .option-btn {
    padding: 12px 16px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    color: #ccc;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .option-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
  }
  .option-btn.selected {
    border-color: #6aa0ff;
    background: rgba(106,160,255,0.15);
    color: #fff;
    box-shadow: 0 0 12px rgba(106,160,255,0.2);
  }
  .option-btn .color-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.3);
  }

  .mix-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #4a7cff, #7c5cfc);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 2px;
    margin-top: 4px;
  }
  .mix-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(74,124,255,0.4);
  }
  .mix-btn:active {
    transform: translateY(0);
  }
  .mix-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .reset-btn {
    width: 100%;
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    background: transparent;
    color: #999;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
  }
  .reset-btn:hover {
    border-color: rgba(255,255,255,0.3);
    color: #ccc;
  }

  /* 试管区域 */
  .tube-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .tube-wrapper {
    position: relative;
    width: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 试管 */
  .test-tube {
    position: relative;
    width: 80px;
    height: 220px;
  }
  .tube-glass {
    position: absolute;
    bottom: 0;
    left: 10px;
    width: 60px;
    height: 200px;
    border: 3px solid rgba(255,255,255,0.35);
    border-top: none;
    border-radius: 0 0 30px 30px;
    background: rgba(255,255,255,0.05);
    overflow: hidden;
    box-shadow:
      inset 0 0 20px rgba(255,255,255,0.05),
      0 4px 20px rgba(0,0,0,0.3);
  }
  .tube-liquid {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 0%;
    border-radius: 0 0 27px 27px;
    transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }
  .tube-liquid::after {
    content: '';
    position: absolute;
    top: 0;
    left: 10%;
    width: 25%;
    height: 8px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    filter: blur(2px);
  }
  .tube-rim {
    position: absolute;
    top: 0;
    left: 5px;
    width: 70px;
    height: 24px;
    border: 3px solid rgba(255,255,255,0.35);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    background: rgba(255,255,255,0.04);
  }
  .tube-label {
    margin-top: 10px;
    font-size: 13px;
    color: #888;
    text-align: center;
  }

  /* 气泡动画 */
  .bubbles {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
  }
  .bubble {
    position: absolute;
    bottom: -10px;
    width: 4px;
    height: 4px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    animation: bubbleRise 1.5s ease-in infinite;
  }
  @keyframes bubbleRise {
    0% { transform: translateY(0) scale(1); opacity: 0.7; }
    100% { transform: translateY(-160px) scale(0.5); opacity: 0; }
  }

  /* 结果面板 */
  .result-panel {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 24px;
    min-width: 300px;
    max-width: 360px;
    backdrop-filter: blur(10px);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.5s ease;
  }
  .result-panel.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .result-panel h2 {
    font-size: 16px;
    color: #f0a0a0;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-panel h2::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 16px;
    background: #f0a0a0;
    border-radius: 2px;
  }

  .result-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 14px;
  }
  .result-row:last-child {
    border-bottom: none;
  }
  .result-label {
    color: #888;
    min-width: 70px;
  }
  .result-value {
    color: #e0e0e0;
    font-weight: 500;
  }
  .result-value.acid { color: #ff6b6b; }
  .result-value.base { color: #74b9ff; }
  .result-value.neutral { color: #a0a0a0; }

  .principle-box {
    margin-top: 16px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    border-left: 3px solid #6aa0ff;
    font-size: 13px;
    line-height: 1.8;
    color: #bbb;
  }
  .principle-box .highlight {
    color: #ffd080;
    font-weight: 500;
  }
  .principle-box .color-text {
    font-weight: 600;
  }
  .color-text.red { color: #ff6b6b; }
  .color-text.blue { color: #74b9ff; }
  .color-text.colorless { color: #999; }
  .color-text.purple { color: #b088d0; }
  .color-text.pink { color: #ff8ec7; }

  /* 状态提示 */
  .status-hint {
    text-align: center;
    font-size: 13px;
    color: #666;
    margin-top: 8px;
    min-height: 20px;
  }

  /* 底部参考表 */
  .reference {
    margin-top: 30px;
    max-width: 800px;
    width: 100%;
  }
  .reference h3 {
    font-size: 14px;
    color: #777;
    margin-bottom: 12px;
    text-align: center;
  }
  .ref-table {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .ref-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .ref-card .sol-name {
    font-size: 14px;
    color: #ccc;
    margin-bottom: 8px;
  }
  .ref-card .sol-type {
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 10px;
    display: inline-block;
    margin-bottom: 10px;
  }
  .sol-type.acid { background: rgba(255,107,107,0.15); color: #ff6b6b; }
  .sol-type.base { background: rgba(116,185,255,0.15); color: #74b9ff; }
  .sol-type.neutral { background: rgba(160,160,160,0.15); color: #a0a0a0; }
  .ref-card .ref-detail {
    font-size: 12px;
    color: #888;
    line-height: 1.7;
  }

  @media (max-width: 768px) {
    .main-container { flex-direction: column; align-items: center; }
    .control-panel, .result-panel { min-width: 260px; max-width: 100%; }
    .ref-table { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>指示剂变色实验模拟器</h1>

<div class="main-container">
  <!-- 控制面板 -->
  <div class="control-panel">
    <h2>实验配置</h2>

    <div class="option-group">
      <label>选择指示剂</label>
      <div class="options" id="indicator-options">
        <button class="option-btn" data-value="litmus" data-color="#b088d0">
          <span class="color-dot" style="background:#b088d0"></span>
          石蕊指示剂
        </button>
        <button class="option-btn" data-value="phenol" data-color="#f0e0e0">
          <span class="color-dot" style="background:#f0e0e0;border-color:rgba(255,255,255,0.2)"></span>
          酚酞指示剂
        </button>
      </div>
    </div>

    <div class="option-group">
      <label>选择溶液</label>
      <div class="options" id="solution-options">
        <button class="option-btn" data-value="vinegar" data-color="#e8d4a0">
          <span class="color-dot" style="background:#e8d4a0"></span>
          醋（酸性）
        </button>
        <button class="option-btn" data-value="lime" data-color="#d0e8f0">
          <span class="color-dot" style="background:#d0e8f0"></span>
          石灰水（碱性）
        </button>
        <button class="option-btn" data-value="salt" data-color="#e0e0e0">
          <span class="color-dot" style="background:#e0e0e0;border-color:rgba(255,255,255,0.2)"></span>
          盐水（中性）
        </button>
      </div>
    </div>

    <button class="mix-btn" id="mix-btn" disabled>混合反应</button>
    <button class="reset-btn" id="reset-btn">重置实验</button>
    <div class="status-hint" id="status-hint">请选择指示剂和溶液</div>
  </div>

  <!-- 试管区域 -->
  <div class="tube-area">
    <div class="tube-wrapper">
      <div class="test-tube">
        <div class="tube-rim"></div>
        <div class="tube-glass">
          <div class="tube-liquid" id="tube-liquid">
            <div class="bubbles" id="bubbles"></div>
          </div>
        </div>
      </div>
      <div class="tube-label" id="tube-label">空试管</div>
    </div>
  </div>

  <!-- 结果面板 -->
  <div class="result-panel" id="result-panel">
    <h2>实验结果</h2>
    <div class="result-row">
      <span class="result-label">指示剂</span>
      <span class="result-value" id="res-indicator">—</span>
    </div>
    <div class="result-row">
      <span class="result-label">溶液</span>
      <span class="result-value" id="res-solution">—</span>
    </div>
    <div class="result-row">
      <span class="result-label">酸碱性</span>
      <span class="result-value" id="res-type">—</span>
    </div>
    <div class="result-row">
      <span class="result-label">变色结果</span>
      <span class="result-value" id="res-color">—</span>
    </div>
    <div class="principle-box" id="principle-box"></div>
  </div>
</div>

<!-- 参考表 -->
<div class="reference">
  <h3>变色参考表</h3>
  <div class="ref-table">
    <div class="ref-card">
      <div class="sol-name">醋</div>
      <div class="sol-type acid">酸性</div>
      <div class="ref-detail">
        石蕊 → <span class="color-text red">红色</span><br>
        酚酞 → <span class="color-text colorless">无色</span>
      </div>
    </div>
    <div class="ref-card">
      <div class="sol-name">石灰水</div>
      <div class="sol-type base">碱性</div>
      <div class="ref-detail">
        石蕊 → <span class="color-text blue">蓝色</span><br>
        酚酞 → <span class="color-text pink">粉红色</span>
      </div>
    </div>
    <div class="ref-card">
      <div class="sol-name">盐水</div>
      <div class="sol-type neutral">中性</div>
      <div class="ref-detail">
        石蕊 → <span class="color-text purple">紫色</span><br>
        酚酞 → <span class="color-text colorless">色</span>
      </div>
    </div>
  </div>
</div>

<script>
// ===== 数据定义 =====
const INDICATORS = {
  litmus:  { name: '石蕊指示剂', baseColor: '#b088d0' },
  phenol:  { name: '酚酞指示剂', baseColor: '#f0e8e8' }
};

const SOLUTIONS = {
  vinegar: { name: '醋', type: 'acid',  typeName: '酸性', baseColor: '#e8d4a0' },
  lime:    { name: '石灰水', type: 'base',  typeName: '碱性', baseColor: '#d0e8f0' },
  salt:    { name: '盐水', type: 'neutral', typeName: '中性', baseColor: '#e8e8e8' }
};

// 变色结果：指示剂 + 溶液 -> 颜色
const RESULTS = {
  'litmus+vinegar':  { color: '#e04545', colorName: '红色',   colorClass: 'red' },
  'litmus+lime':     { color: '#4a90e0', colorName: '蓝色',   colorClass: 'blue' },
  'litmus+salt':     { color: '#a070c0', colorName: '紫色',   colorClass: 'purple' },
  'phenol+vinegar':  { color: '#f0e8e8', colorName: '无色',   colorClass: 'colorless' },
  'phenol+lime':     { color: '#ff7090', colorName: '粉红色', colorClass: 'pink' },
  'phenol+salt':     { color: '#f0e8e8', colorName: '无色',   colorClass: 'colorless' }
};

// 变色原理说明
const PRINCIPLES = {
  'litmus+vinegar': `
    <span class="highlight">石蕊指示剂</span>是一种从地衣中提取的天然色素，
    主要成分是<span class="highlight">石蕊素</span>（C<sub>7</sub>H<sub>7</sub>O<sub>4</sub>N）。
    在<span class="highlight">酸性环境</span>（pH &lt; 7）中，石蕊素的分子结构发生质子化，
    共轭体系改变，吸收光谱偏移，呈现 <span class="color-text red">红色</span>。
    <br><br>醋的主要成分为<span class="highlight">醋酸（CH<sub>3</sub>COOH）</span>，pH ≈ 2.5~3.5。
  `,
  'litmus+lime': `
    <span class="highlight">石蕊指示剂</span>在<span class="highlight">碱性环境</span>（pH &gt; 7）中，
    石蕊素分子去质子化，共轭体系扩展，吸收光谱红移，
    呈现 <span class="color-text blue">蓝色</span>。
    <br><br>石灰水是<span class="highlight">氢氧化钙 Ca(OH)<sub>2</sub></span>的饱和溶液，pH ≈ 12~13。
  `,
  'litmus+salt': `
    <span class="highlight">石蕊指示剂</span>在<span class="highlight">中性环境</span>（pH ≈ 7）中，
    石蕊素保持其原始的分子状态，呈现固有的 <span class="color-text purple">紫色</span>。
    <br><br>食盐水是<span class="highlight">氯化钠 NaCl</span>的水溶液，呈中性，pH ≈ 7。
  `,
  'phenol+vinegar': `
    <span class="highlight">酚酞指示剂</span>（C<sub>20</sub>H<sub>14</sub>O<sub>4</sub>）在
    <span class="highlight">酸性或中性环境</span>中以<span class="highlight">内酯型</span>（无色型）存在，
    分子闭合为内酯环，无共轭体系，因此呈现 <span class="color-text colorless">无色</span>。
    <br><br>醋的主要成分为<span class="highlight">醋酸（CH<sub>3</sub>COOH）</span>，pH ≈ 2.5~3.5。
  `,
  'phenol+lime': `
    <span class="highlight">酚酞指示剂</span>在<span class="highlight">碱性环境</span>（pH &gt; 8.2）中，
    内酯环打开，转变为<span class="highlight">醌型结构</span>，形成大共轭体系，
    吸收绿光而呈现 <span class="color-text pink">粉红色</span>（或紫红色）。
    <br><br>石灰水是<span class="highlight">氢氧化钙 Ca(OH)<sub>2</sub></span>的饱和溶液，pH ≈ 12~13，远超酚酞变色点（pH 8.2）。
  `,
  'phenol+salt': `
    <span class="highlight">酚酞指示剂</span>在<span class="highlight">中性环境</span>（pH ≈ 7）中，
    仍以内酯型（无色型）存在，分子闭合无共轭，呈现 <span class="color-text colorless">无色</span>。
    <br><br>食盐水是<span class="highlight">氯化钠 NaCl</span>的水溶液，pH ≈ 7，低于酚酞变色点（pH 8.2）。
  `
};

// ===== 状态 =====
let selectedIndicator = null;
let selectedSolution = null;
let isMixed = false;

// ===== DOM =====
const mixBtn = document.getElementById('mix-btn');
const resetBtn = document.getElementById('reset-btn');
const statusHint = document.getElementById('status-hint');
const tubeLiquid = document.getElementById('tube-liquid');
const tubeLabel = document.getElementById('tube-label');
const resultPanel = document.getElementById('result-panel');
const bubbles = document.getElementById('bubbles');

// ===== 选项按钮逻辑 =====
function setupOptionButtons(containerId, onSelect) {
  const container = document.getElementById(containerId);
  const btns = container.querySelectorAll('.option-btn');
  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      // 同组互斥
      btns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      onSelect(btn.dataset.value);
      updateStatus();
    });
  });
}

setupOptionButtons('indicator-options', (val) => { selectedIndicator = val; });
setupOptionButtons('solution-options', (val) => { selectedSolution = val; });

function updateStatus() {
  if (selectedIndicator && selectedSolution) {
    mixBtn.disabled = false;
    statusHint.textContent = '已就绪，点击"混合反应"开始实验';
    statusHint.style.color = '#6aa0ff';
  } else {
    mixBtn.disabled = true;
    const missing = [];
    if (!selectedIndicator) missing.push('指示剂');
    if (!selectedSolution) missing.push('溶液');
    statusHint.textContent = '请选择 ' + missing.join(' 和 ');
    statusHint.style.color = '#666';
  }
}

// ===== 混合反应 =====
mixBtn.addEventListener('click', () => {
  if (!selectedIndicator || selectedSolution || isMixed) return;
  isMixed = true;
  mixBtn.disabled = true;

  const key = selectedIndicator + '+' + selectedSolution;
  const result = RESULTS[key];
  const indicator = INDICATORS[selectedIndicator];
  const solution = SOLUTIONS[selectedSolution];

  // 1. 液体先倒入（显示溶液原色 + 指示剂混合色）
  const mixColor = blendColors(solution.baseColor, indicator.baseColor, 0.6);
  tubeLiquid.style.background = mixColor;
  tubeLiquid.style.height = '75%';
  tubeLabel.textContent = `${indicator.name} + ${solution.name}`;

  // 2. 创建气泡
  createBubbles();

  // 3. 延迟后开始变色过渡
  setTimeout(() => {
    tubeLiquid.style.transition = 'background 1.8s cubic-bezier(0.4, 0, 0.2, 1), height 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
    tubeLiquid.style.background = result.color;

    // 4. 变色完成后显示结果
    setTimeout(() => {
      showResult(indicator, solution, result, key);
      removeBubbles();
    }, 1900);
  }, 1000);
});

function blendColors(c1, c2, ratio) {
  const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
  const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
  const r = Math.round(r1 * (1-ratio) + r2 * ratio);
  const g = Math.round(g1 * (1-ratio) + g2 * ratio);
  const b = Math.round(b1 * (1-ratio) + b2 * ratio);
  return `rgb(${r},${g},${b})`;
}

function createBubbles() {
  bubbles.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    b.style.left = (10 + Math.random() * 45) + 'px';
    b.style.animationDelay = (Math.random() * 1.2) + 's';
    b.style.width = (3 + Math.random() * 4) + 'px';
    b.style.height = b.style.width;
    bubbles.appendChild(b);
  }
}

function removeBubbles() {
  bubbles.innerHTML = '';
}

// ===== 显示结果 =====
function showResult(indicator, solution, result, key) {
  document.getElementById('res-indicator').textContent = indicator.name;
  document.getElementById('res-solution').textContent = solution.name + `（${solution.typeName}）`;
  document.getElementById('res-type').textContent = solution.typeName;
  document.getElementById('res-type').className = 'result-value ' + solution.type;
  document.getElementById('res-color').innerHTML = `<span class="color-text ${result.colorClass}">${result.colorName}</span>`;
  document.getElementById('principle-box').innerHTML = PRINCIPLES[key];

  resultPanel.classList.add('visible');
}

// ===== 重置 =====
resetBtn.addEventListener('click', () => {
  isMixed = false;
  selectedIndicator = null;
  selectedSolution = null;

  // 重置按钮
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  mixBtn.disabled = true;
  statusHint.textContent = '请选择指示剂和溶液';
  statusHint.style.color = '#666';

  // 重置试管
  tubeLiquid.style.transition = 'height 0.6s ease, background 0.4s ease';
  tubeLiquid.style.height = '0%';
  tubeLiquid.style.background = 'transparent';
  tubeLabel.textContent = '空试管';

  // 隐藏结果
  resultPanel.classList.remove('visible');
  removeBubbles();
});
</script>
