<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时区地图工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    padding: 12px 24px;
    border-bottom: 1px solid #334155;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 600;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header .subtitle {
    font-size: 13px;
    color: #64748b;
  }

  /* Search */
  .search-container {
    position: relative;
    width: 300px;
  }

  .search-container input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    border: 1px solid #334155;
    border-radius: 8px;
    background: #1e293b;
    color: #e2e8f0;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-container input:focus {
    border-color: #3b82f6;
  }

  .search-container input::placeholder {
    color: #64748b;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #64748b;
    font-size: 14px;
    pointer-events: none;
  }

  .search-results {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    margin-top: 4px;
    max-height: 280px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  .search-results.show {
    display: block;
  }

  .search-results .item {
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    transition: background 0.15s;
  }

  .search-results .item:hover {
    background: #334155;
  }

  .search-results .item .city-name {
    color: #e2e8f0;
  }

  .search-results .item .tz-name {
    color: #64748b;
    font-size: 12px;
  }

  /* Main */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Map */
  .map-section {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: grab;
  }

  .map-section:active {
    cursor: grabbing;
  }

  .map-svg {
    width: 100%;
    height: 100%;
    transition: transform 0.1s ease-out;
  }

  .map-svg .country {
    fill: #1e293b;
    stroke: #334155;
    stroke-width: 0.5;
    transition: fill 0.2s, stroke 0.2s;
    cursor: pointer;
  }

  .map-svg .country:hover {
    fill: #334155;
    stroke: #60a5fa;
  }

  .map-svg .country.selected {
    fill: #1d4ed8;
    stroke: #60a5fa;
    stroke-width: 1;
  }

  .map-svg .city-dot {
    fill: #ef4444;
    cursor: pointer;
    transition: r 0.2s, fill 0.2s;
  }

  .map-svg .city-dot:hover {
    r: 5;
    fill: #f87171;
  }

  .map-svg .city-dot.selected {
    r: 5;
    fill: #fbbf24;
  }

  .map-svg .city-label {
    fill: #94a3b8;
    font-size: 6px;
    pointer-events: none;
  }

  /* Timezone lines */
  .tz-line {
    stroke: #334155;
    stroke-width: 0.3;
    stroke-dasharray: 2,3;
    fill: none;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 12px 16px;
    pointer-events: none;
    z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    display: none;
    min-width: 180px;
  }

  .tooltip .tt-city {
    font-size: 15px;
    font-weight: 600;
    color: #e2e8f0;
    margin-bottom: 6px;
  }

  .tooltip .tt-time {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #60a5fa;
    margin-bottom: 4px;
  }

  .tooltip .tt-date {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 8px;
  }

  .tooltip .tt-details {
    font-size: 12px;
    color: #64748b;
    line-height: 1.6;
  }

  .tooltip .tt-add {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #334155;
    font-size: 11px;
    color: #3b82f6;
    text-align: center;
    cursor: pointer;
  }

  .tooltip .tt-add:hover {
    color: #60a5fa;
  }

  /* Sidebar */
  .sidebar {
    width: 340px;
    background: #1e293b;
    border-left: 1px solid #334155;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid #334155;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .sidebar-header h2 {
    font-size: 15px;
    font-weight: 600;
    color: #e2e8f0;
  }

  .sidebar-header .count {
    font-size: 12px;
    color: #64748b;
    background: #334155;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .sidebar-header .clear-btn {
    font-size: 12px;
    color: #64748b;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }

  .sidebar-header .clear-btn:hover {
    background: #334155;
    color: #e2e8f0;
  }

  .city-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  .city-card {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    position: relative;
    transition: border-color 0.2s;
  }

  .city-card:hover {
    border-color: #475569;
  }

  .city-card .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .city-card .card-city {
    font-size: 16px;
    font-weight: 600;
    color: #e2e8f0;
  }

  .city-card .card-tz {
    font-size: 12px;
    color: #64748b;
    margin-top: 2px;
  }

  .city-card .card-remove {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #64748b;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }

  .city-card .card-remove:hover {
    background: #334155;
    color: #ef4444;
  }

  .city-card .card-time {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #60a5fa;
    line-height: 1.2;
  }

  .city-card .card-date {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 8px;
  }

  .city-card .card-diff {
    font-size: 12px;
    color: #64748b;
  }

  .city-card .card-diff .diff-val {
    font-weight: 600;
  }

  .city-card .card-diff .diff-val.ahead {
    color: #4ade80;
  }

  .city-card .card-diff .diff-val.behind {
    color: #f87171;
  }

  .city-card .card-diff .diff-val.same {
    color: #94a3b8;
  }

  .city-card .card-bar {
    margin-top: 10px;
    height: 3px;
    background: #334155;
    border-radius: 2px;
    overflow: hidden;
  }

  .city-card .card-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .city-card .card-bar-fill.day {
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
  }

  .city-card .card-bar-fill.night {
    background: linear-gradient(90deg, #1e293b, #475569);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #64748b;
  }

  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  .empty-state p {
    font-size: 14px;
    line-height: 1.6;
  }

  .empty-state .hint {
    font-size: 12px;
    margin-top: 8px;
    color: #475569;
  }

  /* Quick add */
  .quick-add {
    padding: 12px 16px;
    border-top: 1px solid #334155;
    flex-shrink: 0;
  }

  .quick-add-title {
    font-size: 11px;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .quick-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .quick-tag {
    padding: 4px 10px;
    border-radius: 12px;
    background: #334155;
    color: #94a3b8;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border: none;
  }

  .quick-tag:hover {
    background: #475569;
    color: #e2e8f0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #475569; }

  /* Map controls */
  .map-controls {
    position: absolute;
    bottom: 16px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
  }

  .map-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #1e293b;
    color: #94a3b8;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: background 0.15s, color 0.15s;
  }

  .map-btn:hover {
    background: #334155;
    color: #e2e8f0;
  }

  /* Current time bar at bottom */
  .time-bar {
    background: #1e293b;
    border-top: 1px solid #334155;
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-shrink: 0;
    font-size: 13px;
  }

  .time-bar .label {
    color: #64748b;
    white-space: nowrap;
  }

  .time-bar .local-time {
    font-size: 16px;
    font-weight: 600;
    color: #60a5fa;
    font-variant-numeric: tabular-nums;
  }

  .time-bar .local-date {
    color: #94a3b8;
    font-size: 12px;
  }

  .time-bar .utc-info {
    margin-left: auto;
    color: #64748b;
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🌍 时区地图</h1>
    <span class="subtitle">点击地图或搜索城市添加时区对比</span>
    <div class="search-container">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="搜索城市 (如 Beijing, Tokyo, New York)...">
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <div class="main">
    <div class="map-section" id="mapSection">
      <svg class="map-svg" id="mapSvg" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet">
        <!-- Background -->
        <rect width="1000" height="500" fill="#0f172a" />
        <!-- Timezone lines -->
        <g id="tzLines"></g>
        <!-- Countries -->
        <g id="countries"></g>
        <!-- Cities -->
        <g id="cityDots"></g>
      </svg>
      <div class="map-controls">
        <button class="map-btn" id="zoomIn" title="放大">+</button>
        <button class="map-btn" id="zoomOut" title="缩小">−</button>
        <button class="map-btn" id="resetView" title="重置视图">↺</button>
      </div>
      <div class="tooltip" id="tooltip"></div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">
        <h2>时区对比</h2>
        <span class="count" id="cityCount">0 个城市</span>
        <button class="clear-btn" id="clearAll">清空</button>
      </div>
      <div class="city-list" id="cityList">
        <div class="empty-state" id="emptyState">
          <div class="icon">🕐</div>
          <p>点击地图上的城市点<br>或搜索添加城市</p>
          <p class="hint">点击城市后按住拖动可平移地图</p>
        </div>
      </div>
      <div class="quick-add">
        <div class="quick-add-title">快速添加</div>
        <div class="quick-tags" id="quickTags"></div>
      </div>
    </div>
  </div>

  <div class="time-bar">
    <span class="label">本地时间</span>
    <span class="local-time" id="localTime">--:--:--</span>
    <span class="local-date" id="localDate">----年--月--日</span>
    <span class="utc-info" id="utcInfo">UTC+0</span>
  </div>
</div>

// Quick add cities (most popular)
const QUICK_CITIES = ['北京', '东京', '纽约', '伦敦', '巴黎', '悉尼', '迪拜', '新加坡', '洛杉矶', '首尔', '莫斯科', '多伦多'];

// ============ State ============
let selectedCities = [];
let mapScale = 1;
let mapTranslateX = 0;
let mapTranslateY = 0;
let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let lastTranslateX = 0, lastTranslateY = 0;
let tooltipCity = null;

// ============ DOM ============
const mapSvg = document.getElementById('mapSvg');
const mapSection = document.getElementById('mapSection');
const tooltip = document.getElementById('tooltip');
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const cityList = document.getElementById('cityList');
const cityCountEl = document.getElementById('cityCount');
const emptyState = document.getElementById('emptyState');
const quickTags = document.getElementById('quickTags');
const localTimeEl = document.getElementById('localTime');
const localDateEl = document.getElementById('localDate');
const utcInfoEl = document.getElementById('utcInfo');

// ============ Utility ============
function getCityTimeInfo(tz) {
  const now = new Date();
  const opts = { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
  const dateOpts = { timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
  const time = now.toLocaleTimeString('zh-CN', opts);
  const date = now.toLocaleDateString('zh-CN', dateOpts);

  // Get UTC offset
  const tzName = Intl.DateTimeFormat('en', { timeZoneName: 'short', timeZone: tz })
    .formatToParts(now).find(p => p.type === 'timeZoneName')?.value || '';

  // Get timezone name
  const tzFullName = Intl.DateTimeFormat('en', { timeZoneName: 'long', timeZone: tz })
    .formatToParts(now).find(p => p.type === 'timeZoneName')?.value || tz;

  return { time, date, tzName, tzFullName };
}

function getOffsetDiff(tz1, tz2) {
  const now = Date.now();
  const fmt = (tz) => new Date(now).toLocaleString('en-US', { timeZone: tz, hour12: false });
  // Calculate difference in milliseconds
  const d1 = new Date(fmt(tz1));
  const d2 = new Date(fmt(tz2));
  return (d1 - d2);
}

function formatDiff(ms, tz) {
  const hours = Math.round(ms / (1000 * 60 * 60));
  if (hours === 0) return { text: '与本地相同', cls: 'same' };
  const abs = Math.abs(hours);
  const sign = hours > 0 ? '早' : '晚';
  const cls = hours > 0 ? 'ahead' : 'behind';
  return { text: `本地${abs}小时${sign}`, cls };
}

function getLocalOffset() {
  const offset = -new Date().getTimezoneOffset() / 60;
  return `UTC${offset >= 0 ? '+' : ''}${offset}`;
}

function getDayProgress(tz) {
  const now = new Date();
  const hours = parseFloat(now.toLocaleString('en-US', { timeZone: tz, hour: 'numeric', hour12: false }));
  return (hours % 24) / 24 * 100;
}

function isCitySelected(city) {
  return selectedCities.some(c => c.en === city.en);
}

function addCity(city) {
  if (isCitySelected(city)) return;
  selectedCities.push(city);
  updateCityList();
  renderCityDots();
}

function removeCity(en) {
  selectedCities = selectedCities.filter(c => c.en !== en);
  updateCityList();
  renderCityDots();
}

// ============ Render Map ============
function renderMap() {
  const countriesGroup = document.getElementById('countries');
  const tzLinesGroup = document.getElementById('tzLines');

  // Render timezone lines
  let tzLines = '';
  for (let tz = -12; tz <= 12; tz++) {
    const x = 500 + tz * (1000 / 24);
    tzLines += `<line class="tz-line" x1="${x}" y1="0" x2="${x}" y2="500" />`;
    // Label every 3 hours
    if (tz % 3 === 0 && tz !== 0) {
      const label = tz > 0 ? `UTC+${tz}` : `UTC${tz}`;
      tzLines += `<text x="${x}" y="12" fill="#475569" font-size="7" text-anchor="middle">${label}</text>`;
    }
  }
  // UTC line
  tzLines += `<line x1="500" y1="0" x2="500" y2="500" stroke="#475569" stroke-width="0.5" />`;
  tzLines += `<text x="500" y="12" fill="#60a5fa" font-size="7" text-anchor="middle" font-weight="bold">UTC</text>`;
  tzLinesGroup.innerHTML = tzLines;

  // Render continents
  let html = '';
  for (const [id, path] of Object.entries(CONTINENTS)) {
    html += `<path class="country" d="${path}" data-region="${id}" />`;
  }
  countriesGroup.innerHTML = html;
}

function renderCityDots() {
  const dotsGroup = document.getElementById('cityDots');
  let html = '';
  for (const city of CITIES) {
    const selected = isCitySelected(city) ? 'selected' : '';
    const label = isCitySelected(city) ? '' : `<text class="city-label" x="${city.cx}" y="${city.cy - 4}">${city.name}</text>`;
    html += `
      <circle class="city-dot ${selected}"
        cx="${city.cx}" cy="${city.cy}" r="3"
        data-city="${city.en}"
        data-name="${city.name}"
        data-tz="${city.tz}"
        data-country="${city.country}" />
      ${label}
    `;
  }
  dotsGroup.innerHTML = html;

  // Bind events
  dotsGroup.querySelectorAll('.city-dot').forEach(dot => {
    dot.addEventListener('mouseenter', onCityHover);
    dot.addEventListener('mouseleave', onCityLeave);
    dot.addEventListener('click', onCityClick);
  });
}

// ============ City Interactions ============
function onCityHover(e) {
  const dot = e.target;
  const city = CITIES.find(c => c.en === dot.dataset.city);
  if (!city) return;

  const info = getCityTimeInfo(city.tz);
  const diff = formatDiff(getOffsetDiff(city.tz, Intl.DateTimeFormat().resolvedOptions().timeZone), city.tz);

  tooltip.innerHTML = `
    <div class="tt-city">${city.name} (${city.country})</div>
    <div class="tt-time">${info.time}</div>
    <div class="tt-date">${info.date}</div>
    <div class="tt-details">
      时区: ${info.tzName}<br>
      ${info.tzFullName}<br>
      ${diff.text}
    </div>
    <div class="tt-add" data-add="${city.en}">${isCitySelected(city) ? '已添加到对比' : '点击添加到对比'}</div>
  `;
  tooltip.style.display = 'block';

  tooltipCity = city;
  positionTooltip(e);
}

function onCityLeave() {
  tooltip.style.display = 'none';
  tooltipCity = null;
}

function onCityClick(e) {
  e.stopPropagation();
  const dot = e.target;
  const city = CITIES.find(c => c.en === dot.dataset.city);
  if (!city) return;

  if (isCitySelected(city)) {
    removeCity(city.en);
  } else {
    addCity(city);
  }
}

function positionTooltip(e) {
  const rect = mapSection.getBoundingClientRect();
  let x = e.clientX + 15;
  let y = e.clientY + 15;

  // Keep tooltip in viewport
  const ttRect = tooltip.getBoundingClientRect();
  if (x + 200 > window.innerWidth) x = e.clientX - 200;
  if (y + 200 > window.innerHeight) y = e.clientY - 200;

  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

// Tooltip click handler for add button
tooltip.addEventListener('click', (e) => {
  if (e.target.dataset.add) {
    const city = CITIES.find(c => c.en === e.target.dataset.add);
    if (city) {
      if (isCitySelected(city)) {
        removeCity(city.en);
      } else {
        addCity(city);
      }
      tooltip.style.display = 'none';
    }
  }
});

// Move tooltip with mouse on map section
mapSection.addEventListener('mousemove', (e) => {
  if (tooltipCity) {
    positionTooltip(e);
  }
});

// ============ Search ============
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) {
    searchResults.classList.remove('show');
    return;
  }
  const matches = CITIES.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.en.toLowerCase().includes(q) ||
    c.country.toLowerCase().includes(q)
  ).slice(0, 12);

  if (matches.length === 0) {
    searchResults.innerHTML = '<div class="item"><span class="city-name">未找到匹配的城市</span></div>';
  } else {
    searchResults.innerHTML = matches.map(c => `
      <div class="item" data-en="${c.en}">
        <span class="city-name">${c.name} (${c.country})</span>
        <span class="tz-name">${c.tz}</span>
      </div>
    `).join('');
  }
  searchResults.classList.add('show');
});

searchResults.addEventListener('click', (e) => {
  const item = e.target.closest('.item');
  if (!item || !item.dataset.en) return;
  const city = CITIES.find(c => c.en === item.dataset.en);
  if (city) {
    addCity(city);
    searchInput.value = '';
    searchResults.classList.remove('show');
  }
});

// Close search on click outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-container')) {
    searchResults.classList.remove('show');
  }
});

// ============ City List ============
function updateCityList() {
  if (selectedCities.length === 0) {
    cityList.innerHTML = '';
    cityList.appendChild(emptyState);
    emptyState.style.display = '';
    cityCountEl.textContent = '0 个城市';
    return;
  }

  emptyState.style.display = 'none';
  cityCountEl.textContent = `${selectedCities.length} 个城市`;

  cityList.innerHTML = selectedCities.map(city => {
    const info = getCityTimeInfo(city.tz);
    const diff = formatDiff(getOffsetDiff(city.tz, Intl.DateTimeFormat().resolvedOptions().timeZone), city.tz);
    const progress = getDayProgress(city.tz);
    const isDay = progress >= 25 && progress <= 75;
    const barClass = isDay ? 'day' : 'night';

    return `
      <div class="city-card" data-en="${city.en}">
        <div class="card-header">
          <div>
            <div class="card-city">${city.name} <span style="font-weight:400;color:#64748b;font-size:13px">(${city.country})</span></div>
            <div class="card-tz">${city.tz} · ${info.tzFullName}</div>
          </div>
          <button class="card-remove" data-remove="${city.en}" title="移除">✕</button>
        </div>
        <div class="card-time" data-time="${city.en}">${info.time}</div>
        <div class="card-date" data-date="${city.en}">${info.date}</div>
        <div class="card-diff">
          <span class="diff-val ${diff.cls}">${diff.text}</span>
        </div>
        <div class="card-bar">
          <div class="card-bar-fill ${barClass}" style="width:${progress}%"></div>
        </div>
      </div>
    `;
  }).join('');

  // Bind remove buttons
  cityList.querySelectorAll('.card-remove').forEach(btn => {
    btn.addEventListener('click', () => removeCity(btn.dataset.remove));
  });
}

// ============ Quick Add ============
function renderQuickTags() {
  quickTags.innerHTML = QUICK_CITIES.map(name => {
    const city = CITIES.find(c => c.name === name);
    if (!city) return '';
    return `<button class="quick-tag" data-en="${city.en}">${name}</button>`;
  }).join('');

  quickTags.querySelectorAll('.quick-tag').forEach(btn => {
    btn.addEventListener('click', () => {
      const city = CITIES.find(c => c.en === btn.dataset.en);
      if (city) addCity(city);
    });
  });
}

// ============ Map Controls ============
document.getElementById('zoomIn').addEventListener('click', () => {
  mapScale = Math.min(mapScale * 1.3, 5);
  updateMapTransform();
});

document.getElementById('zoomOut').addEventListener('click', () => {
  mapScale = Math.max(mapScale / 1.3, 0.5);
  updateMapTransform();
});

document.getElementById('resetView').addEventListener('click', () => {
  mapScale = 1;
  mapTranslateX = 0;
  mapTranslateY = 0;
  updateMapTransform();
});

function updateMapTransform() {
  mapSvg.style.transform = `translate(${mapTranslateX}px, ${mapTranslateY}px) scale(${mapScale})`;
  mapSvg.style.transformOrigin = 'center center';
}

// ============ Drag ============
mapSection.addEventListener('mousedown', (e) => {
  if (e.target.closest('.city-dot')) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  lastTranslateX = mapTranslateX;
  lastTranslateY = mapTranslateY;
  mapSection.style.cursor = 'grabbing';
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  mapTranslateX = lastTranslateX + (e.clientX - dragStartX);
  mapTranslateY = lastTranslateY + (e.clientY - dragStartY);
  updateMapTransform();
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  mapSection.style.cursor = 'grab';
});

// Mouse wheel zoom
mapSection.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  mapScale = Math.max(0.5, Math.min(5, mapScale * delta));
  updateMapTransform();
}, { passive: false });

// ============ Time Updates ============
function updateTimeDisplay() {
  // Update local time bar
  const now = new Date();
  localTimeEl.textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  localDateEl.textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  utcInfoEl.textContent = getLocalOffset();

  // Update all city cards
  selectedCities.forEach(city => {
    const info = getCityTimeInfo(city.tz);
    const diff = formatDiff(getOffsetDiff(city.tz, Intl.DateTimeFormat().resolvedOptions().timeZone), city.tz);
    const progress = getDayProgress(city.tz);
    const isDay = progress >= 25 && progress <= 75;
    const barClass = isDay ? 'day' : 'night';

    const card = cityList.querySelector(`[data-en="${city.en}"]`);
    if (!card) return;

    const timeEl = card.querySelector(`[data-time="${city.en}"]`);
    const dateEl = card.querySelector(`[data-date="${city.en}"]`);
    const diffEl = card.querySelector('.diff-val');
    const barEl = card.querySelector('.card-bar-fill');

    if (timeEl) timeEl.textContent = info.time;
    if (dateEl) dateEl.textContent = info.date;
    if (diffEl) {
      diffEl.textContent = diff.text;
      diffEl.className = `diff-val ${diff.cls}`;
    }
    if (barEl) {
      barEl.style.width = `${progress}%`;
      barEl.className = `card-bar-fill ${barClass}`;
    }
  });
}

// Update every second
setInterval(updateTimeDisplay, 1000);
updateTimeDisplay();

// ============ Clear All ============
document.getElementById('clearAll').addEventListener('click', () => {
  selectedCities = [];
  updateCityList();
  renderCityDots();
});

// ============ Init ============
renderMap();
renderCityDots();
renderQuickTags();
updateCityList();
</script>
