<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时区地图 - Timezone Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0e1a;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    display: flex;
  }

  /* 左侧地图区域 */
  .map-section {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .map-wrapper {
    position: relative;
    transition: transform 0.3s ease;
  }

  #world-map {
    filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.15));
  }

  /* 城市标记点 */
  .city-marker {
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #3b82f6;
    border: 2px solid #fff;
    cursor: pointer;
    transform: translate(-50%, -50%);
    transition: all 0.2s ease;
    z-index: 10;
  }
  .city-marker:hover {
    transform: translate(-50%, -50%) scale(1.5);
    box-shadow: 0 0 16px rgba(59, 130, 246, 0.8);
  }
  .city-marker.selected {
    background: #f59e0b;
    border-color: #fff;
    box-shadow: 0 0 20px rgba(245, 158, 11, 0.8);
    transform: translate(-50%, -50%) scale(1.6);
  }
  .city-marker .tooltip {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid rgba(59, 130, 246, 0.3);
    border-radius: 8px;
    padding: 6px 12px;
    white-space: nowrap;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 100;
    margin-bottom: 6px;
  }
  .city-marker:hover .tooltip {
    opacity: 1;
  }

  /* 右侧面板 */
  .panel {
    width: 380px;
    background: #111827;
    border-left: 1px solid #1e293b;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .panel-header {
    padding: 20px 24px;
    border-bottom: 1px solid #1e293b;
    background: #0f172a;
  }
  .panel-header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 4px;
  }
  .panel-header p {
    font-size: 13px;
    color: #64748b;
  }

  .now-time {
    padding: 20px 24px;
    border-bottom: 1px solid #1e293b;
    text-align: center;
  }
  .now-time .label {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 6px;
  }
  .now-time .time {
    font-size: 36px;
    font-weight: 700;
    color: #f1f5f9;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
  }
  .now-time .date {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 4px;
  }

  .search-box {
    padding: 16px 24px;
    border-bottom: 1px solid #1e293b;
  }
  .search-box input {
    width: 100%;
    padding: 10px 14px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus {
    border-color: #3b82f6;
  }
  .search-box input::placeholder {
    color: #64748b;
  }

  .city-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
  }
  .city-list::-webkit-scrollbar { width: 6px; }
  .city-list::-webkit-scrollbar-track { background: transparent; }
  .city-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

  .city-card {
    margin: 6px 16px;
    padding: 16px;
    background: #1e293b;
    border-radius: 12px;
    border: 1px solid transparent;
    transition: all 0.2s;
    cursor: pointer;
  }
  .city-card:hover {
    border-color: #3b82f6;
    background: #263346;
  }
  .city-card .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .city-card .city-name {
    font-size: 16px;
    font-weight: 600;
    color: #f1f5f9;
  }
  .city-card .remove-btn {
    background: none;
    border: none;
    color: #64748b;
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.2s;
  }
  .city-card .remove-btn:hover { color: #ef4444; }

  .city-card .time-display {
    font-size: 28px;
    font-weight: 700;
    color: #60a5fa;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .city-card .info-row {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: #94a3b8;
  }
  .city-card .info-row span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .city-card .info-row .tag {
    background: #0f172a;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
  }

  /* 时差对比 */
  .diff-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .diff-badge.ahead { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
  .diff-badge.behind { background: rgba(239, 68, 68, 0.15); color: #f87171; }
  .diff-badge.same { background: rgba(148, 163, 184, 0.15); color: #94a3b8; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #64748b;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* 夜间指示器 */
  .night-overlay {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    opacity: 0.25;
    z-index: 5;
    transition: opacity 0.5s;
  }

  /* 动画 */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .city-marker.selected {
    animation: pulse 2s ease-in-out infinite;
  }
</style>

  { id: 'syd', name: '悉尼', en: 'Sydney', tz: 'Australia/Sydney', x: 880, y: 380, offset: 11 },
  { id: 'mel', name: '墨尔本', en: 'Melbourne', tz: 'Australia/Melbourne', x: 870, y: 400, offset: 11 },
  { id: 'per', name: '珀斯', en: 'Perth', tz: 'Australia/Perth', x: 780, y: 360, offset: 8 },
  { id: 'bri', name: '布里斯班', en: 'Brisbane', tz: 'Australia/Brisbane', x: 895, y: 365, offset: 10 },
  { id: 'auc', name: '奥克兰', en: 'Auckland', tz: 'Pacific/Auckland', x: 930, y: 420, offset: 13 },
  { id: 'fij', name: '苏瓦', en: 'Suva', tz: 'Pacific/Fiji', x: 905, y: 360, offset: 12 },
  { id: 'nok', name: '努美阿', en: 'Nouméa', tz: 'Pacific/Noumea', x: 900, y: 390, offset: 11 },

  // 太平洋
  { id: 'hon', name: '火奴鲁鲁', en: 'Honolulu', tz: 'Pacific/Honolulu', x: 100, y: 200, offset: -10 },
  { id: 'pai', name: '帕皮提', en: 'Papeete', tz: 'Pacific/Tahiti', x: 140, y: 280, offset: -10 },
  { id: 'api', name: '阿皮亚', en: 'Apia', tz: 'Pacific/Apia', x: 970, y: 310, offset: 13 },
  { id: 'nof', name: '努库阿洛法', en: "Nuku'alofa", tz: 'Pacific/Tongatapu', x: 975, y: 340, offset: 13 },
];

// ===== 状态 =====
let selectedCities = [];
let searchResults = [];
const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
const weekdaysEn = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

// ===== 初始化 =====
function init() {
  renderMarkers();
  updateLocalTime();
  setInterval(updateLocalTime, 1000);
  setInterval(updateAllCityTimes, 1000);
  setupSearch();
}

// ===== 渲染地图标记 =====
function renderMarkers() {
  const wrapper = document.getElementById('mapWrapper');
  // 清除已有标记
  wrapper.querySelectorAll('.city-marker').forEach(el => el.remove());

  cities.forEach(city => {
    const marker = document.createElement('div');
    marker.className = 'city-marker';
    marker.dataset.id = city.id;
    marker.style.left = city.x + 'px';
    marker.style.top = city.y + 'px';

    const tooltip = document.createElement('span');
    tooltip.className = 'tooltip';
    tooltip.textContent = `${city.name} (${city.en})`;
    marker.appendChild(tooltip);

    marker.addEventListener('click', () => toggleCity(city));
    wrapper.appendChild(marker);
  });
}

// ===== 切换城市选中状态 =====
function toggleCity(city) {
  const idx = selectedCities.findIndex(c => c.id === city.id);
  if (idx >= 0) {
    selectedCities.splice(idx, 1);
  } else {
    selectedCities.push(city);
  }
  updateMarkerStyles();
  renderCityList();
}

function updateMarkerStyles() {
  document.querySelectorAll('.city-marker').forEach(marker => {
    const id = marker.dataset.id;
    const isSelected = selectedCities.some(c => c.id === id);
    marker.classList.toggle('selected', isSelected);
  });
}

// ===== 渲染城市列表 =====
function renderCityList() {
  const list = document.getElementById('cityList');
  const emptyState = document.getElementById('emptyState');

  if (selectedCities.length === 0) {
    emptyState.style.display = 'block';
    list.querySelectorAll('.city-card').forEach(el => el.remove());
    return;
  }
  emptyState.style.display = 'none';

  // 清除旧卡片
  list.querySelectorAll('.city-card').forEach(el => el.remove());

  selectedCities.forEach(city => {
    const card = createCityCard(city);
    list.appendChild(card);
  });
}

function createCityCard(city) {
  const card = document.createElement('div');
  card.className = 'city-card';
  card.dataset.id = city.id;

  const localOffset = -new Date().getTimezoneOffset() / 60;
  const diff = city.offset - localOffset;

  let diffText, diffClass;
  if (diff > 0) {
    diffText = `+${diff}h`;
    diffClass = 'ahead';
  } else if (diff < 0) {
    diffText = `${diff}h`;
    diffClass = 'behind';
  } else {
    diffText = '0h';
    diffClass = 'same';
  }

  card.innerHTML = `
    <div class="card-header">
      <span class="city-name">${city.name}</span>
      <button class="remove-btn" data-id="${city.id}">&times;</button>
    </div>
    <div class="time-display" data-tz="${city.tz}">--:--:--</div>
    <div class="info-row">
      <span class="tag">${city.en}</span>
      <span>${city.tz.replace('_', ' ')}</span>
      <span class="diff-badge ${diffClass}">本地${diff > 0 ? '早' : diff < 0 ? '晚' : ''} ${diffText}</span>
    </div>
  `;

  // 删除按钮
  card.querySelector('.remove-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleCity(city);
  });

  return card;
}

// ===== 时间更新 =====
function updateLocalTime() {
  const now = new Date();
  const timeEl = document.getElementById('localTime');
  const dateEl = document.getElementById('localDate');
  timeEl.textContent = formatTime(now);
  dateEl.textContent = formatDate(now);
}

function updateAllCityTimes() {
  const cards = document.querySelectorAll('.city-card');
  cards.forEach(card => {
    const tz = card.querySelector('.time-display').dataset.tz;
    const timeEl = card.querySelector('.time-display');
    try {
      const now = new Date();
      const options = { timeZone: tz, hour12: false };
      const timeStr = now.toLocaleTimeString('zh-CN', {
        ...options,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      timeEl.textContent = timeStr;
    } catch (e) {
      timeEl.textContent = '--:--:--';
    }
  });
}

function formatTime(date) {
  return date.toLocaleTimeString('zh-CN', { hour12: false });
}

function formatDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  const w = weekdays[date.getDay()];
  return `${y}年${m}月${d}日 星期${w}`;
}

// ===== 搜索功能 =====
function setupSearch() {
  const input = document.getElementById('searchInput');
  const list = document.getElementById('cityList');

  input.addEventListener('input', () => {
    const query = input.value.trim().toLowerCase();
    if (!query) {
      hideSearchResults();
      return;
    }

    const results = cities.filter(c =>
      c.name.toLowerCase().includes(query) ||
      c.en.toLowerCase().includes(query)
    );

    showSearchResults(results);
  });

  input.addEventListener('focus', () => {
    if (input.value.trim()) {
      const query = input.value.trim().toLowerCase();
      const results = cities.filter(c =>
        c.name.toLowerCase().includes(query) ||
        c.en.toLowerCase().includes(query)
      );
      showSearchResults(results);
    }
  });

  // 点击外部关闭搜索
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-box')) {
      hideSearchResults();
    }
  });
}

function showSearchResults(results) {
  hideSearchResults();
  const list = document.getElementById('cityList');

  results.forEach(city => {
    const alreadyAdded = selectedCities.some(c => c.id === city.id);
    const item = document.createElement('div');
    item.className = 'city-card';
    if (alreadyAdded) item.style.opacity = '0.5';

    const localOffset = -new Date().getTimezoneOffset() / 60;
    const diff = city.offset - localOffset;
    let diffText, diffClass;
    if (diff > 0) { diffText = `+${diff}h`; diffClass = 'ahead'; }
    else if (diff < 0) { diffText = `${diff}h`; diffClass = 'behind'; }
    else { diffText = '0h'; diffClass = 'same'; }

    item.innerHTML = `
      <div class="card-header">
        <span class="city-name">${city.name} ${alreadyAdded ? '(已添加)' : ''}</span>
      </div>
      <div class="info-row">
        <span class="tag">${city.en}</span>
        <span>${city.tz.replace('_', ' ')}</span>
        <span class="diff-badge ${diffClass}">${diff > 0 ? '早' : diff < 0 ? '晚' : ''} ${diffText}</span>
      </div>
    `;
    item.addEventListener('click', () => {
      if (!alreadyAdded) {
        toggleCity(city);
      }
      document.getElementById('searchInput').value = '';
      hideSearchResults();
    });
    list.insertBefore(item, list.firstChild);
  });
}

function hideSearchResults() {
  const list = document.getElementById('cityList');
  list.querySelectorAll('.city-card.search-result').forEach(el => el.remove());
}

// 启动
init();
</script>
