    cursor: crosshair;
    min-width: 400px;

    width: 100%;
    height: 100%;
  }
  .map-wrap .country {
    fill: #1e2a47;
    stroke: #3a4a6a;
    stroke-width: 0.5;
    transition: fill .2s, filter .2s;
    cursor: pointer;
  }
  .map-wrap .country:hover {
    fill: #2d4a7a;
    filter: drop-shadow(0 0 8px rgba(76, 201, 240, 0.4));
  }
  .map-wrap .country.selected {
    fill: #4361ee;
  }
  .map-wrap .dot {
    fill: #f72585;
    stroke: #fff;
    stroke-width: 1.5;
    pointer-events: none;
    opacity: 0;
    animation: dotPop .3s ease forwards;
  }
  @keyframes dotPop {
    0% { opacity: 0; transform: scale(0); }
    100% { opacity: 1; transform: scale(1); }
  }
  .tooltip {
    position: absolute;
    background: #1a2340ee;
    border: 1px solid #4361ee;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    pointer-events: none;
    z-index: 100;
    backdrop-filter: blur(10px);
    max-width: 280px;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);

  }

    color: #b8c4d8;
    margin-top: 4px;
  }

    display: flex;
    gap: 6px;
  }
  .tooltip .tt-btn {

    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid #4361ee;
    background: transparent;

// ============ UTILITIES ============
function formatTime(date, tz) {
  return date.toLocaleTimeString('zh-CN', {
    timeZone: tz,
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  });
}

function formatDate(date, tz) {
  return date.toLocaleDateString('zh-CN', {
    timeZone: tz,
    year: 'numeric', month: '2-digit', day: '2-digit',
    weekday: 'short'
  });
}

function getTzOffset(tz) {
  const now = new Date();
  const fmt = new Intl.DateTimeFormat('en-US', {
    timeZone: tz,
    timeZoneName: 'shortOffset'
  });
  const parts = fmt.formatToParts(now);
  const tzPart = parts.find(p => p.type === 'timeZoneName');
  return tzPart ? tzPart.value : '';
}

function getTzFullName(tz) {
  try {
    const now = new Date();
    const fmt = new Intl.DateTimeFormat('zh-CN', {
      timeZone: tz,
      timeZoneName: 'long'
    });
    const parts = fmt.formatToParts(now);
    const tzPart = parts.find(p => p.type === 'timeZoneName');
    return tzPart ? tzPart.value : tz;
  } catch { return tz; }
}

function timeDiffMinutes(tz1, tz2) {
  const now = Date.now();
  const d1 = new Date(now).toLocaleString('en-US', { timeZone: tz1 });
  const d2 = new Date(now).toLocaleString('en-US', { timeZone: tz2 });
  const t1 = new Date(d1);
  const t2 = new Date(d2);
  return Math.round((t2 - t1) / 60000);
}

function formatDiff(minutes) {
  if (minutes === 0) return '相同';
  const h = Math.floor(Math.abs(minutes) / 60);
  const m = Math.abs(minutes) % 60;
  let txt = '';
  if (h > 0) txt += h + '小时';
  if (m > 0) txt += m + '分钟';
  txt = minutes > 0 ? '早 ' + txt : '晚 ' + txt;
  return txt;
}

function findNearestCity(lng, lat) {
  let best = null;
  let bestDist = Infinity;
  for (const c of CITIES) {
    const dx = c.lng - lng;
    const dy = c.lat - lat;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < bestDist) { bestDist = d; best = c; }
  }
  return bestDist < 20 ? best : null; // threshold ~20 degrees
}

// lat/lng to SVG coordinates
function geoToSvg(lng, lat) {
  const x = ((lng + 180) / 360) * 1000;
  const y = ((90 - lat) / 180) * 500;
  return { x, y };
}

// ============ INIT ============
function init() {
  document.getElementById('mapWrap').innerHTML = MAP_SVG;
  renderCityDots();
  bindMapEvents();
  bindSearch();
  startClock();
  // Add Beijing as default
  addCity('bj');
}

function renderCityDots() {
  const g = document.getElementById('cityDots');
  g.innerHTML = CITIES.map(c => {
    const { x, y } = geoToSvg(c.lng, c.lat);
    return `<circle class="dot city-dot" data-id="${c.id}" cx="${x}" cy="${y}" r="4" fill="#f72585" opacity="0"/>`;
  }).join('');
}

function bindMapEvents() {
  const wrap = document.getElementById('mapWrap');
  const tooltip = document.getElementById('tooltip');
  const svg = wrap.querySelector('svg');

  wrap.addEventListener('mousemove', e => {
    const rect = svg.getBoundingClientRect();
    const scaleX = 1000 / rect.width;
    const scaleY = 500 / rect.height;
    const svgX = (e.clientX - rect.left) * scaleX;
    const svgY = (e.clientY - rect.top) * scaleY;

    // Convert to geo
    const lng = (svgX / 1000) * 360 - 180;
    const lat = 90 - (svgY / 500) * 180;

    const city = findNearestCity(lng, lat);
    if (city) {
      hoverCity = city;
      showTooltip(city, e.clientX, e.clientY);
      highlightDot(city.id, true);
    } else {
      hoverCity = null;
      hideTooltip();
      highlightDot(null, false);
    }
  });

  wrap.addEventListener('mouseleave', () => {
    hoverCity = null;
    hideTooltip();
    highlightDot(null, false);
  });

  wrap.addEventListener('click', () => {
    if (hoverCity) {
      addCity(hoverCity.id);
    }
  });
}

function highlightDot(cityId, on) {
  const dots = document.querySelectorAll('.city-dot');
  dots.forEach(d => {
    if (d.dataset.id === cityId) {
      d.setAttribute('opacity', on ? '1' : (selectedCities.some(c => c.id === cityId) ? '0.7' : '0'));
      d.setAttribute('r', on ? '6' : '4');
    } else if (!on) {
      d.setAttribute('opacity', selectedCities.some(c => c.id === d.dataset.id) ? '0.7' : '0');
      d.setAttribute('r', '4');
    }
  });
}

// ============ TOOLTIP ============
function showTooltip(city, px, py) {
  const tt = document.getElementById('tooltip');
  const now = new Date();
  document.getElementById('ttName').textContent = city.name + ' · ' + city.country;
  document.getElementById('ttTime').textContent = formatTime(now, city.tz);
  document.getElementById('ttDate').textContent = formatDate(now, city.tz);
  document.getElementById('ttTz').textContent = getTzFullName(city.tz);

  // Position
  const wrap = document.getElementById('mapWrap');
  const rect = wrap.getBoundingClientRect();
  let left = px - rect.left + 15;
  let top = py - rect.top + 15;
  if (left + 290 > rect.width) left = px - rect.left - 290;
  if (top + 200 > rect.height) top = py - rect.top - 120;

  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
  tt.style.display = 'block';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

// ============ CITY LIST ============
function addCity(cityId) {
  if (selectedCities.some(c => c.id === cityId)) return;
  const city = CITIES.find(c => c.id === cityId);
  if (!city) return;
  selectedCities.push(city);
  renderCityList();
  highlightDot(cityId, false);
  hideTooltip();
}

function removeCity(cityId) {
  selectedCities = selectedCities.filter(c => c.id !== cityId);
  renderCityList();
  highlightDot(cityId, false);
}

function clearAll() {
  selectedCities = [];
  renderCityList();
  document.querySelectorAll('.city-dot').forEach(d => d.setAttribute('opacity', '0'));
}

function addToComparison() {
  if (hoverCity) addCity(hoverCity.id);
}

function renderCityList() {
  const list = document.getElementById('cityList');
  const countEl = document.getElementById('cityCount');
  countEl.textContent = selectedCities.length;

  if (selectedCities.length === 0) {
    list.innerHTML = `<div class="empty-hint">
      <div class="icon">🌍</div>
      点击地图或搜索添加城市
    </div>`;
    return;
  }

  const now = new Date();
  const refTz = selectedCities[0].tz;

  list.innerHTML = selectedCities.map(city => {
    const diffs = selectedCities
      .filter(c => c.id !== city.id)
      .slice(0, 5)
      .map(c => {
        const diff = timeDiffMinutes(city.tz, c.tz);
        return {
          name: c.name,
          diff: diff,
          cls: diff > 0 ? 'early' : (diff < 0 ? 'later' : '')
        };
      });

    return `<div class="city-card" data-id="${city.id}">
      <div class="cc-header">
        <span class="cc-name">${city.name} · ${city.country}</span>
        <button class="cc-remove" onclick="removeCity('${city.id}')">&times;</button>
      </div>
      <div class="cc-time" data-tz="${city.tz}">${formatTime(now, city.tz)}</div>
      <div class="cc-date" data-tz="${city.tz}">${formatDate(now, city.tz)}</div>
      <div class="cc-tz">${getTzFullName(city.tz)}</div>
      ${diffs.length > 0 ? `<div class="cc-diff">
        ${diffs.map(d => `<div class="diff-row">
          <span class="diff-label">vs ${d.name}</span>
          <span class="diff-val ${d.cls}">${formatDiff(d.diff)}</span>
        </div>`).join('')}
      </div>` : ''}
    </div>`;
  }).join('');
}

// ============ SEARCH ============
function bindSearch() {
  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (!q) { results.classList.remove('show'); return; }

    const matches = CITIES.filter(c =>
      c.name.toLowerCase().includes(q) || c.country.toLowerCase().includes(q)
    ).slice(0, 10);

    if (matches.length === 0) {
      results.innerHTML = '<div class="sr-item"><span>无匹配结果</span></div>';
    } else {
      results.innerHTML = matches.map(c =>
        `<div class="sr-item" data-id="${c.id}">
          <span class="sr-name">${c.name} · ${c.country}</span>
          <span class="sr-tz">${getTzOffset(c.tz)}</span>
        </div>`
      ).join('');
    }
    results.classList.add('show');
  });

  results.addEventListener('click', e => {
    const item = e.target.closest('.sr-item');
    if (item && item.dataset.id) {
      addCity(item.dataset.id);
      input.value = '';
      results.classList.remove('show');
    }
  });

  input.addEventListener('blur', () => {
    setTimeout(() => results.classList.remove('show'), 200);
  });
}

// ============ CLOCK ============
function startClock() {
  tick();
  tickInterval = setInterval(tick, 1000);
}

function tick() {
  const now = new Date();
  // Update sidebar times
  document.querySelectorAll('.cc-time').forEach(el => {
    el.textContent = formatTime(now, el.dataset.tz);
  });
  document.querySelectorAll('.cc-date').forEach(el => {
    el.textContent = formatDate(now, el.dataset.tz);
  });
  // Update tooltip if visible
  const tt = document.getElementById('tooltip');
  if (tt.style.display !== 'none' && hoverCity) {
    document.getElementById('ttTime').textContent = formatTime(now, hoverCity.tz);
    document.getElementById('ttDate').textContent = formatDate(now, hoverCity.tz);
  }
}

// ============ START ============
init();
</script>
