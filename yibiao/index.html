<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>实时车辆追踪仪表盘</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>" />
</head>
<body>
  <!-- 顶部导航栏 -->
  <header class="navbar">
    <div class="navbar-brand">
      <svg class="logo-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      <h1>车辆追踪仪表盘</h1>
    </div>
    <div class="navbar-status">
      <span id="ws-status" class="status-badge status-disconnected">
        <span class="status-dot"></span>未连接
      </span>
      <span id="clock" class="clock"></span>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="dashboard">
    <!-- 左侧面板 -->
    <aside class="sidebar">
      <!-- 车辆列表 -->
      <section class="panel vehicle-list-panel">
        <h2 class="panel-title">车辆列表</h2>
        <div id="vehicle-list" class="vehicle-list">
          <div class="loading-placeholder">等待连接...</div>
        </div>
      </section>

      <!-- 警报面板 -->
      <section class="panel alerts-panel">
        <h2 class="panel-title">
          🚨 警报
          <span id="alert-count" class="badge" style="display:none;">0</span>
        </h2>
        <div id="alerts-list" class="alerts-list">
          <div class="no-alerts">暂无警报</div>
        </div>
      </section>
    </aside>

    <!-- 中央内容 -->
    <div class="main-content">
      <!-- 地图 -->
      <section class="map-section">
        <div class="map-toolbar">
          <button class="btn btn-sm" id="btn-center-all" title="居中所有车辆">全部居中</button>
          <button class="btn btn-sm" id="btn-follow" title="跟随选中车辆">跟随</button>
          <button class="btn btn-sm" id="btn-show-routes" title="显示/隐藏路线">路线</button>
        </div>
        <div id="map" class="map-container"></div>
      </section>

      <!-- 历史回放 -->
      <section class="panel playback-panel">
        <div class="playback-header">
          <h2 class="panel-title">历史回放</h2>
          <div class="playback-controls">
            <label>车辆:
              <select id="playback-vehicle"></select>
            </label>
            <label>时间范围:
              <select id="playback-range">
                <option value="5">最近 5 分钟</option>
                <option value="15">最近 15 分钟</option>
                <option value="30" selected>最近 30 分钟</option>
                <option value="60">最近 1 小时</option>
                <option value="120">最近 2 小时</option>
              </select>
            </label>
            <div class="playback-buttons">
              <button class="btn btn-sm" id="btn-playback-load">加载</button>
              <button class="btn btn-sm btn-accent" id="btn-playback-play" disabled>▶ 播放</button>
              <button class="btn btn-sm" id="btn-playback-stop" disabled>■ 停止</button>
              <input type="range" id="playback-speed" min="1" max="20" value="5" title="播放速度" />
              <span class="speed-label" id="playback-speed-label">5x</span>
            </div>
          </div>
        </div>
        <div id="playback-progress-bar" class="playback-progress" style="display:none;">
          <div id="playback-progress-fill" class="playback-progress-fill"></div>
          <span id="playback-time-label" class="playback-time-label"></span>
        </div>
      </section>
    </div>

    <!-- 右侧面板 -->
    <aside class="sidebar sidebar-right">
      <!-- 速度图表 -->
      <section class="panel chart-panel">
        <h2 class="panel-title">速度趋势 (km/h)</h2>
        <div class="chart-container">
          <canvas id="speed-chart"></canvas>
        </div>
      </section>

      <!-- 距离/统计 -->
      <section class="panel chart-panel">
        <h2 class="panel-title">行驶统计</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">总里程</div>
            <div class="stat-value" id="stat-distance">0 km</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">平均速度</div>
            <div class="stat-value" id="stat-avg-speed">0 km/h</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">最高速度</div>
            <div class="stat-value" id="stat-max-speed">0 km/h</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">超速次数</div>
            <div class="stat-value" id="stat-overspeed">0</div>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="distance-chart"></canvas>
        </div>
      </section>

      <!-- 车辆详情 -->
      <section class="panel detail-panel" id="vehicle-detail" style="display:none;">
        <h2 class="panel-title">车辆详情</h2>
        <div class="detail-content" id="detail-content"></div>
      </section>
    </aside>
  </main>

  <!-- 警报弹窗 -->
  <div id="alert-toast-container" class="alert-toast-container"></div>

  <!-- JS 依赖 -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
