<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子鱼缸</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-family: 'Arial', sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐠 电子鱼缸 🐠</h1>
        <svg id="fishTank" width="800" height="600" viewBox="0 0 800 600">
            <defs>
                <!-- 玻璃反光渐变 -->
                <linearGradient id="glassReflection" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:white;stop-opacity:0.3" />
                    <stop offset="50%" style="stop-color:white;stop-opacity:0.05" />
                    <stop offset="100%" style="stop-color:white;stop-opacity:0.2" />
                </linearGradient>

                <!-- 水的渐变 -->
                <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:0.6" />
                    <stop offset="100%" style="stop-color:#2c5282;stop-opacity:0.8" />
                </linearGradient>

                <!-- 金鱼身体渐变 -->
                <radialGradient id="goldFishBody" cx="50%" cy="30%" r="60%">
                    <stop offset="0%" style="stop-color:#fff7cc;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:1" />
                </radialGradient>

                <!-- 鱼鳍渐变 -->
                <radialGradient id="finGradient" cx="50%" cy="30%" r="60%">
                    <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:0.9" />
                    <stop offset="100%" style="stop-color:#d4a574;stop-opacity:0.8" />
                </radialGradient>

                <!-- 石头渐变 -->
                <radialGradient id="stoneGradient" cx="40%" cy="40%" r="60%">
                    <stop offset="0%" style="stop-color:#8b7355;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#5d4e37;stop-opacity:1" />
                </radialGradient>

                <!-- 水草渐变 -->
                <linearGradient id="weedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#2d5a27;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#4a7c43;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#2d5a27;stop-opacity:1" />
                </linearGradient>

                <!-- 饲料渐变 -->
                <radialGradient id="foodGradient" cx="40%" cy="40%" r="60%">
                    <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
                </radialGradient>

                <!-- 鱼缸阴影 -->
                <filter id="tankShadow">
                    <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.3"/>
                </filter>

                <!-- 尾鳍摇摆动画 -->
                <animateTransform attributeName="transform"
                    type="rotate"
                    from="-15 80 100"
                    to="15 80 100"
                    dur="0.8s"
                    repeatCount="indefinite"
                    values="-15 80 100; 15 80 100; -15 80 100"
                    keyTimes="0; 0.5; 1"
                    id="tailWiggle"/>
            </defs>

            <!-- 鱼缸背景 -->
            <rect x="50" y="50" width="700" height="500" rx="20" ry="20"
                fill="url(#waterGradient)"
                stroke="#87ceeb" stroke-width="8"
                filter="url(#tankShadow)"/>

            <!-- 玻璃反光效果 -->
            <path d="M 60 60 Q 200 80 300 60 Q 400 40 500 60 Q 600 80 740 60"
                fill="none" stroke="url(#glassReflection)" stroke-width="3" opacity="0.6"/>
            <path d="M 60 540 Q 200 520 350 540 Q 500 560 740 540"
                fill="none" stroke="url(#glassReflection)" stroke-width="2" opacity="0.4"/>

            <!-- 水草（底部） -->
            <g id="weeds">
                <path d="M 150 550 Q 130 480 140 400 Q 150 480 160 550 Z"
                    fill="url(#weedGradient)" opacity="0.9"/>
                <path d="M 180 550 Q 160 470 175 420 Q 190 470 200 550 Z"
                    fill="url(#weedGradient)" opacity="0.85"/>
                <path d="M 600 550 Q 580 460 595 380 Q 610 460 630 550 Z"
                    fill="url(#weedGradient)" opacity="0.9"/>
                <path d="M 630 550 Q 615 480 625 430 Q 635 480 650 550 Z"
                    fill="url(#weedGradient)" opacity="0.85"/>
                <path d="M 660 550 Q 645 490 655 440 Q 665 490 680 550 Z"
                    fill="url(#weedGradient)" opacity="0.8"/>
            </g>

            <!-- 石头（底部） -->
            <g id="stones">
                <ellipse cx="250" cy="530" rx="40" ry="25" fill="url(#stoneGradient)" opacity="0.9"/>
                <ellipse cx="300" cy="540" rx="35" ry="22" fill="url(#stoneGradient)" opacity="0.85"/>
                <ellipse cx="450" cy="535" rx="45" ry="28" fill="url(#stoneGradient)" opacity="0.9"/>
                <ellipse cx="510" cy="545" rx="38" ry="24" fill="url(#stoneGradient)" opacity="0.88"/>
                <ellipse cx="550" cy="530" rx="32" ry="20" fill="url(#stoneGradient)" opacity="0.82"/>
            </g>

            <!-- 饲料容器 -->
            <g id="foodContainer"></g>

            <!-- 大金鱼 -->
            <g id="bigFish" transform="translate(300, 250)">
                <!-- 尾鳍 -->
                <path id="bigFishTail" d="M -40 0 Q -60 -15 -70 -5 Q -60 5 -40 0 Q -60 15 -70 5 Q -60 -5 -40 0"
                    fill="url(#finGradient)" opacity="0.85">
                    <animateTransform attributeName="transform"
                        type="rotate"
                        values="-12 -40 0; 12 -40 0; -12 -40 0"
                        dur="0.9s"
                        repeatCount="indefinite"/>
                </path>

                <!-- 身体 -->
                <ellipse cx="0" cy="0" rx="50" ry="30" fill="url(#goldFishBody)"/>

                <!-- 头部 -->
                <ellipse cx="35" cy="0" rx="20" ry="18" fill="url(#goldFishBody)"/>

                <!-- 眼睛 -->
                <circle cx="45" cy="-8" r="5" fill="#2c3e50" opacity="0.8"/>
                <circle cx="46" cy="-9" r="2" fill="white" opacity="0.9"/>

                <!-- 嘴巴 -->
                <ellipse cx="52" cy="0" rx="3" ry="4" fill="#ff6b35" opacity="0.6"/>

                <!-- 侧鳍 -->
                <path d="M -5 15 Q -15 25 -5 30 Q 5 25 10 20 Q 0 15 -5 15"
                    fill="url(#finGradient)" opacity="0.8">
                    <animate attributeName="d"
                        values="M -5 15 Q -15 25 -5 30 Q 5 25 10 20 Q 0 15 -5 15;
                               M -5 15 Q -15 28 -5 32 Q 5 27 10 22 Q 0 15 -5 15;
                               M -5 15 Q -15 25 -5 30 Q 5 25 10 20 Q 0 15 -5 15"
                        dur="0.6s"
                        repeatCount="indefinite"/>
                </path>

                <!-- 背鳍 -->
                <path d="M -10 -25 Q 0 -35 15 -30 Q 10 -25 5 -28 Q -5 -30 -10 -25"
                    fill="url(#finGradient)" opacity="0.8">
                    <animate attributeName="d"
                        values="M -10 -25 Q 0 -35 15 -30 Q 10 -25 5 -28 Q -5 -30 -10 -25;
                               M -10 -25 Q 0 -38 15 -32 Q 10 -25 5 -30 Q -5 -32 -10 -25;
                               M -10 -25 Q 0 -35 15 -30 Q 10 -25 5 -28 Q -5 -30 -10 -25"
                        dur="0.7s"
                        repeatCount="indefinite"/>
                </path>

                <!-- 鳞片效果 -->
                <g opacity="0.3">
                    <ellipse cx="-15" cy="-8" rx="8" ry="6" fill="none" stroke="#d4a574" stroke-width="1"/>
                    <ellipse cx="-5" cy="-5" rx="8" ry="6" fill="none" stroke="#d4a574" stroke-width="1"/>
                    <ellipse cx="5" cy="-8" rx="8" ry="6" fill="none" stroke="#d4a574" stroke-width="1"/>
                    <ellipse cx="-10" cy="8" rx="8" ry="6" fill="none" stroke="#d4a574" stroke-width="1"/>
                    <ellipse cx="0" cy="10" rx="8" ry="6" fill="none" stroke="#d4a574" stroke-width="1"/>
                    <ellipse cx="10" cy="7" rx="8" ry="6" fill="none" stroke="#d4a574" stroke-width="1"/>
                </g>
            </g>

            <!-- 小金鱼 -->
            <g id="smallFish" transform="translate(500, 350)">
                <!-- 尾鳍 -->
                <path id="smallFishTail" d="M -25 0 Q -35 -10 -42 -3 Q -32 3 -25 0 Q -35 10 -42 3 Q -32 -3 -25 0"
                    fill="url(#finGradient)" opacity="0.85">
                    <animateTransform attributeName="transform"
                        type="rotate"
                        values="-15 -25 0; 15 -25 0; -15 -25 0"
                        dur="0.7s"
                        repeatCount="indefinite"/>
                </path>

                <!-- 身体 -->
                <ellipse cx="0" cy="0" rx="32" ry="20" fill="url(#goldFishBody)"/>

                <!-- 头部 -->
                <ellipse cx="22" cy="0" rx="13" ry="12" fill="url(#goldFishBody)"/>

                <!-- 眼睛 -->
                <circle cx="28" cy="-5" r="3.5" fill="#2c3e50" opacity="0.8"/>
                <circle cx="29" cy="-6" r="1.5" fill="white" opacity="0.9"/>

                <!-- 嘴巴 -->
                <ellipse cx="33" cy="0" rx="2" ry="2.5" fill="#ff6b35" opacity="0.6"/>

                <!-- 侧鳍 -->
                <path d="M -3 10 Q -10 17 -3 20 Q 4 16 7 13 Q 0 10 -3 10"
                    fill="url(#finGradient)" opacity="0.8">
                    <animate attributeName="d"
                        values="M -3 10 Q -10 17 -3 20 Q 4 16 7 13 Q 0 10 -3 10;
                               M -3 10 Q -10 19 -3 22 Q 4 18 7 15 Q 0 10 -3 10;
                               M -3 10 Q -10 17 -3 20 Q 4 16 7 13 Q 0 10 -3 10"
                        dur="0.5s"
                        repeatCount="indefinite"/>
                </path>

                <!-- 背鳍 -->
                <path d="M -6 -17 Q 2 -23 10 -20 Q 6 -16 3 -18 Q -2 -20 -6 -17"
                    fill="url(#finGradient)" opacity="0.8">
                    <animate attributeName="d"
                        values="M -6 -17 Q 2 -23 10 -20 Q 6 -16 3 -18 Q -2 -20 -6 -17;
                               M -6 -17 Q 2 -25 10 -22 Q 6 -16 3 -20 Q -2 -22 -6 -17;
                               M -6 -17 Q 2 -23 10 -20 Q 6 -16 3 -18 Q -2 -20 -6 -17"
                        dur="0.6s"
                        repeatCount="indefinite"/>
                </path>

                <!-- 鳞片效果 -->
                <g opacity="0.3">
                    <ellipse cx="-8" cy="-5" rx="5" ry="4" fill="none" stroke="#d4a574" stroke-width="1"/>
                    <ellipse cx="0" cy="-3" rx="5" ry="4" fill="none" stroke="#d4a574" stroke-width="1"/>
                    <ellipse cx="3" cy="5" rx="5" ry="4" fill="none" stroke="#d4a574" stroke-width="1"/>
                </g>
            </g>

            <!-- 点击提示文字 -->
            <text id="hint" x="400" y="30" text-anchor="middle" fill="white" opacity="0.7" font-size="14">
                点击鱼缸任意位置投放饲料
            </text>
        </svg>
    </div>

    <script>
        const fishTank = document.getElementById('fishTank');
        const bigFish = document.getElementById('bigFish');
        const smallFish = document.getElementById('smallFish');
        const foodContainer = document.getElementById('foodContainer');

        // 鱼的状态
        const bigFishState = {
            x: 300,
            y: 250,
            vx: 1.5,
            vy: 0.8,
            scaleX: 1,
            targetX: null,
            targetY: null,
            width: 100,
            height: 60
        };

        const smallFishState = {
            x: 500,
            y: 350,
            vx: -1.2,
            vy: -0.6,
            scaleX: 1,
            targetX: null,
            targetY: null,
            width: 64,
            height: 40
        };

        // 饲料数组
        let foods = [];

        // 鱼缸边界
        const tankBounds = {
            minX: 80,
            maxX: 720,
            minY: 80,
            maxY: 520
        };

        // 更新鱼的位置显示
        function updateFishPosition(fish, fishState) {
            const scaleX = fishState.vx >= 0 ? 1 : -1;
            fish.setAttribute('transform', `translate(${fishState.x}, ${fishState.y}) scale(${scaleX}, 1)`);
        }

        // 移动鱼朝向目标
        function moveFishTowardsTarget(fishState, speed) {
            if (fishState.targetX === null || fishState.targetY === null) return false;

            const dx = fishState.targetX - fishState.x;
            const dy = fishState.targetY - fishState.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < 10) {
                fishState.vx *= 0.8;
                fishState.vy *= 0.8;
                return true;
            }

            fishState.vx = (dx / distance) * speed;
            fishState.vy = (dy / distance) * speed;

            return false;
        }

        // 检查是否吃到饲料
        function checkFoodCollision(fishState, foodIndex) {
            const food = foods[foodIndex];
            const dx = fishState.x - food.x;
            const dy = fishState.y - food.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            return distance < 30;
        }

        // 动画循环
        function animate() {
            // 更新大鱼
            if (bigFishState.targetX !== null) {
                const reached = moveFishTowardsTarget(bigFishState, 2.5);
                if (reached && foods.length === 0) {
                    bigFishState.targetX = null;
                    bigFishState.targetY = null;
                    bigFishState.vx = (Math.random() - 0.5) * 2;
                    bigFishState.vy = (Math.random() - 0.5) * 2;
                }
            }

            bigFishState.x += bigFishState.vx;
            bigFishState.y += bigFishState.vy;

            // 边界检测
            if (bigFishState.x < tankBounds.minX || bigFishState.x > tankBounds.maxX) {
                bigFishState.vx *= -1;
            }
            if (bigFishState.y < tankBounds.minY || bigFishState.y > tankBounds.maxY) {
                bigFishState.vy *= -1;
            }

            // 添加随机游动
            if (bigFishState.targetX === null && Math.random() < 0.02) {
                bigFishState.vx += (Math.random() - 0.5) * 0.5;
                bigFishState.vy += (Math.random() - 0.5) * 0.5;
                bigFishState.vx = Math.max(-2, Math.min(2, bigFishState.vx));
                bigFishState.vy = Math.max(-1.5, Math.min(1.5, bigFishState.vy));
            }

            updateFishPosition(bigFish, bigFishState);

            // 更新小鱼
            if (smallFishState.targetX !== null) {
                const reached = moveFishTowardsTarget(smallFishState, 2);
                if (reached && foods.length === 0) {
                    smallFishState.targetX = null;
                    smallFishState.targetY = null;
                    smallFishState.vx = (Math.random() - 0.5) * 2;
                    smallFishState.vy = (Math.random() - 0.5) * 2;
                }
            }

            smallFishState.x += smallFishState.vx;
            smallFishState.y += smallFishState.vy;

            // 边界检测
            if (smallFishState.x < tankBounds.minX || smallFishState.x > tankBounds.maxX) {
                smallFishState.vx *= -1;
            }
            if (smallFishState.y < tankBounds.minY || smallFishState.y > tankBounds.maxY) {
                smallFishState.vy *= -1;
            }

            // 添加随机游动
            if (smallFishState.targetX === null && Math.random() < 0.02) {
                smallFishState.vx += (Math.random() - 0.5) * 0.5;
                smallFishState.vy += (Math.random() - 0.5) * 0.5;
                smallFishState.vx = Math.max(-1.8, Math.min(1.8, smallFishState.vx));
                smallFishState.vy = Math.max(-1.2, Math.min(1.2, smallFishState.vy));
            }

            updateFishPosition(smallFish, smallFishState);

            // 更新饲料位置
            for (let i = foods.length - 1; i >= 0; i--) {
                const food = foods[i];
                food.y += food.speed;
                food.speed *= 1.02;
                food.speed = Math.min(food.speed, 2);

                // 更新饲料元素位置
                const foodElement = document.getElementById(`food-${food.id}`);
                if (foodElement) {
                    foodElement.setAttribute('cy', food.y);
                }

                // 检查大鱼是否吃到饲料
                if (checkFoodCollision(bigFishState, i)) {
                    removeFood(i);
                    bigFishState.targetX = null;
                    bigFishState.targetY = null;
                    continue;
                }

                // 检查小鱼是否吃到饲料
                if (checkFoodCollision(smallFishState, i)) {
                    removeFood(i);
                    smallFishState.targetX = null;
                    smallFishState.targetY = null;
                    continue;
                }

                // 饲料沉到底部消失
                if (food.y > tankBounds.maxY) {
                    removeFood(i);
                }
            }

            requestAnimationFrame(animate);
        }

        // 移除饲料
        function removeFood(index) {
            const food = foods[index];
            const foodElement = document.getElementById(`food-${food.id}`);
            if (foodElement) {
                foodElement.remove();
            }
            foods.splice(index, 1);

            // 如果没有饲料了，重置鱼的目标
            if (foods.length === 0) {
                bigFishState.targetX = null;
                bigFishState.targetY = null;
                smallFishState.targetX = null;
                smallFishState.targetY = null;
            }
        }

        // 找到最近的饲料
        function findNearestFood(fishState) {
            if (foods.length === 0) return null;

            let nearest = foods[0];
            let minDistance = Infinity;

            for (const food of foods) {
                const dx = fishState.x - food.x;
                const dy = fishState.y - food.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < minDistance) {
                    minDistance = distance;
                    nearest = food;
                }
            }

            return nearest;
        }

        // 创建饲料
        function createFood(x, y) {
            const foodId = Date.now() + Math.random();
            const food = {
                id: foodId,
                x: x,
                y: y,
                speed: 0.5
            };

            foods.push(food);

            const foodElement = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            foodElement.setAttribute('id', `food-${foodId}`);
            foodElement.setAttribute('cx', x);
            foodElement.setAttribute('cy', y);
            foodElement.setAttribute('r', '4');
            foodElement.setAttribute('fill', 'url(#foodGradient)');
            foodElement.setAttribute('opacity', '0.9');

            foodContainer.appendChild(foodElement);

            // 让鱼游向饲料
            const nearestFood = findNearestFood(bigFishState);
            if (nearestFood) {
                bigFishState.targetX = nearestFood.x;
                bigFishState.targetY = nearestFood.y;
            }

            const nearestFoodForSmall = findNearestFood(smallFishState);
            if (nearestFoodForSmall) {
                smallFishState.targetX = nearestFoodForSmall.x;
                smallFishState.targetY = nearestFoodForSmall.y;
            }
        }

        // 点击鱼缸投放饲料
        fishTank.addEventListener('click', function(event) {
            const rect = fishTank.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            // 检查点击是否在鱼缸内
            if (x > tankBounds.minX && x < tankBounds.maxX &&
                y > tankBounds.minY && y < tankBounds.maxY) {

                // 创建几颗饲料
                for (let i = 0; i < 5; i++) {
                    const offsetX = (Math.random() - 0.5) * 40;
                    const offsetY = (Math.random() - 0.5) * 20;
                    setTimeout(() => {
                        createFood(x + offsetX, y + offsetY);
                    }, i * 100);
                }
            }
        });

        // 启动动画
        animate();
    </script>
</body>
</html>
