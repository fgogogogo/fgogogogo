<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户主页 - 社交媒体</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-logo">SocialHub</div>
            <div class="nav-menu">
                <a href="#" class="active">主页</a>
                <a href="#">发现</a>
                <a href="#">消息</a>
                <a href="#">通知</a>
            </div>
        </nav>

        <!-- 主要内容区域 -->
        <div class="main-content">
            <!-- 左侧边栏 - 个人资料卡片 -->
            <aside class="profile-sidebar">
                <div class="profile-card">
                    <div class="cover-photo"></div>
                    <div class="profile-avatar">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="用户头像" id="avatar">
                    </div>
                    <div class="profile-info">
                        <h1 class="user-name" id="userName">张三</h1>
                        <p class="user-handle">@zhangsan</p>
                        <p class="user-bio" id="userBio">热爱生活，分享快乐 🌟 摄影爱好者 | 旅行达人</p>
                        <div class="user-location">📍 北京, 中国</div>
                        <div class="user-join-date">📅 加入于 2024年1月</div>
                    </div>
                    <div class="profile-stats">
                        <div class="stat-item">
                            <span class="stat-number" id="postsCount">128</span>
                            <span class="stat-label">动态</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="followersCount">2,456</span>
                            <span class="stat-label">粉丝</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="followingCount">389</span>
                            <span class="stat-label">关注</span>
                        </div>
                    </div>
                    <div class="profile-actions">
                        <button class="btn btn-primary edit-profile">编辑资料</button>
                        <button class="btn btn-secondary share-btn">分享</button>
                    </div>
                </div>
            </aside>

            <!-- 中间 - 动态流 -->
            <main class="feed-section">
                <div class="feed-header">
                    <h2>动态</h2>
                    <div class="feed-tabs">
                        <button class="tab-btn active" data-tab="posts">帖子</button>
                        <button class="tab-btn" data-tab="media">媒体</button>
                        <button class="tab-btn" data-tab="likes">喜欢</button>
                    </div>
                </div>

                <!-- 创建新动态 -->
                <div class="create-post">
                    <div class="post-avatar">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="头像">
                    </div>
                    <div class="post-input-container">
                        <textarea class="post-input" placeholder="分享你的想法..."></textarea>
                        <div class="post-actions">
                            <button class="post-action-btn">📷 图片</button>
                            <button class="post-action-btn">😊 表情</button>
                            <button class="post-action-btn">📍 位置</button>
                            <button class="btn btn-primary post-btn">发布</button>
                        </div>
                    </div>
                </div>

                <!-- 帖子列表 -->
                <div class="posts-feed" id="postsFeed">
                    <!-- 帖子将通过 JavaScript 动态加载 -->
                </div>
            </main>

            <!-- 右侧边栏 - 关注/粉丝列表 -->
            <aside class="sidebar-right">
                <!-- 关注列表 -->
                <div class="sidebar-widget">
                    <div class="widget-header">
                        <h3>关注</h3>
                        <a href="#" class="view-all">查看全部</a>
                    </div>
                    <div class="user-list" id="followingList">
                        <!-- 将通过 JavaScript 加载 -->
                    </div>
                </div>

                <!-- 粉丝列表 -->
                <div class="sidebar-widget">
                    <div class="widget-header">
                        <h3>粉丝</h3>
                        <a href="#" class="view-all">查看全部</a>
                    </div>
                    <div class="user-list" id="followersList">
                        <!-- 将通过 JavaScript 加载 -->
                    </div>
                </div>

                <!-- 推荐关注 -->
                <div class="sidebar-widget">
                    <div class="widget-header">
                        <h3>推荐关注</h3>
                    </div>
                    <div class="user-list" id="suggestedUsers">
                        <!-- 将通过 JavaScript 加载 -->
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- 模态框 - 查看粉丝/关注详情 -->
    <div class="modal" id="usersModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">粉丝列表</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="user-list-full" id="modalUserList">
                    <!-- 用户列表 -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
