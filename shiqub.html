<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时区地图工具</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242837;
  --border: #2e3348;
  --text: #e4e6f0;
  --text2: #9399b2;
  --accent: #6c72ff;
  --accent2: #a78bfa;
  --green: #22c55e;
  --orange: #f59e0b;
  --red: #ef4444;
  --radius: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 12px;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  position: relative;
}
.search-wrap {
  position: relative;
}
.search-wrap i {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text2);
  font-size: 13px;
}
.search-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 12px 7px 32px;
  color: var(--text);
  font-size: 13px;
  width: 200px;
  outline: none;
  transition: border-color .2s, width .2s;
}
.search-input:focus {
  border-color: var(--accent);
  width: 280px;
}
.search-input::placeholder { color: var(--text2); }

.search-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  width: 300px;
  max-height: 320px;
  overflow-y: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  z-index: 1000;
  display: none;
}
.search-dropdown.show { display: block; }
.search-item {
  padding: 9px 14px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  transition: background .15s;
}
.search-item:hover { background: var(--surface2); }
.search-item .zh { color: var(--text); font-weight: 500; }
.search-item .en { color: var(--text2); font-size: 11px; }
.search-item .tag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--accent);
  color: #fff;
  opacity: 0;
  transition: opacity .15s;
}
.search-item:hover .tag { opacity: 1; }

.theme-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 12px;
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all .2s;
}
.theme-btn:hover { border-color: var(--accent); color: var(--text); }

/* ── Main layout ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.map-wrap {
  flex: 1;
  position: relative;
}
#map {
  width: 100%;
  height: 100%;
}

/* ── Compare panel ── */
.panel {
  width: 340px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.panel-header i { color: var(--accent2); }
.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}
.panel-body::-webkit-scrollbar { width: 5px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.panel-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text2);
  font-size: 13px;
  gap: 10px;
  text-align: center;
  padding: 20px;
}
.panel-empty i { font-size: 36px; opacity: .3; }

/* ── City card ── */
.city-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  animation: cardIn .25s ease;
  position: relative;
  cursor: pointer;
  transition: border-color .2s;
}
.city-card:hover { border-color: var(--accent); }
.city-card.local {
  border-color: var(--green);
  background: rgba(34, 197, 94, .06);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}
.card-city {
  font-size: 14px;
  font-weight: 600;
}
.card-country {
  font-size: 11px;
  color: var(--text2);
  margin-top: 1px;
}
.card-remove {
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 4px;
  transition: all .15s;
  line-height: 1;
}
.card-remove:hover { color: var(--red); background: rgba(239,68,68,.12); }

.card-time {
  font-size: 26px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -.5px;
  margin: 6px 0 4px;
  background: linear-gradient(135deg, var(--text), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.card-date {
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 8px;
}
.card-timezone {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text2);
  flex-wrap: wrap;
}
.card-tz-badge {
  background: var(--accent);
  color: #fff;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 600;
  font-size: 11px;
}
.card-diff {
  font-weight: 600;
}
.card-diff.ahead { color: var(--green); }
.card-diff.behind { color: var(--orange); }
.card-diff.same { color: var(--text2); }

.local-badge {
  font-size: 10px;
  background: var(--green);
  color: #fff;
  padding: 1px 6px;
  border-radius: 3px;
  margin-left: 6px;
  font-weight: 500;
}

/* ── Leaflet custom marker ── */
.city-marker {
  background: var(--accent);
  border: 2px solid rgba(255,255,255,.9);
  border-radius: 50%;
  width: 8px;
  height: 8px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
}
.city-marker:hover {
  transform: scale(1.6);
  box-shadow: 0 0 12px var(--accent);
}
.city-marker.selected {
  background: var(--green);
  border-color: #fff;
  transform: scale(1.5);
  box-shadow: 0 0 10px var(--green);
}

.marker-label {
  background: none !important;
  border: none !important;
  box-shadow: none !important;
  font-size: 10px;
  font-weight: 500;
  color: #ccc;
  text-shadow: 0 0 4px rgba(0,0,0,.9), 0 0 8px rgba(0,0,0,.6);
  white-space: nowrap;
  padding: 0 !important;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .main { flex-direction: column; }
  .panel {
    width: 100%;
    max-height: 45vh;
    border-left: none;
    border-top: 1px solid var(--border);
  }
  .search-input { width: 140px; }
  .search-input:focus { width: 180px; }
}

/* ── Light theme ── */
body.light {
  --bg: #f3f4f6;
  --surface: #ffffff;
  --surface2: #f9fafb;
  --border: #e5e7eb;
  --text: #111827;
  --text2: #6b7280;
}
body.light .marker-label {
  color: #555;
  text-shadow: 0 0 4px rgba(255,255,255,.9), 0 0 8px rgba(255,255,255,.7);
}
body.light .card-time {
  background: linear-gradient(135deg, #111, #4f46e5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
body.light .city-marker {
  background: #4f46e5;
  border-color: #fff;
}
body.light .city-marker.selected {
  background: var(--green);
}
body.light .city-card.local {
  background: rgba(34, 197, 94, .06);
}
</style>
</head>

</div>

// ═══════════════════════════════════════════
// State
// ═══════════════════════════════════════════
const userTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
const selectedCities = [];   // array of city objects
const markerMap = new Map(); // city index → L.marker
const labelMap = new Map();  // city index → L.marker (label)
let timerInterval;

// ═══════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════
function getTimeInTz(tz) {
  const now = new Date();
  return {
    time: now.toLocaleTimeString('zh-CN', { timeZone: tz, hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' }),
    date: now.toLocaleDateString('zh-CN', { timeZone: tz, weekday:'short', month:'short', day:'numeric' }),
    abbr: new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName:'short' }).formatToParts(now).find(p => p.type === 'timeZoneName')?.value || '',
    offset: getUtcOffset(tz),
  };
}

function getUtcOffset(tz) {
  const now = new Date();
  const utcStr = now.toLocaleString('en-US', { timeZone: 'UTC' });
  const tzStr = now.toLocaleString('en-US', { timeZone: tz });
  const diff = (new Date(tzStr) - new Date(utcStr)) / 3600000;
  return diff;
}

function getDiffFromUser(tz) {
  const target = getUtcOffset(tz);
  const mine = getUtcOffset(userTz);
  const diff = target - mine;
  if (Math.abs(diff) < 0.01) return { text: '本地时间', cls: 'same', raw: 0 };
  const sign = diff > 0 ? '+' : '';
  const h = Math.floor(Math.abs(diff));
  const m = Math.round((Math.abs(diff) - h) * 60);
  const str = m > 0 ? `${sign}${diff > 0 ? h : -h}h${m > 0 ? m + 'm' : ''}` : `${sign}${diff > 0 ? h : -h}h`;
  return { text: `UTC${str}`, cls: diff > 0 ? 'ahead' : 'behind', raw: diff };
}

function formatOffset(offset) {
  const sign = offset >= 0 ? '+' : '-';
  const h = Math.floor(Math.abs(offset));
  const m = Math.round((Math.abs(offset) - h) * 60);
  return `UTC${sign}${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function buildCard(city, isLocal) {
  const t = getTimeInTz(city.tz);
  const diff = getDiffFromUser(city.tz);
  const localClass = isLocal ? ' local' : '';
  const badge = isLocal ? `<span class="local-badge">我的时区</span>` : '';
  return `
    <div class="city-card${localClass}" data-tz="${city.tz}">
      <div class="card-header">
        <div>
          <div class="card-city">${city.nameZh}${badge}</div>
          <div class="card-country">${city.countryZh} · ${city.name}</div>
        </div>
        ${isLocal ? '' : `<button class="card-remove" onclick="removeCity('${city.name}','${city.tz}')" title="移除"><i class="fas fa-times"></i></button>`}
      </div>
      <div class="card-time">${t.time}</div>
      <div class="card-date">${t.date}</div>
      <div class="card-timezone">
        <span class="card-tz-badge">${t.abbr}</span>
        <span>${formatOffset(t.offset)}</span>
        <span>${city.tz}</span>
        ${isLocal ? '' : `<span class="card-diff ${diff.cls}">${diff.raw > 0 ? '+' : ''}${diff.raw >= 0 ? diff.raw === 0 ? '0' : '' : ''}${diff.text.includes('本地') ? '' : ''}</span>`}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// Panel rendering
// ═══════════════════════════════════════════
function renderPanel() {
  const panel = document.getElementById('panelBody');
  const empty = document.getElementById('panelEmpty');
  const count = document.getElementById('cityCount');

  // Build combined list: user timezone first, then selected
  const cards = [];
  const userCity = CITIES_DEDUPED.find(c => c.tz === userTz);

  if (userCity) {
    cards.push({ city: userCity, isLocal: true, offset: getUtcOffset(userTz) });
  } else {
    // Create synthetic entry for user timezone
    cards.push({
      city: { name: '', nameZh: userTz.split('/').pop().replace(/_/g,' '), countryZh: '', country: '', tz: userTz, lat: 0, lng: 0 },
      isLocal: true,
      offset: getUtcOffset(userTz)
    });
  }

  selectedCities.forEach(c => {
    if (c.tz === userTz) return; // already shown
    cards.push({ city: c, isLocal: false, offset: getUtcOffset(c.tz) });
  });

  // Sort by UTC offset
  cards.sort((a, b) => a.offset - b.offset);

  count.textContent = `(${cards.length} 个城市)`;

  if (cards.length === 0) {
    panel.innerHTML = `<div class="panel-empty"><i class="fas fa-map-marker-alt"></i><div>点击地图上的城市标记<br>添加到对比面板</div></div>`;
    return;
  }

  panel.innerHTML = cards.map(c => buildCard(c.city, c.isLocal)).join('');

  // Remove empty state
  if (document.getElementById('panelEmpty')) {
    // already replaced by innerHTML
  }
}

function updateTimes() {
  document.querySelectorAll('.city-card').forEach(card => {
    const tz = card.dataset.tz;
    if (!tz) return;
    const t = getTimeInTz(tz);
    const timeEl = card.querySelector('.card-time');
    const dateEl = card.querySelector('.card-date');
    if (timeEl) timeEl.textContent = t.time;
    if (dateEl) dateEl.textContent = t.date;
  });
}

// ═══════════════════════════════════════════
// City management
// ═══════════════════════════════════════════
function addCity(city) {
  const exists = selectedCities.some(c => c.name === city.name && c.tz === city.tz);
  if (exists) return;
  selectedCities.push(city);
  renderPanel();
  // Update marker
  const idx = CITIES_DEDUPED.indexOf(city);
  if (idx >= 0 && markerMap.has(idx)) {
    markerMap.get(idx).getElement()?.classList.add('selected');
  }
}

function removeCity(name, tz) {
  const idx = selectedCities.findIndex(c => c.name === name && c.tz === tz);
  if (idx < 0) return;
  selectedCities.splice(idx, 1);
  renderPanel();
  // Update marker
  const cityIdx = CITIES_DEDUPED.findIndex(c => c.name === name && c.tz === tz);
  if (cityIdx >= 0 && markerMap.has(cityIdx)) {
    markerMap.get(cityIdx).getElement()?.classList.remove('selected');
  }
}
window.removeCity = removeCity;

// Map
// ═══════════════════════════════════════════
function initMap() {
  const map = L.map('map', {
    center: [25, 0],
    zoom: 2,
    minZoom: 2,
    maxZoom: 12,
    zoomControl: true,
    attributionControl: true
  });

  // Dark tile layer
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // Store reference for theme switching
  window._map = map;
  window._darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 19
  });
  window._lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 19
  });

  // Add city markers
  CITIES_DEDUPED.forEach((city, idx) => {
    const marker = L.marker([city.lat, city.lng], {
      icon: L.divIcon({
        className: '',
        html: `<div class="city-marker" data-idx="${idx}"></div>`,
        iconSize: [8, 8],
        iconAnchor: [4, 4]
      })
    }).addTo(map);

    marker.on('click', () => addCity(city));
    markerMap.set(idx, marker);

    // City label (only for zoom >= 4)
    const label = L.marker([city.lat, city.lng], {
      icon: L.divIcon({
        className: '',
        html: `<div class="marker-label">${city.nameZh}</div>`,
        iconSize: [0, 0],
        iconAnchor: [6, -8]
      }),
      interactive: false
    }).addTo(map);
    labelMap.set(idx, label);
  });

  // Toggle labels on zoom
  map.on('zoomend', () => {
    const show = map.getZoom() >= 4;
    labelMap.forEach(label => {
      const el = label.getElement();
      if (el) el.style.display = show ? '' : 'none';
    });
  });
  // Hide labels initially (zoom 2)
  labelMap.forEach(label => {
    const el = label.getElement();
    if (el) el.style.display = 'none';
  });
}

// ═══════════════════════════════════════════
// Search
// ═══════════════════════════════════════════
function initSearch() {
  const input = document.getElementById('searchInput');
  const dropdown = document.getElementById('searchDropdown');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (!q) {
      dropdown.classList.remove('show');
      return;
    }

    const results = CITIES_DEDUPED.filter(c =>
      c.nameZh.includes(q) ||
      c.name.toLowerCase().includes(q) ||
      c.countryZh.includes(q) ||
      c.country.toLowerCase().includes(q) ||
      c.tz.toLowerCase().includes(q)
    ).slice(0, 12);

    if (results.length === 0) {
      dropdown.innerHTML = '<div style="padding:12px;color:var(--text2);font-size:13px;text-align:center;">未找到匹配城市</div>';
    } else {
      dropdown.innerHTML = results.map(c => {
        const isSelected = selectedCities.some(s => s.name === c.name && s.tz === c.tz);
        return `<div class="search-item" data-name="${c.name}" data-tz="${c.tz}">
          <span><span class="zh">${c.nameZh}</span> <span class="en">${c.name}, ${c.countryZh}</span></span>
          <span class="tag" style="${isSelected ? 'opacity:1;background:var(--green)' : ''}">${isSelected ? '已添加' : '添加'}</span>
        </div>`;
      }).join('');
    }
    dropdown.classList.add('show');

    dropdown.querySelectorAll('.search-item[data-name]').forEach(el => {
      el.addEventListener('click', () => {
        const city = CITIES_DEDUPED.find(c => c.name === el.dataset.name && c.tz === el.dataset.tz);
        if (city) {
          addCity(city);
          // Fly to city
          if (window._map) window._map.flyTo([city.lat, city.lng], 6, { duration: 1 });
        }
        input.value = '';
        dropdown.classList.remove('show');
      });
    });
  });

  // Close dropdown on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) dropdown.classList.remove('show');
  });

  // Keyboard
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      dropdown.classList.remove('show');
      input.blur();
    }
  });
}

// ═══════════════════════════════════════════
// Theme
// ═══════════════════════════════════════════
function initTheme() {
  const btn = document.getElementById('themeBtn');
  let isLight = false;

  btn.addEventListener('click', () => {
    isLight = !isLight;
    document.body.classList.toggle('light', isLight);
    btn.innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';

    // Swap map tiles
    if (window._map) {
      if (isLight) {
        window._map.removeLayer(window._darkTilesLayer || window._darkTiles);
        // find current dark tile and replace
        window._map.eachLayer(layer => {
          if (layer instanceof L.TileLayer) {
            window._map.removeLayer(layer);
          }
        });
        window._lightTiles.addTo(window._map);
      } else {
        window._map.eachLayer(layer => {
          if (layer instanceof L.TileLayer) {
            window._map.removeLayer(layer);
          }
        });
        window._darkTiles.addTo(window._map);
      }
    }
  });
}

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  initSearch();
  initTheme();
  renderPanel();

  // Update every second
  timerInterval = setInterval(updateTimes, 1000);

  // Auto-add user's timezone city
  const userCity = CITIES_DEDUPED.find(c => c.tz === userTz);
  if (userCity) {
    // Pre-select the user's local city marker
    const idx = CITIES_DEDUPED.indexOf(userCity);
    if (idx >= 0 && markerMap.has(idx)) {
      setTimeout(() => {
        markerMap.get(idx).getElement()?.classList.add('selected');
      }, 100);
    }
  }
});
</script>
