<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>进度条组件 - 线性 & 环形</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 48px;
      font-size: 14px;
    }

    /* ====== 全局控制区 ====== */
    .controls {
      background: #1e293b;
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 36px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }

    .control-group { display: flex; align-items: center; gap: 10px; }

    .control-group label {
      font-size: 13px;
      color: #94a3b8;
      white-space: nowrap;
    }

    .control-group input[type="range"] {
      -webkit-appearance: none;
      width: 180px;
      height: 6px;
      border-radius: 3px;
      background: #334155;
      outline: none;
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.5);
    }

    .control-group .value-badge {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary-light);
      min-width: 42px;
      text-align: center;
    }

    select {
      background: #334155;
      color: #e2e8f0;
      border: 1px solid #475569;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
    }

    .btn-primary { background: var(--primary); }
    .btn-primary:hover { background: #4f46e5; }
    .btn-outline {
      background: transparent;
      border: 1px solid #475569;
      color: #94a3b8;
    }
    .btn-outline:hover { border-color: var(--primary); color: #e2e8f0; }

    /* ====== 区块标题 ====== */
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-left: 12px;
      border-left: 3px solid var(--primary);
    }

    .section { margin-bottom: 48px; }

    /* ============================
       线性进度条
    ============================ */
    .linear-group { display: flex; flex-direction: column; gap: 32px; }

    .linear-item label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar .fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }

    /* 基础渐变 */
    .progress-bar.gradient .fill {
      background: linear-gradient(90deg, #6366f1, #a78bfa, #c084fc);
    }

    /* 条纹动画 */
    .progress-bar.striped .fill {
      background: repeating-linear-gradient(
        -45deg,
        var(--primary),
        var(--primary) 10px,
        var(--primary-light) 10px,
        var(--primary-light) 20px
      );
      background-size: 200% 100%;
      animation: stripe-move 0.8s linear infinite;
    }

    @keyframes stripe-move {
      to { background-position: 200% 0; }
    }

    /* 发光效果 */
    .progress-bar.glow .fill {
      background: linear-gradient(90deg, #6366f1, #818cf8);
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.6);
    }

    /* 多色分段 */
    .progress-bar.multicolor .fill {
      background: linear-gradient(90deg, #ef4444 0%, #f59e0b 50%, #22c55e 100%);
    }

    /* 大尺寸 */
    .progress-bar.large { height: 20px; }

    /* 带百分比标签 */
    .linear-labeled { position: relative; }

    .linear-labeled .percent-label {
      position: absolute;
      right: 0;
      top: -22px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary-light);
    }

    /* 动画加载 */
    .progress-bar.indeterminate .fill {
      width: 30% !important;
      background: linear-gradient(90deg, transparent, #6366f1, transparent);
      animation: indeterminate 1.5s ease-in-out infinite;
    }

    @keyframes indeterminate {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(450%); }
    }

    /* ============================
       环形进度条
    ============================ */
    .ring-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
    }

    .ring-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .ring-item span {
      font-size: 13px;
      color: #94a3b8;
    }

    .ring {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring svg {
      transform: rotate(-90deg);
    }

    .ring .track {
      fill: none;
      stroke: #1e293b;
    }

    .ring .arc {
      fill: none;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .ring .ring-text {
      position: absolute;
      font-weight: 700;
      color: #e2e8f0;
    }

    /* 渐变环形 */
    .ring-gradient .arc {
      stroke: url(#ringGradient);
    }

    /* 发光环形 */
    .ring-glow .arc {
      stroke: #6366f1;
      filter: drop-shadow(0 0 6px rgba(99, 102, 241, 0.6));
    }

    /* 多色环形 */
    .ring-multicolor .arc {
      stroke: url(#multiGradient);
    }

    /* 虚线环形 */
    .ring-dashed .arc {
      stroke: var(--primary);
      stroke-dasharray: 8 4;
    }

    /* 厚度变化 */
    .ring-thick .track,
    .ring-thick .arc { stroke-width: 14; }

    /* 嵌套环形 */
    .ring-nested {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-nested svg { position: absolute; }

    /* 旋转动画环形 */
    @keyframes ring-spin {
      from { stroke-dashoffset: var(--offset-start); }
      to { stroke-dashoffset: var(--offset-end); }
    }

    .ring-animate .arc {
      animation: ring-spin 2s ease-in-out infinite alternate;
    }

    /* ====== 响应式 ====== */
    @media (max-width: 600px) {
      body { padding: 24px 16px; }
      .controls { flex-direction: column; align-items: flex-start; }
      .control-group input[type="range"] { width: 140px; }
      .ring-group { gap: 28px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>进度条组件</h1>
    <p class="subtitle">支持线性与环形双样式，可自定义颜色、尺寸与动画效果</p>

    <!-- 控制面板 -->
    <div class="controls">
      <div class="control-group">
        <label>进度值</label>
        <input type="range" id="progressRange" min="0" max="100" value="68">
        <span class="value-badge" id="progressValue">68%</span>
      </div>
      <div class="control-group">
        <label>主题色</label>
        <select id="colorSelect">
          <option value="#6366f1">靛蓝</option>
          <option value="#22c55e">翠绿</option>
          <option value="#f59e0b">琥珀</option>
          <option value="#ef4444">玫红</option>
          <option value="#06b6d4">青蓝</option>
          <option value="#ec4899">粉红</option>
        </select>
      </div>
      <div class="control-group">
        <button class="btn btn-primary" id="btnAnimate">自动演示</button>
        <button class="btn btn-outline" id="btnReset">重置</button>
      </div>
    </div>

    <!-- SVG 渐变定义 -->
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
        <linearGradient id="multiGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ef4444"/>
          <stop offset="50%" stop-color="#f59e0b"/>
          <stop offset="100%" stop-color="#22c55e"/>
        </linearGradient>
      </defs>
    </svg>

    <!-- ====== 线性进度条 ====== -->
    <div class="section">
      <div class="section-title">线性进度条</div>
      <div class="linear-group">

        <!-- 1. 基础渐变 -->
        <div class="linear-item">
          <label>基础渐变</label>
          <div class="progress-bar gradient">
            <div class="fill" data-progress></div>
          </div>
        </div>

        <!-- 2. 条纹动画 -->
        <div class="linear-item">
          <label>条纹动画</label>
          <div class="progress-bar striped">
            <div class="fill" data-progress></div>
          </div>
        </div>

        <!-- 3. 发光效果 -->
        <div class="linear-item">
          <label>发光效果</label>
          <div class="progress-bar glow">
            <div class="fill" data-progress></div>
          </div>
        </div>

        <!-- 4. 多色分段 -->
        <div class="linear-item">
          <label>多色分段（红 → 黄 → 绿）</label>
          <div class="progress-bar multicolor">
            <div class="fill" data-progress></div>
          </div>
        </div>

        <!-- 5. 大号 + 标签 -->
        <div class="linear-item linear-labeled">
          <div class="progress-bar gradient large">
            <div class="fill" data-progress></div>
          </div>
          <span class="percent-label" id="largePercent">68%</span>
        </div>

        <!-- 6. 不确定进度 -->
        <div class="linear-item">
          <label>不确定加载</label>
          <div class="progress-bar indeterminate">
            <div class="fill"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- ====== 环形进度条 ====== -->
    <div class="section">
      <div class="section-title">环形进度条</div>
      <div class="ring-group">

        <!-- 1. 基础环形 -->
        <div class="ring-item">
          <div class="ring" id="ringBasic">
            <svg width="120" height="120">
              <circle class="track" cx="60" cy="60" r="50" stroke-width="10"/>
              <circle class="arc" cx="60" cy="60" r="50" stroke-width="10"
                      stroke="var(--primary)"/>
            </svg>
            <span class="ring-text">68%</span>
          </div>
          <span>基础</span>
        </div>

        <!-- 2. 渐变环形 -->
        <div class="ring-item">
          <div class="ring ring-gradient" id="ringGradient">
            <svg width="120" height="120">
              <circle class="track" cx="60" cy="60" r="50" stroke-width="10"/>
              <circle class="arc" cx="60" cy="60" r="50" stroke-width="10"/>
            </svg>
            <span class="ring-text">68%</span>
          </div>
          <span>渐变</span>
        </div>

        <!-- 3. 发光环形 -->
        <div class="ring-item">
          <div class="ring ring-glow" id="ringGlow">
            <svg width="120" height="120">
              <circle class="track" cx="60" cy="60" r="50" stroke-width="10"/>
              <circle class="arc" cx="60" cy="60" r="50" stroke-width="10"/>
            </svg>
            <span class="ring-text">68%</span>
          </div>
          <span>发光</span>
        </div>

        <!-- 4. 多色环形 -->
        <div class="ring-item">
          <div class="ring ring-multicolor" id="ringMulti">
            <svg width="120" height="120">
              <circle class="track" cx="60" cy="60" r="50" stroke-width="10"/>
              <circle class="arc" cx="60" cy="60" r="50" stroke-width="10"/>
            </svg>
            <span class="ring-text">68%</span>
          </div>
          <span>多色</span>
        </div>

        <!-- 5. 虚线环形 -->
        <div class="ring-item">
          <div class="ring ring-dashed" id="ringDashed">
            <svg width="120" height="120">
              <circle class="track" cx="60" cy="60" r="50" stroke-width="10"/>
              <circle class="arc" cx="60" cy="60" r="50" stroke-width="10"/>
            </svg>
            <span class="ring-text">68%</span>
          </div>
          <span>虚线</span>
        </div>

        <!-- 6. 大号加粗 -->
        <div class="ring-item">
          <div class="ring ring-thick" id="ringThick">
            <svg width="140" height="140">
              <circle class="track" cx="70" cy="70" r="55" stroke-width="14"/>
              <circle class="arc" cx="70" cy="70" r="55" stroke-width="14"
                      stroke="var(--primary)"/>
            </svg>
            <span class="ring-text" style="font-size:22px">68%</span>
          </div>
          <span>加粗</span>
        </div>

      </div>
    </div>
  </div>

  <script>
    // ====== 线性进度条更新 ======
    function updateLinear(progress) {
      document.querySelectorAll('[data-progress]').forEach(fill => {
        fill.style.width = progress + '%';
      });
      document.getElementById('largePercent').textContent = progress + '%';
    }

    // ====== 环形进度条更新 ======
    const ringConfigs = [
      { id: 'ringBasic',  r: 50, cx: 60, cy: 60 },
      { id: 'ringGradient', r: 50, cx: 60, cy: 60 },
      { id: 'ringGlow',    r: 50, cx: 60, cy: 60 },
      { id: 'ringMulti',   r: 50, cx: 60, cy: 60 },
      { id: 'ringDashed',  r: 50, cx: 60, cy: 60 },
      { id: 'ringThick',   r: 55, cx: 70, cy: 70 },
    ];

    function updateRings(progress) {
      ringConfigs.forEach(cfg => {
        const container = document.getElementById(cfg.id);
        if (!container) return;
        const arc = container.querySelector('.arc');
        const text = container.querySelector('.ring-text');
        const circumference = 2 * Math.PI * cfg.r;
        arc.style.strokeDasharray = circumference;
        arc.style.strokeDashoffset = circumference * (1 - progress / 100);
        if (text) text.textContent = progress + '%';
      });
    }

    // ====== 全局更新 ======
    function updateAll(progress) {
      updateLinear(progress);
      updateRings(progress);
    }

    // ====== 滑块控制 ======
    const range = document.getElementById('progressRange');
    const badge = document.getElementById('progressValue');

    range.addEventListener('input', () => {
      const v = parseInt(range.value, 10);
      badge.textContent = v + '%';
      updateAll(v);
    });

    // ====== 主题色切换 ======
    document.getElementById('colorSelect').addEventListener('change', (e) => {
      const color = e.target.value;
      // 更新 CSS 变量
      document.documentElement.style.setProperty('--primary', color);

      // 更新渐变
      const grad = document.querySelector('#ringGradient stop:first-child');
      if (grad) grad.setAttribute('stop-color', color);
    });

    // ====== 自动演示 ======
    let animTimer = null;
    let animDir = 1;

    document.getElementById('btnAnimate').addEventListener('click', () => {
      if (animTimer) {
        clearInterval(animTimer);
        animTimer = null;
        document.getElementById('btnAnimate').textContent = '自动演示';
        return;
      }
      document.getElementById('btnAnimate').textContent = '停止演示';
      let val = parseInt(range.value, 10);
      animTimer = setInterval(() => {
        val += animDir;
        if (val >= 100) { animDir = -1; val = 100; }
        if (val <= 0) { animDir = 1; val = 0; }
        range.value = val;
        badge.textContent = val + '%';
        updateAll(val);
      }, 30);
    });

    // ====== 重置 ======
    document.getElementById('btnReset').addEventListener('click', () => {
      if (animTimer) {
        clearInterval(animTimer);
        animTimer = null;
        document.getElementById('btnAnimate').textContent = '自动演示';
      }
      range.value = 68;
      badge.textContent = '68%';
      document.documentElement.style.setProperty('--primary', '#6366f1');
      document.getElementById('colorSelect').value = '#6366f1';
      const grad = document.querySelector('#ringGradient stop:first-child');
      if (grad) grad.setAttribute('stop-color', '#6366f1');
      updateAll(68);
    });

    // 初始化
    updateAll(68);
  </script>
</body>
</html>
