<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简易地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100vh; }

    /* 底图切换按钮组 */
    .map-controls {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .map-controls button {
      padding: 6px 14px;
      border: 2px solid #4a90d9;
      background: #fff;
      color: #4a90d9;
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .map-controls button:hover {
      background: #4a90d9;
      color: #fff;
    }
    .map-controls button.active {
      background: #4a90d9;
      color: #fff;
    }

    /* 定位按钮 */
    .locate-btn {
      position: absolute;
      bottom: 32px;
      right: 12px;
      z-index: 1000;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }
    .locate-btn:hover { background: #f0f0f0; }
    .locate-btn:active { transform: scale(.92); }

    /* 弹窗样式微调 */
    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
    }
    .popup-title {
      font-size: 15px;
      font-weight: 700;
      color: #333;
      margin-bottom: 6px;
    }
    .popup-row {
      font-size: 13px;
      color: #555;
      line-height: 1.8;
    }
    .popup-row span { color: #888; }

    /* 当前位置标记动画 */
    .current-location-marker {
      background: #2196F3;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 2px 10px rgba(33,150,243,.5);
    }
    .pulse-ring {
      position: absolute;
      width: 24px;
      height: 24px;
      border: 2px solid #2196F3;
      border-radius: 50%;
      animation: pulse 1.5s ease-out infinite;
      pointer-events: none;
    }
    @keyframes pulse {
      0% { transform: scale(.8); opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- 底图切换 -->
  <div class="map-controls">
    <button class="active" data-layer="standard">标准地图</button>
    <button data-layer="satellite">卫星地图</button>
    <button data-layer="terrain">地形地图</button>
    <button data-layer="dark">暗黑模式</button>
  </div>

  <!-- 定位按钮 -->
  <button class="locate-btn" id="locateBtn" title="定位到当前位置">📍</button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ========== 1. 初始化地图 ==========
    var map = L.map('map', {
      center: [39.9042, 116.4074],   // 默认北京
      zoom: 12,
      zoomControl: true
    });

    // ========== 2. 底图图层定义 ==========
    var baseLayers = {
      standard: L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        subdomains: '1234',
        attribution: '&copy; 高德地图'
      }),
      satellite: L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}', {
        subdomains: '1234',
        attribution: '&copy; 高德地图'
      }),
      terrain: L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=7&x={x}&y={y}&z={z}', {
        subdomains: '1234',
        attribution: '&copy; 高德地图'
      }),
      dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        attribution: '&copy; CartoDB'
      })
    };

    // 默认添加标准底图
    baseLayers.standard.addTo(map);
    var currentLayer = 'standard';

    // ========== 3. 底图切换逻辑 ==========
    var buttons = document.querySelectorAll('.map-controls button');
    buttons.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var layerKey = this.dataset.layer;
        if (layerKey === currentLayer) return;

        // 切换按钮样式
        buttons.forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');

        // 切换底图
        map.removeLayer(baseLayers[currentLayer]);
        baseLayers[layerKey].addTo(map);
        currentLayer = layerKey;
      });
    });

    // ========== 4. 自定义图标 ==========
    var defaultIcon = L.divIcon({
      className: '',
      html: '<div style="width:28px;height:36px;display:flex;align-items:flex-end;justify-content:center;">'
          + '<svg width="28" height="36" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg">'
          + '<path d="M14 0C6.268 0 0 6.268 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.268 21.732 0 14 0z" fill="#e74c3c"/>'
          + '<circle cx="14" cy="13" r="5" fill="#fff"/>'
          + '</svg></div>',
      iconSize: [28, 36],
      iconAnchor: [14, 36],
      popupAnchor: [0, -36]
    });

    // ========== 5. 标记点数据 ==========
    var markers = [
      {
        id: 1,
        name: '天安门广场',
        lat: 39.9087,
        lng: 116.3975,
        address: '北京市东城区东长安街',
        phone: '010-63095745',
        desc: '世界上最大的城市广场之一，中华人民共和国的象征'
      },
      {
        id: 2,
        name: '故宫博物院',
        lat: 39.9163,
        lng: 116.3972,
        address: '北京市东城区景山前街4号',
        phone: '010-85007421',
        desc: '明清两代的皇家宫殿，世界上现存规模最大的宫殿型建筑'
      },
      {
        id: 3,
        name: '国家体育场（鸟巢）',
        lat: 39.9929,
        lng: 116.3965,
        address: '北京市朝阳区国家体育场南路1号',
        phone: '010-84373066',
        desc: '2008年北京奥运会主体育场，现代建筑的杰作'
      },
      {
        id: 4,
        name: '颐和园',
        lat: 39.9999,
        lng: 116.2755,
        address: '北京市海淀区新建宫门路19号',
        phone: '010-62881144',
        desc: '中国清朝时期皇家园林，前身为清漪园'
      },
      {
        id: 5,
        name: '北京大学',
        lat: 39.9921,
        lng: 116.3105,
        address: '北京市海淀区颐和园路5号',
        phone: '010-62752114',
        desc: '中国最高学府之一，创建于1898年'
      }
    ];

    // ========== 6. 添加标记点和弹窗 ==========
    markers.forEach(function(m) {
      var marker = L.marker([m.lat, m.lng], { icon: defaultIcon }).addTo(map);

      // 构建弹窗 HTML
      var popupContent = ''
        + '<div style="min-width:200px;">'
        + '  <div class="popup-title">' + m.name + '</div>'
        + '  <div class="popup-row"><span>地址：</span>' + m.address + '</div>'
        + '  <div class="popup-row"><span>电话：</span>' + m.phone + '</div>'
        + '  <div class="popup-row"><span>简介：</span>' + m.desc + '</div>'
        + '</div>';

      marker.bindPopup(popupContent);

      // 点击标记时自动打开弹窗
      marker.on('click', function() {
        this.openPopup();
      });
    });

    // ========== 7. 定位功能 ==========
    var locateBtn = document.getElementById('locateBtn');
    var currentLocationMarker = null;

    locateBtn.addEventListener('click', function() {
      if (!navigator.geolocation) {
        alert('您的浏览器不支持地理定位功能');
        return;
      }

      locateBtn.textContent = '⏳';
      locateBtn.style.pointerEvents = 'none';

      navigator.geolocation.getCurrentPosition(
        function(position) {
          var lat = position.coords.latitude;
          var lng = position.coords.longitude;

          // 移除旧的位置标记
          if (currentLocationMarker) {
            map.removeLayer(currentLocationMarker);
          }

          // 创建当前位置标记（带脉冲动画）
          var iconHtml = ''
            + '<div style="position:relative;width:16px;height:16px;">'
            + '  <div class="current-location-marker" style="width:16px;height:16px;"></div>'
            + '  <div class="pulse-ring" style="top:-4px;left:-4px;"></div>'
            + '</div>';

          var locationIcon = L.divIcon({
            className: '',
            html: iconHtml,
            iconSize: [24, 24],
            iconAnchor: [12, 12]
          });

          currentLocationMarker = L.marker([lat, lng], { icon: locationIcon, zIndexOffset: 1000 })
            .bindPopup('<div style="font-size:13px;font-weight:600;">📍 我的位置<br/>'
              + '<span style="font-size:12px;color:#666;">纬度: ' + lat.toFixed(6) + '<br/>'
              + '经度: ' + lng.toFixed(6) + '</span></div>')
            .addTo(map);

          // 飞到当前位置
          map.flyTo([lat, lng], 15, { duration: 1.5 });

          locateBtn.textContent = '📍';
          locateBtn.style.pointerEvents = 'auto';
        },
        function(error) {
          var msg = '';
          switch (error.code) {
            case 1: msg = '用户拒绝了位置请求'; break;
            case 2: msg = '无法获取位置信息'; break;
            case 3: msg = '定位超时，请重试'; break;
            default: msg = '未知错误';
          }
          alert('定位失败：' + msg);
          locateBtn.textContent = '📍';
          locateBtn.style.pointerEvents = 'auto';
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    });

    // ========== 8. 页面加载时自动尝试定位 ==========
    // （可选：取消下方注释即可启用自动定位）
    // if (navigator.geolocation) {
    //   navigator.geolocation.getCurrentPosition(function(pos) {
    //     map.flyTo([pos.coords.latitude, pos.coords.longitude], 14);
    //   });
    // }
  </script>
</body>
</html>
