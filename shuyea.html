<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风吹树叶 — 自然动效模拟</title>
<style>
/* ========== 基础重置 ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  overflow: hidden;
  background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 40%, #98D8C8 70%, #7CCD7C 100%);
  height: 100vh;
  width: 100vw;
  font-family: sans-serif;
}

/* ========== 场景容器 ========== */
.scene {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* ========== 地面 ========== */
.ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 18%;
  background: linear-gradient(180deg, #5a8f3c 0%, #4a7a2e 40%, #3d6b24 100%);
  border-radius: 50% 50% 0 0 / 30px 30px 0 0;
}

.ground::before {
  content: '';
  position: absolute;
  top: -10px;
  width: 100%;
  height: 30px;
  background: linear-gradient(180deg, transparent, rgba(90, 143, 60, 0.6));
  filter: blur(8px);
}

/* ========== 风力指示器 ========== */
.wind-indicator {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 16px 22px;
  z-index: 100;
  min-width: 180px;
  border: 1px solid rgba(255, 255, 255, 0.3);
}

.wind-indicator h3 {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.7);
  margin-bottom: 8px;
  font-weight: 400;
  letter-spacing: 1px;
}

.wind-bar-wrap {
  width: 100%;
  height: 6px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 6px;
}

.wind-bar {
  height: 100%;
  width: 30%;
  background: linear-gradient(90deg, #81D4FA, #4FC3F7, #29B6F6);
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.wind-label {
  font-size: 14px;
  color: #fff;
  font-weight: 600;
}

/* ========== 树容器 ========== */
.tree {
  position: absolute;
  bottom: 16%;
  left: 50%;
  transform: translateX(-50%);
  transform-origin: bottom center;
}

/* ========== 树干 ========== */
.trunk {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 36px;
  height: 220px;
  background: linear-gradient(90deg, #5D4037 0%, #795548 35%, #6D4C41 65%, #4E342E 100%);
  border-radius: 8px 8px 12px 12px;
  transform-origin: bottom center;
}

.trunk::before {
  content: '';
  position: absolute;
  top: 10px;
  left: 6px;
  width: 4px;
  height: 80%;
  background: rgba(0,0,0,0.1);
  border-radius: 2px;
}

.trunk::after {
  content: '';
  position: absolute;
  top: 30px;
  left: 16px;
  width: 3px;
  height: 60%;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
}

/* ========== 树枝 ========== */
.branch {
  position: absolute;
  transform-origin: left center;
  border-radius: 4px;
}

.branch-right {
  transform-origin: 0% 50%;
}

.branch-left {
  transform-origin: 100% 50%;
}

/* 各级树枝 */
.branch-1 {
  width: 120px;
  height: 14px;
  background: linear-gradient(90deg, #6D4C41, #8D6E63);
  transform-origin: 0% 50%;
}

.branch-2 {
  width: 90px;
  height: 10px;
  background: linear-gradient(90deg, #795548, #A1887F);
  transform-origin: 0% 50%;
}

.branch-3 {
  width: 65px;
  height: 7px;
  background: linear-gradient(90deg, #8D6E63, #BCAAA4);
  transform-origin: 0% 50%;
}

/* 左侧树枝翻面 */
.branch-left.branch-1,
.branch-left.branch-2,
.branch-left.branch-3 {
  transform-origin: 100% 50%;
}

/* ========== 树叶叶片 ========== */
.leaf-cluster {
  position: absolute;
  /* 由JS定位 */
}

.leaf {
  position: absolute;
  width: 32px;
  height: 40px;
  transform-origin: 50% 100%;
  will-change: transform;
  filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.15));
}

.leaf svg {
  width: 100%;
  height: 100%;
}

/* 叶片颜色变体 */
.leaf-green-1 svg path { fill: #66BB6A; }
.leaf-green-2 svg path { fill: #4CAF50; }
.leaf-green-3 svg path { fill: #43A047; }
.leaf-green-4 svg path { fill: #81C784; }
.leaf-green-5 svg path { fill: #388E3C; }
.leaf-light-1 svg path { fill: #A5D6A7; }
.leaf-light-2 svg path { fill: #C8E6C9; }
.leaf-yellow svg path  { fill: #AED581; }

/* ========== 飘落的叶子 ========== */
.falling-leaf {
  position: absolute;
  pointer-events: none;
  will-change: transform, opacity;
}

/* ========== 远景树（背景层次） ========== */
.bg-tree {
  position: absolute;
  bottom: 17%;
  opacity: 0.35;
  filter: blur(1px);
}

.bg-tree .trunk {
  background: #3E6B2F;
}

.bg-tree .branch-1,
.bg-tree .branch-2 {
  background: #3E6B2F;
}

.bg-tree .leaf svg path {
  fill: #4CAF50;
}

/* ========== 云朵 ========== */
.cloud {
  position: absolute;
  background: rgba(255, 255, 255, 0.7);
  border-radius: 50px;
  animation: cloud-drift linear infinite;
}

.cloud::before,
.cloud::after {
  content: '';
  position: absolute;
  background: inherit;
  border-radius: 50%;
}

@keyframes cloud-drift {
  from { transform: translateX(-200px); }
  to   { transform: translateX(calc(100vw + 200px)); }
}

/* ========== 草 ========== */
.grass-blade {
  position: absolute;
  bottom: 16%;
  width: 4px;
  border-radius: 2px 2px 0 0;
  transform-origin: bottom center;
  will-change: transform;
}

/* ========== 树影 ========== */
.tree-shadow {
  position: absolute;
  bottom: 15%;
  left: 50%;
  transform: translateX(-50%) scaleY(0.15) scaleX(1.5);
  width: 300px;
  height: 300px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.2) 0%, transparent 70%);
  border-radius: 50%;
}

/* ========== 提示 ========== */
.hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  z-index: 100;
  pointer-events: none;
  animation: hint-fade 4s ease-in-out infinite;
}

@keyframes hint-fade {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}
</style>
</head>
<body>

<div class="scene" id="scene">
  <!-- 地面 -->
  <div class="ground"></div>

  <!-- 树影 -->
  <div class="tree-shadow" id="treeShadow"></div>

  <!-- 主树容器 -->
  <div class="tree" id="mainTree">
    <div class="trunk" id="trunk"></div>
    <!-- 树枝和树叶由 JS 生成 -->
  </div>

  <!-- 风力指示器 -->
  <div class="wind-indicator">
    <h3>WIND</h3>
    <div class="wind-bar-wrap"><div class="wind-bar" id="windBar"></div></div>
    <span class="wind-label" id="windLabel">微风</span>
  </div>

  <div class="hint">移动鼠标左右可改变风向</div>
</div>

<script>
/**
 * ========================================
 *   风吹树叶 — 自然动效模拟引擎
 * ========================================
 * 核心思路：
 *   1. 用多层正弦波叠加模拟自然风（伪 Perlin 噪声）
 *   2. 风力通过层级结构从树干 → 树枝 → 叶片逐级传递
 *   3. 每层加入不同的阻尼、延迟和弹性，产生自然的摆动差异
 *   4. CSS 处理平滑过渡，JS 处理物理计算
 */

// ==================== 全局状态 ====================
const state = {
  time: 0,
  windForce: 0.3,       // 当前风力 (0~1)
  windAngle: 0,         // 当前风向角
  targetWindForce: 0.3, // 目标风力
  mouseX: 0.5,          // 鼠标 X 归一化
  gustTimer: 0,         // 阵风计时
  gustStrength: 0,      // 阵风强度
  leaves: [],           // 所有叶片引用
  branches: [],         // 所有树枝引用
  grassBlades: [],      // 草叶引用
  fallingLeaves: [],    // 飘落叶片
};

// ==================== 工具函数 ====================
function rand(min, max) { return Math.random() * (max - min) + min; }
function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

/**
 * 多层正弦波合成 —— 模拟自然风的不规则节奏
 * 用 4 层不同频率的正弦叠加，比直接 sin() 更有自然感
 */
function windNoise(t, seed) {
  return (
    Math.sin(t * 0.7 + seed) * 0.5 +
    Math.sin(t * 1.3 + seed * 2.1) * 0.3 +
    Math.sin(t * 2.9 + seed * 0.7) * 0.15 +
    Math.sin(t * 5.1 + seed * 3.3) * 0.05
  );
}

// ==================== 叶片 SVG 模板 ====================
const leafSVG = `<svg viewBox="0 0 32 44" xmlns="http://www.w3.org/2000/svg">
  <path d="M16 44 C16 44 14 30 8 22 C2 14 0 8 4 4 C8 0 12 0 16 10 C20 0 24 0 28 4 C32 8 30 14 24 22 C18 30 16 44 16 44Z"/>
  <path d="M16 40 L16 12" stroke="rgba(0,0,0,0.1)" stroke-width="1" fill="none"/>
  <path d="M16 22 L10 16" stroke="rgba(0,0,0,0.06)" stroke-width="0.5" fill="none"/>
  <path d="M16 22 L22 16" stroke="rgba(0,0,0,0.06)" stroke-width="0.5" fill="none"/>
  <path d="M16 30 L11 24" stroke="rgba(0,0,0,0.06)" stroke-width="0.5" fill="none"/>
  <path d="M16 30 L21 24" stroke="rgba(0,0,0,0.06)" stroke-width="0.5" fill="none"/>
</svg>`;

// ==================== 场景构建 ====================
const scene = document.getElementById('scene');
const mainTree = document.getElementById('mainTree');
const trunk = document.getElementById('trunk');

/**
 * 构建树的层级结构
 * 每根树枝存储：element, depth, side(左/右), baseAngle, length
 */
function buildTree() {
  const branchData = [
    // [depth, side, attachY(on trunk), baseAngle(deg), length, thickness-class]
    // 一级枝
    { depth: 0, side: 'right', y: 170, angle: -25, len: 120, cls: 'branch-1' },
    { depth: 0, side: 'right', y: 140, angle: -40, len: 110, cls: 'branch-1' },
    { depth: 0, side: 'right', y: 110, angle: -15, len: 100, cls: 'branch-1' },
    { depth: 0, side: 'left',  y: 180, angle: 25,  len: 115, cls: 'branch-1' },
    { depth: 0, side: 'left',  y: 145, angle: 35,  len: 105, cls: 'branch-1' },
    { depth: 0, side: 'left',  y: 115, angle: 20,  len: 95,  cls: 'branch-1' },
  ];

  // 二级枝（附着在一级枝末端区域）
  const subBranches = [];
  branchData.forEach((b, i) => {
    if (b.depth === 0 && i < 5) { // 前5根一级枝各长1~2根二级枝
      const count = i % 2 === 0 ? 2 : 1;
      for (let j = 0; j < count; j++) {
        const offsetX = rand(0.45, 0.85) * b.len;
        subBranches.push({
          parentIdx: i,
          depth: 1,
          side: j === 0 ? 'up' : 'down',
          offsetX,
          angle: b.side === 'right'
            ? rand(-70, -10)
            : rand(10, 70),
          len: rand(50, 75),
          cls: 'branch-2',
        });
      }
    }
  });

  // 三级小枝
  const twigBranches = [];
  subBranches.forEach((sb, i) => {
    if (i < 6) {
      twigBranches.push({
        parentIdx: i,
        parentIsSub: true,
        depth: 2,
        side: i % 2 === 0 ? 'up' : 'down',
        offsetX: rand(0.4, 0.9) * sb.len,
        angle: rand(-80, -10),
        len: rand(25, 45),
        cls: 'branch-3',
      });
    }
  });

  // 创建一级枝 DOM
  branchData.forEach((b, i) => {
    const el = document.createElement('div');
    el.className = `branch ${b.cls} branch-${b.side}`;
    el.style.width = b.len + 'px';

    const trunkX = b.side === 'right' ? 18 : -b.len + 18;
    el.style.left = trunkX + 'px';
    el.style.top = (220 - b.y) + 'px';
    el.style.transform = `rotate(${b.angle}deg)`;

    mainTree.appendChild(el);
    b.element = el;
    b.currentAngle = b.angle;

    // 在枝条上生成叶簇
    const leafCount = Math.floor(rand(6, 12));
    for (let l = 0; l < leafCount; l++) {
      const lx = rand(0.4, 1.0) * b.len;
      const ly = rand(-20, -5);
      createLeaf(mainTree, trunkX + lx * Math.cos(b.angle * Math.PI / 180),
        (220 - b.y) + lx * Math.sin(b.angle * Math.PI / 180) + ly,
        b.depth, i);
    }
  });

  // 创建二级枝 DOM
  subBranches.forEach((sb) => {
    const parent = branchData[sb.parentIdx];
    const el = document.createElement('div');
    el.className = `branch ${sb.cls}`;
    el.style.width = sb.len + 'px';

    const startAngle = parent.angle;
    const totalAngle = startAngle + (parent.side === 'right' ? sb.angle : -sb.angle);
    const px = parent.side === 'right' ? 18 : -parent.len + 18;
    const rad = parent.angle * Math.PI / 180;
    const sx = px + sb.offsetX * Math.cos(rad);
    const sy = (220 - parent.y) + sb.offsetX * Math.sin(rad);

    el.style.left = sx + 'px';
    el.style.top = sy + 'px';
    el.style.transform = `rotate(${totalAngle}deg)`;
    el.style.transformOrigin = '0% 50%';

    mainTree.appendChild(el);
    sb.element = el;
    sb.currentAngle = totalAngle;

    // 二级枝上的叶子
    const leafCount = Math.floor(rand(4, 8));
    for (let l = 0; l < leafCount; l++) {
      const lx = rand(0.3, 1.0) * sb.len;
      const offAngle = totalAngle;
      const lr = offAngle * Math.PI / 180;
      createLeaf(mainTree, sx + lx * Math.cos(lr),
        sy + lx * Math.sin(lr) + rand(-18, 0),
        sb.depth + 1, sb.parentIdx);
    }

    state.branches.push({
      element: el,
      depth: 1,
      baseAngle: totalAngle,
      currentAngle: totalAngle,
      stiffness: 0.6, // 越深层越软
    });
  });

  // 三级小枝
  twigBranches.forEach((tb) => {
    const parentList = subBranches;
    const parent = parentList[tb.parentIdx];
    const el = document.createElement('div');
    el.className = `branch ${tb.cls}`;
    el.style.width = tb.len + 'px';

    const rad = parent.currentAngle * Math.PI / 180;
    const sx = parseFloat(parent.element.style.left) + tb.offsetX * Math.cos(rad);
    const sy = parseFloat(parent.element.style.top) + tb.offsetX * Math.sin(rad);
    const totalAngle = parent.currentAngle + rand(-30, 30);

    el.style.left = sx + 'px';
    el.style.top = sy + 'px';
    el.style.transform = `rotate(${totalAngle}deg)`;
    el.style.transformOrigin = '0% 50%';

    mainTree.appendChild(el);

    // 小枝上的少量叶子
    const leafCount = Math.floor(rand(2, 5));
    for (let l = 0; l < leafCount; l++) {
      const lx = rand(0.2, 1.0) * tb.len;
      const lr = totalAngle * Math.PI / 180;
      createLeaf(mainTree, sx + lx * Math.cos(lr),
        sy + lx * Math.sin(lr) + rand(-12, 0),
        2, tb.parentIdx);
    }

    state.branches.push({
      element: el,
      depth: 2,
      baseAngle: totalAngle,
      currentAngle: totalAngle,
      stiffness: 0.4,
    });
  });

  // 注册一级枝到 branches
  branchData.forEach(b => {
    state.branches.push({
      element: b.element,
      depth: 0,
      baseAngle: b.angle,
      currentAngle: b.angle,
      stiffness: 0.85,
    });
  });

  // 树干顶部也放些叶簇
  for (let i = 0; i < 8; i++) {
    createLeaf(mainTree, rand(-5, 40), rand(5, 25), 0, 0);
  }
}

const leafColors = [
  'leaf-green-1', 'leaf-green-2', 'leaf-green-3',
  'leaf-green-4', 'leaf-green-5', 'leaf-light-1',
  'leaf-light-2', 'leaf-yellow',
];

/**
 * 创建单片叶子 DOM 并注册到 state.leaves
 */
function createLeaf(container, x, y, depth, branchSeed) {
  const el = document.createElement('div');
  const colorClass = leafColors[Math.floor(rand(0, leafColors.length))];
  el.className = `leaf ${colorClass}`;
  el.innerHTML = leafSVG;

  const scale = rand(0.6, 1.1);
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.transform = `scale(${scale})`;

  container.appendChild(el);

  state.leaves.push({
    element: el,
    depth: depth,
    seed: branchSeed + rand(0, 10),
    baseX: x,
    baseY: y,
    scale,
    baseRotation: rand(-30, 30),
    phase: rand(0, Math.PI * 2),
    stiffness: Math.max(0.15, 0.9 - depth * 0.25),  // 浅层刚硬，深层柔软
  });
}

// ==================== 草地 ====================
function createGrass() {
  const count = Math.floor(window.innerWidth / 12);
  for (let i = 0; i < count; i++) {
    const blade = document.createElement('div');
    blade.className = 'grass-blade';
    const x = rand(0, window.innerWidth);
    const h = rand(20, 55);
    blade.style.left = x + 'px';
    blade.style.height = h + 'px';
    blade.style.width = rand(2, 5) + 'px';

    const green = Math.floor(rand(100, 180));
    blade.style.background = `linear-gradient(to top, hsl(${rand(95, 130)}, ${rand(50, 70)}%, ${rand(28, 40)}%), hsl(${rand(80, 120)}, ${rand(60, 80)}%, ${green}px))`;

    scene.appendChild(blade);
    state.grassBlades.push({
      element: blade,
      height: h,
      seed: rand(0, 100),
      stiffness: rand(0.5, 1.0),
    });
  }
}

// ==================== 云朵 ====================
function createClouds() {
  for (let i = 0; i < 4; i++) {
    const cloud = document.createElement('div');
    cloud.className = 'cloud';
    const w = rand(120, 200);
    const h = rand(40, 60);
    cloud.style.width = w + 'px';
    cloud.style.height = h + 'px';
    cloud.style.top = rand(30, 120) + 'px';
    cloud.style.left = rand(-200, window.innerWidth) + 'px';
    cloud.style.animationDuration = rand(40, 80) + 's';
    cloud.style.animationDelay = rand(-40, 0) + 's';

    cloud.style.setProperty('animation-duration', rand(40, 80) + 's');

    // 云上的圆球
    const p1 = document.createElement('div');
    p1.style.cssText = `position:absolute; width:${w * 0.5}px; height:${w * 0.45}px; background:inherit; border-radius:50%; top:-${h * 0.3}px; left:${w * 0.2}px;`;
    const p2 = document.createElement('div');
    p2.style.cssText = `position:absolute; width:${w * 0.4}px; height:${w * 0.35}px; background:inherit; border-radius:50%; top:-${h * 0.15}px; left:${w * 0.5}px;`;
    cloud.appendChild(p1);
    cloud.appendChild(p2);
    scene.appendChild(cloud);
  }
}

// ==================== 飘落叶片 ====================
function spawnFallingLeaf() {
  if (state.fallingLeaves.length > 15) return;
  if (state.windForce < 0.25) return;

  const el = document.createElement('div');
  el.className = 'falling-leaf';
  const colorClass = leafColors[Math.floor(rand(0, leafColors.length))];
  const scale = rand(0.4, 0.8);
  el.innerHTML = leafSVG;
  el.querySelector('svg').style.transform = `scale(${scale})`;

  const startX = rand(window.innerWidth * 0.2, window.innerWidth * 0.8);
  const startY = rand(window.innerHeight * 0.1, window.innerHeight * 0.45);
  el.style.left = startX + 'px';
  el.style.top = startY + 'px';

  scene.appendChild(el);

  state.fallingLeaves.push({
    element: el,
    x: startX,
    y: startY,
    vx: rand(-1, 2),
    vy: rand(0.5, 1.5),
    rotation: rand(0, 360),
    rotSpeed: rand(-3, 3),
    swayPhase: rand(0, Math.PI * 2),
    swayAmp: rand(30, 80),
    life: 1.0,
    drift: rand(0.5, 1.0),
  });
}

// ==================== 风力系统 ====================
function updateWind(dt) {
  // 基础风：多层正弦叠加，缓慢变化
  const baseWind = windNoise(state.time * 0.4, 42) * 0.5 + 0.5; // 0~1

  // 阵风：随机出现的强风脉冲
  state.gustTimer -= dt;
  if (state.gustTimer <= 0) {
    state.gustStrength = rand(0.1, 0.6);
    state.gustTimer = rand(3, 8);
  }
  state.gustStrength *= 0.995; // 渐弱

  // 鼠标影响风向
  const mouseBias = (state.mouseX - 0.5) * 0.35;

  state.targetWindForce = clamp(baseWind + state.gustStrength + mouseBias, 0.05, 1.0);

  // 平滑过渡到目标风�
  state.windForce = lerp(state.windForce, state.targetWindForce, 2.5 * dt);
  state.windAngle = lerp(state.windAngle, mouseBias, 1.5 * dt);

  // 更新 UI 指示器
  document.getElementById('windBar').style.width = (state.windForce * 100) + '%';
  const windLabels = ['静风', '微风', '轻风', '和风', '清风', '强风'];
  const labelIdx = Math.min(Math.floor(state.windForce * windLabels.length), windLabels.length - 1);
  document.getElementById('windLabel').textContent = windLabels[labelIdx];

  // 强风时飘落叶子
  if (Math.random() < state.windForce * 0.02) {
    spawnFallingLeaf();
  }
}

// ==================== 动画更新 ====================
function updateLeaves() {
  const wind = state.windForce;
  const dir = state.windAngle;
  const t = state.time;

  for (const leaf of state.leaves) {
    // 风对叶片的影响：平移 + 旋转
    const likeaf = Math.max(0.2, leaf.stiffness);

    // 各片叶子有不同的相位偏移，避免同步
    const phase = leaf.phase;
    const s = leaf.seed;

    // 水平摆动：风力越大摆动越大
    const swayX = windNoise(t * 1.5 + phase, s) * wind * 20 * (1 - likeaf + 0.3)
                  + dir * wind * 15;

    // 垂直轻微浮动
    const swayY = Math.sin(t * 2.0 + phase * 1.3) * wind * 5 * (1 - likeaf + 0.3);

    // 旋转摆动
    const rotSway = windNoise(t * 1.2 + phase * 0.5, s + 7)
                    * wind * 25 * (1 - likeaf + 0.2)
                    + leaf.baseRotation;

    // 风力导致的倾斜（向风向倾斜）
    const windTilt = dir * wind * 12;

    leaf.element.style.transform =
      `translate(${swayX}px, ${swayY}px) rotate(${rotSway + windTilt}deg) scale(${leaf.scale})`;
  }
}

function updateBranches() {
  const wind = state.windForce;
  const dir = state.windAngle;
  const t = state.time;

  for (const b of state.branches) {
    const flexibility = 1 - b.stiffness; // 越柔性越容易受风
    const sway = windNoise(t * 0.8, b.depth * 3.7) * wind * flexibility * 12
                 + dir * wind * flexibility * 8;

    b.currentAngle = b.baseAngle + sway;
    b.element.style.transform = `rotate(${b.currentAngle}deg)`;
  }

  // 树干轻微摇摆
  const trunkSway = dir * wind * 2 + Math.sin(t * 0.5) * wind * 1.5;
  trunk.style.transform = `translateX(-50%) rotate(${trunkSway}deg)`;
}

function updateGrass() {
  const wind = state.windForce;
  const dir = state.windAngle;
  const t = state.time;

  for (const g of state.grassBlades) {
    const sway = (Math.sin(t * 2.5 + g.seed) * wind * 15 * (1 - g.stiffness + 0.3)
                  + dir * wind * 12);
    g.element.style.transform = `rotate(${sway}deg)`;
  }
}

function updateFallingLeaves(dt) {
  for (let i = state.fallingLeaves.length - 1; i >= 0; i--) {
    const fl = state.fallingLeaves[i];

    // 水平漂移：风 + 正弦摆动
    fl.vx += state.windAngle * state.windForce * 0.3 * dt;
    fl.x += fl.vx + Math.sin(state.time * 2 + fl.swayPhase) * fl.swayAmp * dt;
    fl.y += fl.vy * 60 * dt;

    // 旋转
    fl.rotation += fl.rotSpeed + state.windForce * 2;

    fl.life -= dt * 0.15;

    fl.element.style.left = fl.x + 'px';
    fl.element.style.top = fl.y + 'px';
    fl.element.style.transform = `rotate(${fl.rotation}deg)`;
    fl.element.style.opacity = clamp(fl.life, 0, 1);

    // 移除出界或淡出的叶片
    if (fl.y > window.innerHeight + 50 || fl.life <= 0) {
      fl.element.remove();
      state.fallingLeaves.splice(i, 1);
    }
  }
}

// ==================== 主循环 ====================
let lastTime = performance.now();

function animate(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05); // 限制最大 dt 防止跳帧
  lastTime = now;
  state.time += dt;

  updateWind(dt);
  updateBranches();
  updateLeaves();
  updateGrass();
  updateFallingLeaves(dt);

  requestAnimationFrame(animate);
}

// ==================== 事件 ====================
window.addEventListener('mousemove', (e) => {
  state.mouseX = e.clientX / window.innerWidth;
});

window.addEventListener('touchmove', (e) => {
  state.mouseX = e.touches[0].clientX / window.innerWidth;
}, { passive: true });

// ==================== 初始化 ====================
function init() {
  buildTree();
  createGrass();
  createClouds();
  requestAnimationFrame(animate);
}

init();
</script>
</body>
</html>
