<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐可视化</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    user-select: none;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* 上传遮罩 */
  .upload-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,15,.92);
    z-index: 20;
    transition: opacity .5s, visibility .5s;
  }
  .upload-overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .upload-overlay h1 {
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: .15em;
    margin-bottom: 1.4rem;
    background: linear-gradient(135deg, #00e0ff, #ff6090);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .upload-btn {
    position: relative;
    padding: 14px 40px;
    border: 1.5px dashed rgba(255,255,255,.25);
    border-radius: 12px;
    cursor: pointer;
    font-size: 1rem;
    color: #aab;
    transition: border-color .3s, color .3s;
  }
  .upload-btn:hover {
    border-color: #00e0ff;
    color: #00e0ff;
  }
  .upload-btn input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  /* 底部控制栏 */
  .controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 24px;
    background: rgba(10,10,15,.75);
    backdrop-filter: blur(12px);
    opacity: 0;
    transform: translateY(100%);
    transition: opacity .4s, transform .4s;
  }
  .controls.show {
    opacity: 1;
    transform: translateY(0);
  }

  .play-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,.1);
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .2s;
  }
  .play-btn:hover { background: rgba(255,255,255,.2); }

  .track-info {
    font-size: .82rem;
    color: #889;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
    flex-shrink: 1;
  }

  .progress-wrap {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,.08);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #00e0ff, #ff6090);
    border-radius: 4px;
    width: 0%;
    pointer-events: none;
  }
  .time-label {
    font-size: .72rem;
    color: #667;
    min-width: 80px;
    text-align: center;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .vol-slider {
    -webkit-appearance: none;
    width: 80px;
    height: 4px;
    background: rgba(255,255,255,.12);
    border-radius: 4px;
    outline: none;
    flex-shrink: 0;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #00e0ff;
    cursor: pointer;
  }

  .mode-btns {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .mode-btn {
    padding: 5px 12px;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 6px;
    background: transparent;
    color: #99a;
    font-size: .75rem;
    cursor: pointer;
    transition: all .25s;
  }
  .mode-btn.active {
    border-color: #00e0ff;
    color: #00e0ff;
    background: rgba(0,224,255,.08);
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- 上传遮罩 -->
<div class="upload-overlay" id="uploadOverlay">
  <h1>音乐可视化</h1>
  <div class="upload-btn">
    选择音频文件
    <input type="file" id="fileInput" accept="audio/*">
  </div>
  <p style="margin-top:1rem;font-size:.8rem;color:#556">支持 MP3 / WAV / OGG / FLAC</p>
</div>

<!-- 底部控制栏 -->
<div class="controls" id="controls">
  <button class="play-btn" id="playBtn">▶</button>
  <span class="track-info" id="trackInfo">--</span>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <span class="time-label" id="timeLabel">0:00 / 0:00</span>
  <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step=".01" value=".8">
  <div class="mode-btns">
    <button class="mode-btn active" data-mode="bars">柱状</button>
    <button class="mode-btn" data-mode="wave">波浪</button>
    <button class="mode-btn" data-mode="ring">环形</button>
    <button class="mode-btn" data-mode="particle">粒子雨</button>
  </div>
</div>

<script>
(() => {
  /* ========== 常量 & 工具 ========== */
  const FFT_SIZE = 2048;
  const BAR_COUNT = 128;
  const TWO_PI = Math.PI * 2;

  /* 将 hex 颜色 + brightness 转为 rgba */
  function hexToRgb(hex) {
    const n = parseInt(hex.slice(1), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec < 10 ? '0' : ''}${sec}`;
  }

  /* ========== DOM 引用 ========== */
  const canvas     = document.getElementById('canvas');
  const ctx        = canvas.getContext('2d');
  const overlay    = document.getElementById('uploadOverlay');
  const fileInput  = document.getElementById('fileInput');
  const controls   = document.getElementById('controls');
  const playBtn    = document.getElementById('playBtn');
  const trackInfo  = document.getElementById('trackInfo');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  const timeLabel  = document.getElementById('timeLabel');
  const volSlider  = document.getElementById('volSlider');
  const modeBtns   = document.querySelectorAll('.mode-btn');

  /* ========== 音频上下文 ========== */
  let audioCtx, analyser, srcNode, audio;
  let freqData, timeData;
  let isPlaying = false;
  let currentMode = 'bars';
  let animId = null;

  /* 粒子系统 */
  let particles = [];

  /* ========== Canvas 自适应 ========== */
  function resize() {
    const dpr = devicePixelRatio || 1;
    canvas.width  = innerWidth * dpr;
    canvas.height = innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const W = () => innerWidth;
  const H = () => innerHeight;

  /* ========== 初始化音频 ========== */
  function initAudio(file) {
    if (audioCtx) audioCtx.close();
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = 0.82;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.frequencyBinCount);

    if (audio) audio.pause();
    audio = new Audio();
    audio.crossOrigin = 'anonymous';
    audio.src = URL.createObjectURL(file);
    audio.volume = +volSlider.value;

    if (srcNode) srcNode.disconnect();
    srcNode = audioCtx.createMediaElementSource(audio);
    srcNode.connect(analyser);
    analyser.connect(audioCtx.destination);

    trackInfo.textContent = file.name.replace(/\.[^.]+$/, '');
    trackInfo.title = file.name;
  }

  /* ========== 播放控制 ========== */
  function togglePlay() {
    if (!audio) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (isPlaying) {
      audio.pause();
      playBtn.textContent = '▶';
    } else {
      audio.play();
      playBtn.textContent = '⏸';
      loop();
    }
    isPlaying = !isPlaying;
  }

  playBtn.addEventListener('click', togglePlay);

  volSlider.addEventListener('input', () => {
    if (audio) audio.volume = +volSlider.value;
  });

  /* 进度条点击跳转 */
  progressWrap.addEventListener('click', (e) => {
    if (!audio || !audio.duration) return;
    const ratio = e.offsetX / progressWrap.clientWidth;
    audio.currentTime = ratio * audio.duration;
  });

  /* 空格键播放/暂� */
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && audio) { e.preventDefault(); togglePlay(); }
  });

  /* ========== 上传处理 ========== */
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    initAudio(file);
    overlay.classList.add('hidden');
    controls.classList.add('show');
    audio.addEventListener('ended', () => {
      isPlaying = false;
      playBtn.textContent = '▶';
    });
    togglePlay();
  });

  /* ========== 切换模式 ========== */
  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      modeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
      particles = []; // 切换时清粒子
    });
  });

  /* ========== 获取音量值 ========== */
  function getVolume() {
    let sum = 0;
    for (let i = 0; i < freqData.length; i++) sum += freqData[i];
    return sum / freqData.length / 255; // 0~1
  }

  /* 颜色亮度映射 */
  function hslColor(baseHue, lightAdd, alpha) {
    return `hsla(${baseHue}, 85%, ${55 + lightAdd}%, ${alpha})`;
  }

  /* ========== 绘制模式 ========== */

  /* --- 柱状跳动 --- */
  function drawBars(vol) {
    const w = W(), h = H();
    const step = w / BAR_COUNT;
    const baseHue = 190 + vol * 60; // 蓝 → 粉

    for (let i = 0; i < BAR_COUNT; i++) {
      const idx = Math.floor(i * freqData.length / BAR_COUNT);
      const val = freqData[idx] / 255;
      const barH = val * h * 0.7;
      const x = i * step;
      const hue = (baseHue + i * 1.2) % 360;
      const lightness = 45 + val * 30 + vol * 20;

      /* 主柱 */
      const grad = ctx.createLinearGradient(x, h, x, h - barH);
      grad.addColorStop(0, `hsla(${hue},90%,${lightness}%,0.9)`);
      grad.addColorStop(1, `hsla(${hue},70%,${lightness + 20}%,0.4)`);
      ctx.fillStyle = grad;
      ctx.fillRect(x + 1, h - barH, step - 2, barH);

      /* 倒影 */
      const rGrad = ctx.createLinearGradient(x, h, x, h + barH * 0.3);
      rGrad.addColorStop(0, `hsla(${hue},80%,${lightness}%,0.18)`);
      rGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = rGrad;
      ctx.fillRect(x + 1, h, step - 2, barH * 0.3);
    }
  }

  /* --- 波浪 --- */
  function drawWave(vol) {
    const w = W(), h = H();
    const baseHue = 200 + vol * 80;
    const lightness = 50 + vol * 25;
    const mid = h / 2;
    const sliceW = w / timeData.length;

    /* 绘制多层波浪 */
    for (let layer = 0; layer < 3; layer++) {
      ctx.beginPath();
      const offset = layer * 8;
      const amp = 1 + layer * 0.3;
      const alpha = 0.8 - layer * 0.25;
      const hue = (baseHue + layer * 30) % 360;

      for (let i = 0; i < timeData.length; i++) {
        const v = (timeData[i] / 128 - 1) * amp;
        const y = mid + v * (h * 0.35) - offset;
        if (i === 0) ctx.moveTo(0, y);
        else ctx.lineTo(i * sliceW, y);
      }

      ctx.strokeStyle = `hsla(${hue},80%,${lightness}%,${alpha})`;
      ctx.lineWidth = 3 - layer * 0.6;
      ctx.stroke();

      /* 填充底部 */
      ctx.lineTo(w, h);
      ctx.lineTo(0, h);
      ctx.closePath();
      ctx.fillStyle = `hsla(${hue},70%,${lightness}%,0.06)`;
      ctx.fill();
    }
  }

  /* --- 环形 --- */
  function drawRing(vol) {
    const w = W(), h = H();
    const cx = w / 2, cy = h / 2;
    const baseR = Math.min(w, h) * 0.15;
    const maxR  = Math.min(w, h) * 0.38;
    const baseHue = 270 + vol * 60;
    const lightness = 50 + vol * 25;
    const count = 180;

    /* 中心光晕 */
    const glowR = baseR * (1 + vol * 0.8);
    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR * 1.5);
    glow.addColorStop(0, `hsla(${baseHue},80%,${lightness}%,0.25)`);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx, cy, glowR * 1.5, 0, TWO_PI);
    ctx.fill();

    for (let i = 0; i < count; i++) {
      const angle = (i / count) * TWO_PI - Math.PI / 2;
      const idx = Math.floor(i * freqData.length / count);
      const val = freqData[idx] / 255;
      const len = val * (maxR - baseR);
      const hue = (baseHue + i * 2) % 360;

      const x1 = cx + Math.cos(angle) * baseR;
      const y1 = cy + Math.sin(angle) * baseR;
      const x2 = cx + Math.cos(angle) * (baseR + len);
      const y2 = cy + Math.sin(angle) * (baseR + len);

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = `hsla(${hue},85%,${lightness + val * 15}%,0.8)`;
      ctx.lineWidth = 2.2;
      ctx.stroke();
    }

    /* 内环线 */
    ctx.beginPath();
    ctx.arc(cx, cy, baseR - 3, 0, TWO_PI);
    ctx.strokeStyle = `hsla(${baseHue},60%,${lightness}%,0.3)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    /* 外环连线 */
    ctx.beginPath();
    for (let i = 0; i <= count; i++) {
      const idx = Math.floor((i % count) * freqData.length / count);
      const val = freqData[idx] / 255;
      const r = baseR + val * (maxR - baseR);
      const angle = ((i % count) / count) * TWO_PI - Math.PI / 2;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = `hsla(${baseHue},70%,${lightness + 10}%,0.35)`;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  /* --- 粒子雨 --- */
  function drawParticle(vol) {
    const w = W(), h = H();
    const baseHue = 140 + vol * 100;
    const lightness = 45 + vol * 30;
    const spawnRate = Math.floor(3 + vol * 25);

    /* 生成新粒子 */
    for (let i = 0; i < spawnRate; i++) {
      const idx = Math.floor(Math.random() * freqData.length);
      const val = freqData[idx] / 255;
      if (val < 0.1) continue;
      const hue = (baseHue + Math.random() * 60) % 360;
      particles.push({
        x: Math.random() * w,
        y: -10,
        vx: (Math.random() - 0.5) * 1.5,
        vy: 1.5 + val * 6,
        r: 1.5 + val * 4,
        life: 1,
        decay: 0.003 + Math.random() * 0.006,
        hue,
        lightness: lightness + val * 20
      });
    }

    /* 更新 & 绘制 */
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0 || p.y > h + 20) {
        particles.splice(i, 1);
        continue;
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, TWO_PI);
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * p.life);
      grad.addColorStop(0, `hsla(${p.hue},85%,${p.lightness}%,${p.life * 0.9})`);
      grad.addColorStop(1, `hsla(${p.hue},60%,${p.lightness}%,0)`);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    /* 限制粒子数量 */
    if (particles.length > 2000) particles.splice(0, particles.length - 2000);

    /* 底部频谱条 */
    const barCount = 64;
    const step = w / barCount;
    for (let i = 0; i < barCount; i++) {
      const idx = Math.floor(i * freqData.length / barCount);
      const val = freqData[idx] / 255;
      const barH = val * h * 0.15;
      const hue = (baseHue + i * 3) % 360;
      ctx.fillStyle = `hsla(${hue},70%,${lightness}%,0.2)`;
      ctx.fillRect(i * step, h - barH, step - 1, barH);
    }
  }

  /* ========== 主循环 ========== */
  function loop() {
    animId = requestAnimationFrame(loop);
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);

    const vol = getVolume();
    const w = W(), h = H();

    /* 拖尾效果 */
    ctx.fillStyle = `rgba(10,10,15,${currentMode === 'particle' ? 0.15 : 0.28})`;
    ctx.fillRect(0, 0, w, h);

    /* 根据模式绘制 */
    switch (currentMode) {
      case 'bars':     drawBars(vol);     break;
      case 'wave':     drawWave(vol);     break;
      case 'ring':     drawRing(vol);     break;
      case 'particle': drawParticle(vol); break;
    }

    /* 更新进度 */
    if (audio && audio.duration) {
      const cur = audio.currentTime;
      const dur = audio.duration;
      progressBar.style.width = (cur / dur * 100) + '%';
      timeLabel.textContent = `${formatTime(cur)} / ${formatTime(dur)}`;
    }
  }

})();
</script>
</body>
</html>
