<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子鱼缸</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #fishTank {
            cursor: pointer;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
        }

        /* 尾鳍摇动动画 */
        @keyframes tailWag {
            0%, 100% {
                transform: rotate(-8deg);
            }
            50% {
                transform: rotate(8deg);
            }
        }

        .tail-fin {
            transform-origin: left center;
            animation: tailWag 0.4s ease-in-out infinite;
        }

        .tail-fin-small {
            transform-origin: left center;
            animation: tailWag 0.3s ease-in-out infinite;
        }

        /* 饲料下沉动画 */
        @keyframes sink {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0.8;
            }
        }

        .food {
            animation: sink 3s ease-in-out;
        }

        /* 鱼缸水面闪烁效果 */
        @keyframes shimmer {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.5;
            }
        }

        .water-surface {
            animation: shimmer 3s ease-in-out infinite;
        }

        .instruction {
            color: white;
            margin-top: 20px;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐠 电子鱼缸 🐠</h1>
        <svg id="fishTank" width="800" height="600" viewBox="0 0 800 600">
            <defs>
                <!-- 水的渐变 -->
                <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#1e90ff;stop-opacity:0.6" />
                    <stop offset="50%" style="stop-color:#4169e1;stop-opacity:0.7" />
                    <stop offset="100%" style="stop-color:#0000cd;stop-opacity:0.8" />
                </linearGradient>

                <!-- 玻璃反光渐变 -->
                <linearGradient id="glassReflection" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
                    <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1" />
                    <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.3" />
                </linearGradient>

                <!-- 金鱼身体渐变 -->
                <linearGradient id="goldFishBody" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#ffd700" />
                    <stop offset="50%" style="stop-color:#ffb347" />
                    <stop offset="100%" style="stop-color:#ff8c00" />
                </linearGradient>

                <!-- 水草渐变 -->
                <linearGradient id="seaweedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#228b22" />
                    <stop offset="100%" style="stop-color:#006400" />
                </linearGradient>

                <!-- 石头渐变 -->
                <radialGradient id="stoneGradient">
                    <stop offset="0%" style="stop-color:#8b7355" />
                    <stop offset="100%" style="stop-color:#5d4e37" />
                </radialGradient>

                <!-- 饲料渐变 -->
                <radialGradient id="foodGradient">
                    <stop offset="0%" style="stop-color:#ff6b6b" />
                    <stop offset="100%" style="stop-color:#c0392b" />
                </radialGradient>
            </defs>

            <!-- 鱼缸背景 -->
            <rect x="50" y="50" width="700" height="500" rx="20" fill="url(#waterGradient)" />

            <!-- 玻璃反光效果 -->
            <ellipse cx="200" cy="150" rx="100" ry="60" fill="url(#glassReflection)" class="water-surface" />
            <ellipse cx="600" cy="400" rx="80" ry="40" fill="url(#glassReflection)" opacity="0.2" />

            <!-- 水草 -->
            <g id="seaweed">
                <!-- 左侧水草 -->
                <path d="M80,550 Q100,450 90,400 Q80,350 100,300" stroke="url(#seaweedGradient)" stroke-width="8" fill="none" stroke-linecap="round">
                    <animate attributeName="d" dur="4s" repeatCount="indefinite" values="M80,550 Q100,450 90,400 Q80,350 100,300;M80,550 Q70,450 90,400 Q100,350 90,300;M80,550 Q100,450 90,400 Q80,350 100,300" />
                </path>
                <path d="M100,550 Q120,470 110,420 Q100,370 120,320" stroke="url(#seaweedGradient)" stroke-width="6" fill="none" stroke-linecap="round">
                    <animate attributeName="d" dur="5s" repeatCount="indefinite" values="M100,550 Q120,470 110,420 Q100,370 120,320;M100,550 Q90,470 110,420 Q120,370 110,320;M100,550 Q120,470 110,420 Q100,370 120,320" />
                </path>
                <path d="M60,550 Q80,480 70,430 Q60,380 80,340" stroke="url(#seaweedGradient)" stroke-width="5" fill="none" stroke-linecap="round">
                    <animate attributeName="d" dur="4.5s" repeatCount="indefinite" values="M60,550 Q80,480 70,430 Q60,380 80,340;M60,550 Q50,480 70,430 Q80,380 70,340;M60,550 Q80,480 70,430 Q60,380 80,340" />
                </path>

                <!-- 右侧水草 -->
                <path d="M720,550 Q700,450 710,400 Q720,350 700,300" stroke="url(#seaweedGradient)" stroke-width="8" fill="none" stroke-linecap="round">
                    <animate attributeName="d" dur="4.2s" repeatCount="indefinite" values="M720,550 Q700,450 710,400 Q720,350 700,300;M720,550 Q730,450 710,400 Q700,350 710,300;M720,550 Q700,450 710,400 Q720,350 700,300" />
                </path>
                <path d="M700,550 Q680,470 690,420 Q700,370 680,320" stroke="url(#seaweedGradient)" stroke-width="6" fill="none" stroke-linecap="round">
                    <animate attributeName="d" dur="5.2s" repeatCount="indefinite" values="M700,550 Q680,470 690,420 Q700,370 680,320;M700,550 Q710,470 690,420 Q680,370 690,320;M700,550 Q680,470 690,420 Q700,370 680,320" />
                </path>
            </g>

            <!-- 石头 -->
            <g id="stones">
                <ellipse cx="180" cy="530" rx="45" ry="25" fill="url(#stoneGradient)" />
                <ellipse cx="250" cy="540" rx="55" ry="30" fill="url(#stoneGradient)" />
                <ellipse cx="340" cy="535" rx="35" ry="20" fill="url(#stoneGradient)" />
                <ellipse cx="620" cy="535" rx="50" ry="28" fill="url(#stoneGradient)" />
                <ellipse cx="540" cy="530" rx="40" ry="22" fill="url(#stoneGradient)" />
            </g>

            <!-- 大鱼 -->
            <g id="bigFish" transform="translate(400, 200)">
                <!-- 尾巴 -->
                <ellipse class="tail-fin" cx="-60" cy="0" rx="35" ry="25" fill="url(#goldFishBody)" />
                <!-- 背鳍 -->
                <ellipse cx="0" cy="-30" rx="20" ry="15" fill="url(#goldFishBody)" />
                <!-- 腹鳍 -->
                <ellipse cx="-10" cy="20" rx="12" ry="8" fill="url(#goldFishBody)" />
                <!-- 身体 -->
                <ellipse cx="0" cy="0" rx="60" ry="35" fill="url(#goldFishBody)" />
                <!-- 眼睛 -->
                <circle cx="35" cy="-8" r="8" fill="white" />
                <circle cx="37" cy="-8" r="5" fill="black" />
                <circle cx="38" cy="-9" r="2" fill="white" />
                <!-- 嘴巴 -->
                <path d="M55,0 Q60,3 58,8" stroke="#ff6b00" stroke-width="2" fill="none" />
                <!-- 鳞片装饰 -->
                <ellipse cx="0" cy="-5" rx="15" ry="8" fill="none" stroke="#ff8c00" stroke-width="1" />
                <ellipse cx="-15" cy="5" rx="12" ry="7" fill="none" stroke="#ff8c00" stroke-width="1" />
                <ellipse cx="10" cy="8" rx="12" ry="7" fill="none" stroke="#ff8c00" stroke-width="1" />
            </g>

            <!-- 小鱼 -->
            <g id="smallFish" transform="translate(600, 300)">
                <!-- 尾巴 -->
                <ellipse class="tail-fin-small" cx="-40" cy="0" rx="25" ry="18" fill="url(#goldFishBody)" />
                <!-- 背鳍 -->
                <ellipse cx="0" cy="-20" rx="15" ry="10" fill="url(#goldFishBody)" />
                <!-- 腹鳍 -->
                <ellipse cx="-5" cy="15" rx="8" ry="5" fill="url(#goldFishBody)" />
                <!-- 身体 -->
                <ellipse cx="0" cy="0" rx="40" ry="23" fill="url(#goldFishBody)" />
                <!-- 眼睛 -->
                <circle cx="23" cy="-5" r="6" fill="white" />
                <circle cx="25" cy="-5" r="4" fill="black" />
                <circle cx="26" cy="-6" r="1.5" fill="white" />
                <!-- 嘴巴 -->
                <path d="M38,0 Q42,2 40,6" stroke="#ff6b00" stroke-width="1.5" fill="none" />
                <!-- 鳞片装饰 -->
                <ellipse cx="0" cy="-3" rx="10" ry="5" fill="none" stroke="#ff8c00" stroke-width="1" />
                <ellipse cx="-10" cy="4" rx="8" ry="5" fill="none" stroke="#ff8c00" stroke-width="1" />
            </g>

            <!-- 鱼缸边缘（玻璃效果） -->
            <rect x="50" y="50" width="700" height="500" rx="20" fill="none" stroke="#4a90d9" stroke-width="3" opacity="0.5" />
            <rect x="48" y="48" width="704" height="504" rx="22" fill="none" stroke="#2c5aa0" stroke-width="2" opacity="0.3" />

            <!-- 饲料容器 -->
            <g id="foodContainer"></g>
        </svg>
        <p class="instruction">点击鱼缸任意位置投放饲料 🍞</p>
    </div>

    <script>
        const fishTank = document.getElementById('fishTank');
        const bigFish = document.getElementById('bigFish');
        const smallFish = document.getElementById('smallFish');
        const foodContainer = document.getElementById('foodContainer');

        // 鱼的状态
        const bigFishState = {
            x: 400,
            y: 200,
            targetX: 400,
            targetY: 200,
            speed: 3
        };

        const smallFishState = {
            x: 600,
            y: 300,
            targetX: 600,
            targetY: 300,
            speed: 2.5
        };

        let foods = [];
        let isEating = false;

        // 更新鱼的位置
        function updateFish(fish, fishState, delta) {
            const dx = fishState.targetX - fishState.x;
            const dy = fishState.targetY - fishState.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 5) {
                fishState.x += (dx / distance) * fishState.speed;
                fishState.y += (dy / distance) * fishState.speed;

                // 根据移动方向旋转鱼
                const angle = Math.atan2(dy, dx);
                const rotation = angle * (180 / Math.PI);

                fish.setAttribute('transform', `translate(${fishState.x}, ${fishState.y}) rotate(${rotation})`);
            }
        }

        // 创建饲料
        function createFood(x, y) {
            const food = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            food.setAttribute('cx', x);
            food.setAttribute('cy', y);
            food.setAttribute('r', '6');
            food.setAttribute('fill', 'url(#foodGradient)');
            food.classList.add('food');

            const foodObj = {
                element: food,
                x: x,
                y: y,
                targetY: Math.min(y + 150, 530)
            };

            foods.push(foodObj);
            foodContainer.appendChild(food);

            // 饲料下沉动画
            animateFoodSinking(foodObj);
        }

        // 饲料下沉
        function animateFoodSinking(food) {
            const sinkInterval = setInterval(() => {
                if (food.y < food.targetY) {
                    food.y += 2;
                    food.element.setAttribute('cy', food.y);
                } else {
                    clearInterval(sinkInterval);
                }
            }, 50);
        }

        // 检查是否被吃掉
        function checkFoodCollision() {
            foods = foods.filter(food => {
                const bigFishDist = Math.sqrt(Math.pow(food.x - bigFishState.x, 2) + Math.pow(food.y - bigFishState.y, 2));
                const smallFishDist = Math.sqrt(Math.pow(food.x - smallFishState.x, 2) + Math.pow(food.y - smallFishState.y, 2));

                if (bigFishDist < 40 || smallFishDist < 30) {
                    food.element.remove();
                    return false;
                }
                return true;
            });
        }

        // 找到最近的饲料
        function findNearestFood(fishState) {
            if (foods.length === 0) return null;

            let nearest = null;
            let minDistance = Infinity;

            foods.forEach(food => {
                const distance = Math.sqrt(Math.pow(food.x - fishState.x, 2) + Math.pow(food.y - fishState.y, 2));
                if (distance < minDistance) {
                    minDistance = distance;
                    nearest = food;
                }
            });

            return nearest;
        }

        // 游泳到随机位置
        function swimRandomly(fishState) {
            if (Math.random() < 0.02) { // 偶尔改变目标
                fishState.targetX = 100 + Math.random() * 600;
                fishState.targetY = 100 + Math.random() * 400;
            }
        }

        // 主循环
        function gameLoop() {
            // 大鱼行为
            const bigFishFood = findNearestFood(bigFishState);
            if (bigFishFood) {
                bigFishState.targetX = bigFishFood.x;
                bigFishState.targetY = bigFishFood.y;
            } else {
                swimRandomly(bigFishState);
            }

            // 小鱼行为
            const smallFishFood = findNearestFood(smallFishState);
            if (smallFishFood) {
                smallFishState.targetX = smallFishFood.x;
                smallFishState.targetY = smallFishFood.y;
            } else {
                swimRandomly(smallFishState);
            }

            // 边界检查
            bigFishState.targetX = Math.max(80, Math.min(720, bigFishState.targetX));
            bigFishState.targetY = Math.max(80, Math.min(520, bigFishState.targetY));
            smallFishState.targetX = Math.max(80, Math.min(720, smallFishState.targetX));
            smallFishState.targetY = Math.max(80, Math.min(520, smallFishState.targetY));

            // 更新鱼的位置
            updateFish(bigFish, bigFishState);
            updateFish(smallFish, smallFishState);

            // 检查碰撞
            checkFoodCollision();

            requestAnimationFrame(gameLoop);
        }

        // 点击事件
        fishTank.addEventListener('click', (e) => {
            const rect = fishTank.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // 在点击位置投放3-5颗饲料
            const foodCount = 3 + Math.floor(Math.random() * 3);
            for (let i = 0; i < foodCount; i++) {
                const offsetX = (Math.random() - 0.5) * 30;
                const offsetY = (Math.random() - 0.5) * 20;
                const delay = Math.random() * 200;

                setTimeout(() => {
                    createFood(x + offsetX, y + offsetY);
                }, delay);
            }
        });

        // 启动游戏循环
        gameLoop();
    </script>
</body>
</html>
