<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 健康管理助手</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0e17;--bg2:#111827;--bg3:#1a2234;--card:#141d2e;
    --text:#e2e8f0;--text2:#94a3b8;--primary:#06b6d4;--primary2:#22d3ee;
    --accent:#10b981;--accent2:#34d399;--danger:#ef4444;--warning:#f59e0b;
    --purple:#8b5cf6;--border:rgba(255,255,255,0.06);--glow:rgba(6,182,212,0.15);
  }
  body{font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}

  /* Background */
  .bg-effect{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .bg-effect .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:float 20s ease-in-out infinite}
  .bg-effect .orb:nth-child(1){width:400px;height:400px;background:var(--primary);top:-10%;left:-5%;animation-delay:0s}
  .bg-effect .orb:nth-child(2){width:300px;height:300px;background:var(--accent);top:60%;right:-5%;animation-delay:-7s}
  .bg-effect .orb:nth-child(3){width:250px;height:250px;background:var(--purple);bottom:-5%;left:30%;animation-delay:-14s}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.1)}66%{transform:translate(-20px,20px) scale(0.95)}}

  .app{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:24px}

  /* Header */
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
  .header-left{display:flex;align-items:center;gap:16px}
  .logo{display:flex;align-items:center;gap:12px}
  .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .logo h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--primary2),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo p{font-size:12px;color:var(--text2);margin-top:-2px}
  .header-right{display:flex;align-items:center;gap:16px}
  .user-info{display:flex;align-items:center;gap:10px;background:var(--card);padding:8px 16px;border-radius:50px;border:1px solid var(--border)}
  .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
  .user-name{font-size:13px;font-weight:500}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  /* Section Title */
  .section{margin-bottom:32px}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .section-title{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:600}
  .section-title .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .section-title .icon.cyan{background:rgba(6,182,212,0.15);color:var(--primary)}
  .section-title .icon.green{background:rgba(16,185,129,0.15);color:var(--accent)}
  .section-title .icon.purple{background:rgba(139,92,246,0.15);color:var(--purple)}
  .refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .3s}
  .refresh-btn:hover{color:var(--primary);border-color:var(--primary);background:rgba(6,182,212,0.08)}

  /* Metrics Grid */
  .metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
  .metric-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:all .4s ease;cursor:pointer}
  .metric-card:hover{transform:translateY(-4px);border-color:rgba(6,182,212,0.3);box-shadow:0 8px 32px rgba(6,182,212,0.1)}
  .metric-card .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .metric-card .card-label{display:flex;align-items:center;gap:10px}
  .metric-card .card-label .icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
  .metric-card .card-label span{font-size:13px;color:var(--text2);font-weight:500}
  .metric-card .status{width:10px;height:10px;border-radius:50%;background:var(--accent)}
  .metric-card .card-value{font-size:36px;font-weight:700;letter-spacing:-1px;margin-bottom:4px;display:flex;align-items:baseline;gap:6px}
  .metric-card .card-value .unit{font-size:14px;color:var(--text2);font-weight:400}
  .metric-card .card-value .change{font-size:12px;font-weight:500;padding:2px 8px;border-radius:20px;margin-left:auto}
  .metric-card .card-value .change.up{background:rgba(16,185,129,0.15);color:var(--accent)}
  .metric-card .card-value .change.down{background:rgba(239,68,68,0.15);color:var(--danger)}
  .metric-card .card-desc{font-size:12px;color:var(--text2);margin-top:8px;display:flex;align-items:center;gap:6px}
  .metric-card .progress-bar{height:4px;background:var(--bg);border-radius:2px;margin-top:12px;overflow:hidden}
  .metric-card .progress-bar .fill{height:100%;border-radius:2px;transition:width 1s ease}

  /* Heart rate special */
  .heart-icon{animation:heartbeat 1s ease-in-out infinite}
  @keyframes heartbeat{0%,100%{transform:scale(1)}25%{transform:scale(1.15)}50%{transform:scale(1)}75%{transform:scale(1.08)}}

  /* Health Score */
  .score-section{display:grid;grid-template-columns:1fr 2fr;gap:24px}
  .score-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;text-align:center;position:relative;overflow:hidden}
  .score-card .score-ring{width:180px;height:180px;margin:0 auto 16px;position:relative}
  .score-card .score-ring svg{transform:rotate(-90deg);width:100%;height:100%}
  .score-card .score-ring .track{fill:none;stroke:var(--bg);stroke-width:8}
  .score-card .score-ring .progress{fill:none;stroke:url(#scoreGrad);stroke-width:8;stroke-linecap:round;stroke-dasharray:502;stroke-dashoffset:502;transition:stroke-dashoffset 2s ease}
  .score-card .score-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
  .score-card .score-text .num{font-size:48px;font-weight:800;background:linear-gradient(135deg,var(--primary2),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .score-card .score-text .label{font-size:13px;color:var(--text2)}
  .score-card h3{font-size:16px;font-weight:600;margin-bottom:8px}
  .score-card p{font-size:13px;color:var(--text2);line-height:1.6}

  /* Analysis Card */
  .analysis-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px}
  .analysis-card .analysis-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .analysis-card .analysis-header h3{font-size:16px;font-weight:600}
  .analysis-tabs{display:flex;gap:4px;background:var(--bg);padding:4px;border-radius:10px}
  .analysis-tab{padding:6px 16px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .3s;color:var(--text2);border:none;background:transparent}
  .analysis-tab.active{background:var(--primary);color:#fff;font-weight:600}
  .analysis-tabs .analysis-tab:hover:not(.active){background:rgba(255,255,255,0.06);color:var(--text)}
  .analysis-content{display:none}
  .analysis-content.active{display:block}
  .analysis-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);align-items:flex-start}
  .analysis-item:last-child{border-bottom:none}
  .analysis-item .ai-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .analysis-item .analysis-body h4{font-size:14px;font-weight:600;margin-bottom:4px}
  .analysis-item .analysis-body p{font-size:13px;color:var(--text2);line-height:1.6}
  .analysis-item .analysis-body .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin-top:6px;font-weight:500}
  .analysis-item .analysis-body .tag.good{background:rgba(16,185,129,0.15);color:var(--accent)}
  .analysis-item .analysis-body .tag.warn{background:rgba(245,158,11,0.15);color:var(--warning)}
  .analysis-item .analysis-body .tag.bad{background:rgba(239,68,68,0.15);color:var(--danger)}

  /* Charts */
  .chart-section{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
  .chart-card h3{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .chart-card h3 .dot{width:8px;height:8px;border-radius:50%}
  .chart-card canvas{width:100% !important;height:180px !important}

  /* Health Plan */
  .plan-section{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .plan-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all .4s}
  .plan-card:hover{border-color:rgba(6,182,212,0.3)}
  .plan-card .plan-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px}
  .plan-card .plan-icon.diet{background:rgba(16,185,129,0.15);color:var(--accent)}
  .plan-card .plan-icon.exercise{background:rgba(6,182,212,0.15);color:var(--primary)}
  .plan-card .plan-icon.sleep{background:rgba(139,92,246,0.15);color:var(--purple)}
  .plan-card h3{font-size:15px;font-weight:600;margin-bottom:10px}
  .plan-card .plan-list{list-style:none}
  .plan-card .plan-list li{font-size:13px;color:var(--text2);padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px}
  .plan-card .plan-list li:last-child{border-bottom:none}
  .plan-card .plan-list li .check{color:var(--accent);margin-top:1px}

  /* Timeline */
  .timeline-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
  .timeline-section h3{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .timeline{position:relative;padding-left:28px}
  .timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border)}
  .timeline-item{position:relative;margin-bottom:20px}
  .timeline-item:last-child{margin-bottom:0}
  .timeline-item .time-dot{position:absolute;left:-24px;top:4px;width:14px;height:14px;border-radius:50%;border:3px solid var(--primary);background:var(--card)}
  .timeline-item .time-dot.active{background:var(--primary);box-shadow:0 0 8px var(--glow)}
  .timeline-item .time{font-size:11px;color:var(--text2);margin-bottom:4px}
  .timeline-item .title{font-size:14px;font-weight:600}
  .timeline-item .desc{font-size:12px;color:var(--text2);margin-top:2px}

  /* Bottom Grid */
  .bottom-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}

  /* AI Chat */
  .chat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;flex-direction:column}
  .chat-card .chat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .chat-card .chat-header h3{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
  .chat-messages{flex:1;overflow-y:auto;max-height:280px;display:flex;flex-direction:column;gap:12px}
  .chat-msg{display:flex;gap:10px;align-items:flex-start}
  .chat-msg .msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .chat-msg .msg-avatar.ai{background:linear-gradient(135deg,var(--primary),var(--purple))}
  .chat-msg .msg-avatar.user{background:linear-gradient(135deg,var(--accent),var(--primary))}
  .chat-msg .msg-bubble{background:var(--bg3);padding:10px 16px;border-radius:12px;font-size:13px;line-height:1.6;max-width:80%}
  .chat-msg.user-msg{flex-direction:row-reverse}
  .chat-input-wrap{display:flex;gap:10px;margin-top:16px}
  .chat-input-wrap input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;color:var(--text);outline:none;transition:all .3s}
  .chat-input-wrap input:focus{border-color:var(--primary)}
  .chat-input-wrap button{background:linear-gradient(135deg,var(--primary),var(--accent));border:none;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s}
  .chat-input-wrap button:hover{opacity:0.9;transform:translateY(-1px)}

  /* Quick Actions */
  .quick-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .quick-btn{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .3s}
  .quick-btn:hover{color:var(--primary);border-color:var(--primary)}

  /* Footer */
  .footer{text-align:center;padding:24px 0;font-size:12px;color:var(--text2)}
  .footer .live-indicator{display:inline-flex;align-items:center;gap:6px;margin-bottom:8px}
  .footer .live-dot{width:6px;height:6px;border-radius:50%;background:var(--danger);animation:blink 1s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

  /* Responsive */
  @media(max-width:1024px){
    .score-section{grid-template-columns:1fr}
    .plan-section{grid-template-columns:1fr}
    .chart-section{grid-template-columns:1fr}
    .bottom-grid{grid-template-columns:1fr}
  }
  @media(max-width:768px){
    .app{padding:16px}
    .header{flex-direction:column;gap:16px;align-items:flex-start}
    .metrics{grid-template-columns:1fr}
    .metrics .metric-card{padding:16px}
    .metrics .metric-card .card-value{font-size:28px}
  }

  /* Animations */
  @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .animate-in{animation:fadeInUp 0.6s ease forwards;opacity:0}
  .delay-1{animation-delay:0.1s}.delay-2{animation-delay:0.2s}.delay-3{animation-delay:0.3s}
  .delay-4{animation-delay:0.4s}.delay-5{animation-delay:0.5s}.delay-6{animation-delay:0.6s}
  .delay-7{animation-delay:0.7s}.delay-8{animation-delay:0.8s}

  /* Glow effect on hover */
  .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--primary),transparent);opacity:0;transition:opacity .4s}
  .metric-card:hover::before{opacity:1}
</style>
</head>
<body>
<div class="bg-effect">
  <div class="orb"></div><div class="orb"></div><div class="orb"></div>
</div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <div class="logo-icon">&#10024;</div>
        <div><h1>AI 健康管家</h1><p>智能健康管理系统 v2.0</p></div>
      </div>
    </div>
    <div class="header-right">
      <div class="user-info">
        <div class="avatar">李</div>
        <span class="user-name">李明</span>
        <div class="status-dot"></div>
      </div>
    </div>
  </div>

  <!-- Health Metrics -->
  <div class="section animate-in delay-1">
    <div class="section-header">
      <div class="section-title">
        <div class="icon cyan">&#9889;</div>
        实时健康监测
      </div>
      <button class="refresh-btn" onclick="refreshData()">&#128260; 刷新数据</button>
    </div>
    <div class="metrics" id="metricsGrid"></div>
  </div>

  <!-- Health Score + Analysis -->
  <div class="section animate-in delay-3">
    <div class="section-header">
      <div class="section-title">
        <div class="icon purple">&#128202;</div>
        健康评分与智能分析
      </div>
    </div>
    <div class="score-section">
      <div class="score-card">
        <div class="score-ring">
          <svg viewBox="0 0 160 160">
            <defs>
              <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--primary)"/>
                <stop offset="100%" style="stop-color:var(--accent)"/>
              </linearGradient>
            </defs>
            <circle class="track" cx="80" cy="80" r="70"/>
            <circle class="progress" id="scoreProgress" cx="80" cy="80" r="70"/>
          </svg>
          <div class="score-text">
            <div class="num" id="scoreNum">0</div>
            <div class="label">综合健康评分</div>
          </div>
        </div>
        <h3 id="scoreTitle">健康状态良好</h3>
        <p id="scoreDesc">您的各项健康指标均在正常范围内，继续保持当前的生活习惯。</p>
      </div>
      <div class="analysis-card">
        <div class="analysis-header">
          <h3>&#129302; AI 智能分析报告</h3>
          <div class="analysis-tabs">
            <button class="analysis-tab active" onclick="switchTab('overview')">概览</button>
            <button class="analysis-tab" onclick="switchTab('cardiovascular')">心血管</button>
            <button class="analysis-tab" onclick="switchTab('metabolic')">代谢</button>
          </div>
        </div>
        <div id="analysisOverview" class="analysis-content active"></div>
        <div id="analysisCardiovascular" class="analysis-content"></div>
        <div id="analysisMetabolic" class="analysis-content"></div>
      </div>
    </div>
  </div>

  <!-- Charts -->
  <div class="section animate-in delay-5">
    <div class="section-header">
      <div class="section-title">
        <div class="icon green">&#128200;</div>
        数据趋势分析
      </div>
    </div>
    <div class="chart-section">
      <div class="chart-card">
        <h3><span class="dot" style="background:var(--primary)"></span>心率趋势（近7天）</h3>
        <canvas id="heartChart"></canvas>
      </div>
      <div class="chart-card">
        <h3><span class="dot" style="background:var(--accent)"></span>血压趋势（近7天）</h3>
        <canvas id="bpChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Health Plan -->
  <div class="section animate-in delay-6">
    <div class="section-header">
      <div class="section-title">
        <div class="icon cyan">&#128197;</div>
        AI 个性化健康方案
      </div>
      <button class="refresh-btn" onclick="regeneratePlan()">&#128270; 重新生成</button>
    </div>
    <div class="plan-section" id="planSection"></div>
  </div>

  <!-- Bottom: Timeline + Chat -->
  <div class="section animate-in delay-7">
    <div class="section-header">
      <div class="section-title">
        <div class="icon green">&#9203;</div>
        今日健康时间轴
      </div>
    </div>
    <div class="bottom-grid">
      <div class="timeline-section">
        <h3><span class="dot" style="background:var(--primary)"></span>今日健康活动</h3>
        <div class="timeline" id="timeline"></div>
      </div>
      <div class="chat-card">
        <div class="chat-header">
          <h3>&#129302; AI 健康顾问</h3>
          <span style="font-size:11px;color:var(--accent)">在线</span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="quick-actions" id="quickActions"></div>
        <div class="chat-input-wrap">
          <input type="text" id="chatInput" placeholder="输入健康问题..." onkeydown="if(event.key==='Enter')sendChat()">
          <button onclick="sendChat()">发送</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer animate-in delay-8">
    <div class="live-indicator"><span class="live-dot"></span> 实时监测中 - 数据每 5 秒自动更新</div>
    <p>&copy; 2026 AI 健康管家 · 智能健康管理系统</p>
  </div>
</div>

<script>
// ==================== Data ====================
const healthData = {
  heartRate: { value: 72, min: 60, max: 100, unit: 'bpm', icon: '&#10084;&#65039;', label: '心率', color: '#ef4444', bg: 'rgba(239,68,68,0.1)', trend: -2 },
  bloodPressure: { value: '118/76', systolic: 118, diastolic: 76, unit: 'mmHg', icon: '&#129504;', label: '血压', color: '#f59e0b', bg: 'rgba(245,158,11,0.1)', trend: 0 },
  bloodOxygen: { value: 98, min: 95, max: 100, unit: '%', icon: '&#128152;', label: '血氧饱和度', color: '#06b6d4', bg: 'rgba(6,182,212,0.1)', trend: 1 },

// ==================== Charts ====================
function drawLineChart(canvasId, data, color, labels) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = (rect.width - 40) * dpr;
  canvas.height = 180 * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width - 40, h = 180;
  const pad = { top: 20, right: 20, bottom: 30, left: 40 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  ctx.clearRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
  }

  // Labels
  ctx.fillStyle = 'rgba(148,163,184,0.6)';
  ctx.font = '10px Inter';
  if (labels) {
    labels.forEach((l, i) => {
      const x = pad.left + (cw / (labels.length - 1)) * i;
      ctx.fillText(l, x - 12, h - 8);
    });
  }

  // Data line
  const minVal = Math.min(...data) * 0.95;
  const maxVal = Math.max(...data) * 1.05;
  const pts = data.map((v, i) => ({
    x: pad.left + (cw / (data.length - 1)) * i,
    y: pad.top + ch - ((v - minVal) / (maxVal - minVal)) * ch
  }));

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, h - pad.bottom);
  grad.addColorStop(0, color.replace(')', ',0.3)').replace('rgb', 'rgba'));
  grad.addColorStop(1, color.replace(')', ',0)').replace('rgb', 'rgba'));

  ctx.beginPath();
  ctx.moveTo(pts[0].x, h - pad.bottom);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length - 1].x, h - pad.bottom);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    const xc = (pts[i].x + pts[i - 1].x) / 2;
    const yc = (pts[i].y + pts[i - 1].y) / 2;
    ctx.quadraticCurveTo(pts[i - 1].x, pts[i - 1].y, xc, yc);
  }
  ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Dots
  pts.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#0a0e17';
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
  });
}

// ==================== Score Animation ====================
function animateScore(target) {
  const el = document.getElementById('scoreNum');
  const progress = document.getElementById('scoreProgress');
  const circumference = 2 * Math.PI * 70;
  let current = 0;
  const step = target / 60;
  const timer = setInterval(() => {
    current += step;
    if (current >= target) {
      current = target;
      clearInterval(timer);
    }
    el.textContent = Math.round(current);
    progress.style.strokeDashoffset = circumference - (circumference * current / 100);
  }, 30);
}

  event.target.classList.add('active');
  const el = document.getElementById('analysis' + tab.charAt(0).toUpperCase() + tab.slice(1));
  if (el) el.classList.add('active');
}
