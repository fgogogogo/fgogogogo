<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子鱼缸</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
  }
  .container {
    text-align: center;
  }
  .title {
    color: #7fdbff;
    font-size: 28px;
    margin-bottom: 16px;
    text-shadow: 0 0 20px rgba(127, 219, 255, 0.5);
    letter-spacing: 8px;
  }
  .hint {
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    margin-top: 12px;
  }
  #tank {
    cursor: pointer;
    border-radius: 20px;
    box-shadow:
      0 0 60px rgba(0, 180, 255, 0.15),
      0 0 120px rgba(0, 180, 255, 0.08),
      inset 0 0 80px rgba(255, 255, 255, 0.03);
  }
</style>
</head>
<body>
<div class="container">
  <div class="title">电子鱼缸</div>
  <svg id="tank" width="900" height="600" viewBox="0 0 900 600">
    <defs>
      <!-- 水的渐变 -->
      <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#0a4a7a;stop-opacity:0.35"/>
        <stop offset="30%" style="stop-color:#0d5a8a;stop-opacity:0.45"/>
        <stop offset="70%" style="stop-color:#0a4a7a;stop-opacity:0.55"/>
        <stop offset="100%" style="stop-color:#063a5a;stop-opacity:0.7"/>
      </linearGradient>

      <!-- 玻璃反光渐变 -->
      <linearGradient id="glassReflect" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
        <stop offset="30%" style="stop-color:#ffffff;stop-opacity:0.06"/>
        <stop offset="70%" style="stop-color:#ffffff;stop-opacity:0.02"/>
        <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
      </linearGradient>

      <!-- 鱼缸玻璃边缘渐变 -->
      <linearGradient id="glassEdge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#4dd0e1;stop-opacity:0.4"/>
        <stop offset="50%" style="stop-color:#80deea;stop-opacity:0.15"/>
        <stop offset="100%" style="stop-color:#4dd0e1;stop-opacity:0.4"/>
      </linearGradient>

      <!-- 鱼缸顶部边缘渐变 -->
      <linearGradient id="glassTop" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#80deea;stop-opacity:0.35"/>
        <stop offset="100%" style="stop-color:#80deea;stop-opacity:0.05"/>
      </linearGradient>

      <!-- 鱼身渐变 - 大鱼 -->
      <linearGradient id="fishBodyLarge" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#ffd700"/>
        <stop offset="35%" style="stop-color:#ffcc00"/>
        <stop offset="60%" style="stop-color:#e6a800"/>
        <stop offset="100%" style="stop-color:#cc8800"/>
      </linearGradient>

      <!-- 鱼身渐变 - 小鱼 -->
      <linearGradient id="fishBodySmall" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#ffe44d"/>
        <stop offset="40%" style="stop-color:#ffd700"/>
        <stop offset="70%" style="stop-color:#e6a800"/>
        <stop offset="100%" style="stop-color:#cc8800"/>
      </linearGradient>

      <!-- 尾鳍渐变 -->
      <linearGradient id="finGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#e6a800;stop-opacity:0.9"/>
        <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:0.7"/>
      </linearGradient>

      <!-- 水草渐变 -->
      <linearGradient id="plantGreen1" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" style="stop-color:#1b5e20"/>
        <stop offset="50%" style="stop-color:#2e7d32"/>
        <stop offset="100%" style="stop-color:#4caf50"/>
      </linearGradient>
      <linearGradient id="plantGreen2" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" style="stop-color:#004d40"/>
        <stop offset="50%" style="stop-color:#00796b"/>
        <stop offset="100%" style="stop-color:#26a69a"/>
      </linearGradient>
      <linearGradient id="plantGreen3" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" style="stop-color:#33691e"/>
        <stop offset="50%" style="stop-color:#558b2f"/>
        <stop offset="100%" style="stop-color:#7cb342"/>
      </linearGradient>

      <!-- 石头渐变 -->
      <radialGradient id="stoneGrad1" cx="35%" cy="35%" r="60%">
        <stop offset="0%" style="stop-color:#8d6e63"/>
        <stop offset="70%" style="stop-color:#5d4037"/>
        <stop offset="100%" style="stop-color:#3e2723"/>
      </radialGradient>
      <radialGradient id="stoneGrad2" cx="30%" cy="30%" r="65%">
        <stop offset="0%" style="stop-color:#a1887f"/>
        <stop offset="60%" style="stop-color:#6d4c41"/>
        <stop offset="100%" style="stop-color:#4e342e"/>
      </radialGradient>
      <radialGradient id="stoneGrad3" cx="40%" cy="30%" r="55%">
        <stop offset="0%" style="stop-color:#bcaaa4"/>
        <stop offset="65%" style="stop-color:#795548"/>
        <stop offset="100%" style="stop-color:#4e342e"/>
      </radialGradient>

      <!-- 饲料渐变 -->
      <radialGradient id="foodGrad" cx="35%" cy="30%" r="60%">
        <stop offset="0%" style="stop-color:#ffe082"/>
        <stop offset="60%" style="stop-color:#ffb300"/>
        <stop offset="100%" style="stop-color:#e65100"/>
      </radialGradient>

      <!-- 光线效果 -->
      <linearGradient id="lightRay" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
        <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
      </linearGradient>

      <!-- 鱼缸阴影 -->
      <filter id="tankShadow" x="-5%" y="-5%" width="110%" height="110%">
        <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000" flood-opacity="0.3"/>
      </filter>

      <!-- 水面波纹滤镜 -->
      <filter id="waterRipple">
        <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" result="noise" seed="1"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>

    <!-- 鱼缸背景（水） -->
    <rect x="20" y="20" width="860" height="560" rx="18" ry="18" fill="url(#waterGradient)"/>

    <!-- 水面光线 -->
    <polygon points="120,20 200,20 300,200 180,200" fill="url(#lightRay)" opacity="0.6"/>
    <polygon points="350,20 420,20 520,280 400,280" fill="url(#lightRay)" opacity="0.4"/>
    <polygon points="600,20 680,20 780,180 660,180" fill="url(#lightRay)" opacity="0.5"/>

    <!-- 水草 -->
    <g id="plants">
      <!-- 水草1 -->
      <path d="M80,560 Q70,500 85,450 Q75,400 90,350 Q80,300 95,250 Q85,210 100,170" stroke="url(#plantGreen1)" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M95,560 Q105,510 90,470 Q100,420 85,380 Q95,340 80,300 Q90,270 75,240" stroke="url(#plantGreen1)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M70,560 Q60,510 72,470 Q62,430 74,390 Q64,350 76,310" stroke="url(#plantGreen1)" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- 水草2 -->
      <path d="M180,560 Q170,490 188,430 Q175,370 195,310 Q182,260 200,210" stroke="url(#plantGreen2)" stroke-width="9" fill="none" stroke-linecap="round"/>
      <path d="M195,560 Q208,505 190,455 Q205,400 187,350 Q202,300 184,260" stroke="url(#plantGreen2)" stroke-width="6" fill="none" stroke-linecap="round"/>

      <!-- 水草3 -->
      <path d="M720,560 Q735,490 718,430 Q732,370 715,310 Q728,260 712,200" stroke="url(#plantGreen3)" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M738,560 Q725,508 742,458 Q728,408 745,358" stroke="url(#plantGreen3)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M705,560 Q695,510 708,465 Q696,420 710,375" stroke="url(#plantGreen3)" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- 水草4 -->
      <path d="M810,560 Q825,500 808,445 Q822,390 805,340 Q818,295 802,255" stroke="url(#plantGreen1)" stroke-width="7" fill="none" stroke-linecap="round"/>
    </g>

    <!-- 石头 -->
    <g id="stones">
      <ellipse cx="140" cy="555" rx="45" ry="22" fill="url(#stoneGrad1)"/>
      <ellipse cx="220" cy="558" rx="35" ry="17" fill="url(#stoneGrad2)"/>
      <ellipse cx="300" cy="553" rx="52" ry="25" fill="url(#stoneGrad3)"/>
      <ellipse cx="620" cy="556" rx="40" ry="19" fill="url(#stoneGrad1)"/>
      <ellipse cx="695" cy="554" rx="48" ry="23" fill="url(#stoneGrad2)"/>
      <ellipse cx="780" cy="557" rx="38" ry="18" fill="url(#stoneGrad3)"/>
      <ellipse cx="450" cy="560" rx="60" ry="20" fill="url(#stoneGrad1)" opacity="0.8"/>
    </g>

    <!-- 饲料容器 -->
    <g id="foodContainer"></g>

    <!-- 大鱼 -->
    <g id="fishLarge">
      <!-- 尾鳍（独立动画） -->
      <g id="tailLarge" transform-origin="0 0">
        <path d="M-5,0 Q-45,-25 -60,-10 Q-50,0 -60,10 Q-45,25 -5,0" fill="url(#finGradient)" opacity="0.85"/>
        <path d="M-5,-2 Q-35,-15 -48,-5 Q-40,0 -48,5 Q-35,15 -5,2" fill="#ffd700" opacity="0.5"/>
      </g>
      <!-- 背鳍 -->
      <path d="M5,-18 Q15,-35 35,-30 Q25,-18 30,-5" fill="url(#finGradient)" opacity="0.7"/>
      <!-- 腹鳍 -->
      <path d="M10,15 Q18,30 28,25 Q22,18 25,10" fill="url(#finGradient)" opacity="0.7"/>
      <!-- 身体 -->
      <ellipse cx="20" cy="0" rx="42" ry="22" fill="url(#fishBodyLarge)"/>
      <!-- 身体高光 -->
      <ellipse cx="28" cy="-6" rx="22" ry="10" fill="#fff" opacity="0.2"/>
      <!-- 鳞片纹理 -->
      <g opacity="0.15">
        <path d="M5,-8 Q12,-12 20,-8" stroke="#fff" stroke-width="0.8" fill="none"/>
        <path d="M15,-5 Q22,-9 30,-5" stroke="#fff" stroke-width="0.8" fill="none"/>
        <path d="M25,-3 Q32,-7 40,-3" stroke="#fff" stroke-width="0.8" fill="none"/>
        <path d="M5,5 Q12,9 20,5" stroke="#fff" stroke-width="0.8" fill="none"/>
        <path d="M15,7 Q22,11 30,7" stroke="#fff" stroke-width="0.8" fill="none"/>
        <path d="M25,9 Q32,13 40,9" stroke="#fff" stroke-width="0.8" fill="none"/>
      </g>
      <!-- 眼睛 -->
      <circle cx="48" cy="-5" r="7" fill="#fff"/>
      <circle cx="50" cy="-5" r="4.5" fill="#1a1a1a"/>
      <circle cx="51.5" cy="-6.5" r="1.5" fill="#fff"/>
      <!-- 嘴 -->
      <path d="M60,-1 Q65,0 60,3" stroke="#cc8800" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- 胸鳍 -->
      <path d="M18,10 Q25,25 35,22 Q28,16 30,8" fill="url(#finGradient)" opacity="0.65"/>
    </g>

    <!-- 小鱼 -->
    <g id="fishSmall">
      <!-- 尾鳍（独立动画） -->
      <g id="tailSmall" transform-origin="0 0">
        <path d="M-3,0 Q-28,-16 -38,-7 Q-32,0 -38,7 Q-28,16 -3,0" fill="url(#finGradient)" opacity="0.85"/>
        <path d="M-3,-1 Q-22,-9 -30,-3 Q-25,0 -30,3 Q-22,9 -3,1" fill="#ffe44d" opacity="0.5"/>
      </g>
      <!-- 背鳍 -->
      <path d="M3,-11 Q10,-22 22,-18 Q15,-11 18,-3" fill="url(#finGradient)" opacity="0.7"/>
      <!-- 腹鳍 -->
      <path d="M6,9 Q11,18 18,15 Q13,11 15,6" fill="url(#finGradient)" opacity="0.7"/>
      <!-- 身体 -->
      <ellipse cx="12" cy="0" rx="26" ry="14" fill="url(#fishBodySmall)"/>
      <!-- 身体高光 -->
      <ellipse cx="17" cy="-4" rx="14" ry="6" fill="#fff" opacity="0.25"/>
      <!-- 鳞片纹理 -->
      <g opacity="0.15">
        <path d="M3,-5 Q8,-8 14,-5" stroke="#fff" stroke-width="0.6" fill="none"/>
        <path d="M10,-3 Q15,-6 21,-3" stroke="#fff" stroke-width="0.6" fill="none"/>
        <path d="M3,4 Q8,7 14,4" stroke="#fff" stroke-width="0.6" fill="none"/>
        <path d="M10,6 Q15,9 21,6" stroke="#fff" stroke-width="0.6" fill="none"/>
      </g>
      <!-- 眼睛 -->
      <circle cx="30" cy="-3" r="4.5" fill="#fff"/>
      <circle cx="31.5" cy="-3" r="3" fill="#1a1a1a"/>
      <circle cx="32.3" cy="-3.8" r="1" fill="#fff"/>
      <!-- 嘴 -->
      <path d="M37,-0.5 Q40,0 37,2" stroke="#cc8800" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- 胸鳍 -->
      <path d="M11,6 Q16,15 22,13 Q17,9 18,5" fill="url(#finGradient)" opacity="0.65"/>
    </g>

    <!-- 玻璃反光层 -->
    <rect x="20" y="20" width="860" height="560" rx="18" ry="18" fill="url(#glassReflect)" pointer-events="none"/>

    <!-- 玻璃边缘高光 -->
    <rect x="20" y="20" width="860" height="560" rx="18" ry="18" fill="none" stroke="url(#glassEdge)" stroke-width="2.5" pointer-events="none"/>
    <!-- 顶部边缘 -->
    <rect x="20" y="20" width="860" height="8" rx="4" fill="url(#glassTop)" pointer-events="none"/>
    <!-- 左侧反光条 -->
    <rect x="24" y="24" width="6" height="400" rx="3" fill="#fff" opacity="0.06" pointer-events="none"/>
    <!-- 右下角反光 -->
    <rect x="820" y="400" width="50" height="160" rx="8" fill="#fff" opacity="0.04" pointer-events="none"/>
  </svg>
  <div class="hint">点击鱼缸投放饲料</div>
</div>

<script>
// ========== 配置 ==========
const TANK = { x: 20, y: 20, w: 860, h: 560 };
const FISH_LARGE = {
  el: document.getElementById('fishLarge'),
  tail: document.getElementById('tailLarge'),
  x: 350, y: 250,
  vx: 0.8, vy: 0.3,
  speed: 1.8,
  baseSpeed: 1.8,
  size: 'large',
  facingRight: true,
  tailPhase: 0,
  tailSpeed: 0.12,
  target: null,
  state: 'idle', // idle, chasing, eating
  eatTimer: 0
};
const FISH_SMALL = {
  el: document.getElementById('fishSmall'),
  tail: document.getElementById('tailSmall'),
  x: 550, y: 350,
  vx: -0.6, vy: 0.4,
  speed: 1.4,
  baseSpeed: 1.4,
  size: 'small',
  facingRight: false,
  tailPhase: Math.PI,
  tailSpeed: 0.15,
  target: null,
  state: 'idle',
  eatTimer: 0
};

const foods = [];
let foodIdCounter = 0;

// ========== 尾鳍摇动动画 ==========
function animateTail(fish) {
  fish.tailPhase += fish.tailSpeed;
  const swing = Math.sin(fish.tailPhase) * 15;
  fish.tail.setAttribute('transform', `rotate(${swing})`);
}

// ========== 鱼的移动逻辑 ==========
function updateFish(fish) {
  // 尾鳍动画
  animateTail(fish);

  const margin = 50;
  const bottomLimit = TANK.h - 60;

  if (fish.state === 'idle') {
    // 闲游状态 - 平滑的随机游动
    fish.vx += (Math.random() - 0.5) * 0.08;
    fish.vy += (Math.random() - 0.5) * 0.06;

    // 限速
    const maxV = fish.baseSpeed;
    fish.vx = Math.max(-maxV, Math.min(maxV, fish.vx));
    fish.vy = Math.max(-maxV * 0.6, Math.min(maxV * 0.6, fish.vy));

    // 偶尔改变方向
    if (Math.random() < 0.008) {
      fish.vx = (Math.random() - 0.5) * 2 * fish.baseSpeed;
      fish.vy = (Math.random() - 0.5) * fish.baseSpeed;
    }

  } else if (fish.state === 'chasing' && fish.target) {
    // 追逐饲料
    const dx = fish.target.x - fish.x;
    const dy = fish.target.y - fish.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 20) {
      // 到达饲料位置，开始吃
      fish.state = 'eating';
      fish.eatTimer = 30; // 吃的帧数
      // 移除饲料
      if (fish.target.el && fish.target.el.parentNode) {
        fish.target.el.parentNode.removeChild(fish.target.el);
      }
      // 从数组中移除
      const idx = foods.indexOf(fish.target);
      if (idx > -1) foods.splice(idx, 1);
      fish.target = null;
      // 重新分配目标
      assignFoodTargets();
    } else {
      const chaseSpeed = fish.baseSpeed * 2.2;
      fish.vx = (dx / dist) * chaseSpeed;
      fish.vy = (dy / dist) * chaseSpeed;
    }
  } else if (fish.state === 'eating') {
    fish.eatTimer--;
    fish.vx *= 0.85;
    fish.vy *= 0.85;
    if (fish.eatTimer <= 0) {
      fish.state = 'idle';
      fish.speed = fish.baseSpeed;
      assignFoodTargets();
    }
  }

  // 更新位置
  fish.x += fish.vx;
  fish.y += fish.vy;

  // 边界反弹
  if (fish.x < TANK.x + margin) {
    fish.x = TANK.x + margin;
    fish.vx = Math.abs(fish.vx) * 0.8;
  }
  if (fish.x > TANK.x + TANK.w - margin) {
    fish.x = TANK.x + TANK.w - margin;
    fish.vx = -Math.abs(fish.vx) * 0.8;
  }
  if (fish.y < TANK.y + margin) {
    fish.y = TANK.y + margin;
    fish.vy = Math.abs(fish.vy) * 0.8;
  }
  if (fish.y > TANK.y + bottomLimit) {
    fish.y = TANK.y + bottomLimit;
    fish.vy = -Math.abs(fish.vy) * 0.8;
  }

  // 根据水平速度翻转鱼
  if (fish.vx > 0.3) {
    fish.facingRight = true;
  } else if (fish.vx < -0.3) {
    fish.facingRight = false;
  }

  // 应用变换
  const scaleX = fish.facingRight ? 1 : -1;
  fish.el.setAttribute('transform', `translate(${fish.x}, ${fish.y}) scale(${scaleX}, 1)`);
}

// ========== 饲料逻辑 ==========
function dropFood(cx, cy) {
  const count = 4 + Math.floor(Math.random() * 4); // 4-7颗饲料
  const container = document.getElementById('foodContainer');

  for (let i = 0; i < count; i++) {
    const offsetX = (Math.random() - 0.5) * 40;
    const offsetY = (Math.random() - 0.5) * 20;
    const fx = cx + offsetX;
    const fy = cy + offsetY;

    const el = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
    el.setAttribute('cx', fx);
    el.setAttribute('cy', fy);
    el.setAttribute('rx', 3.5 + Math.random() * 2);
    el.setAttribute('ry', 2.5 + Math.random() * 1.5);
    el.setAttribute('fill', 'url(#foodGrad)');
    el.style.filter = 'drop-shadow(0 1px 2px rgba(0,0,0,0.3))';

    container.appendChild(el);

    foods.push({
      id: foodIdCounter++,
      el: el,
      x: fx,
      y: fy,
      vy: 0.3 + Math.random() * 0.5,
      wobblePhase: Math.random() * Math.PI * 2,
      bottomY: TANK.y + TANK.h - 70 - Math.random() * 30
    });
  }

  // 重新分配目标
  assignFoodTargets();
}

function updateFoods() {
  for (let i = foods.length - 1; i >= 0; i--) {
    const food = foods[i];
    food.y += food.vy;
    food.vy += 0.015; // 轻微加速（重力）
    food.vy = Math.min(food.vy, 1.2); // 最大下沉速度
    food.wobblePhase += 0.08;
    const wobbleX = Math.sin(food.wobblePhase) * 0.8;

    food.x += wobbleX;

    // 到达底部
    if (food.y >= food.bottomY) {
      food.y = food.bottomY;
      food.vy = 0;
      // 底部继续轻微摆动
      food.wobblePhase += 0.04;
    }

    // 超时清除（30秒）
    food.age = (food.age || 0) + 1;
    if (food.age > 1800) {
      if (food.el && food.el.parentNode) {
        food.el.parentNode.removeChild(food.el);
      }
      foods.splice(i, 1);
      continue;
    }

    food.el.setAttribute('cx', food.x);
    food.el.setAttribute('cy', food.y);
  }
}

// ========== 分配饲料目标给鱼 ==========
function assignFoodTargets() {
  const fishes = [FISH_LARGE, FISH_SMALL];
  const availableFoods = foods.filter(f => f.el && f.el.parentNode);

  // 重置没有目标且正在追逐的鱼
  fishes.forEach(fish => {
    if (fish.state === 'chasing' && (!fish.target || !fish.target.el || !fish.target.el.parentNode)) {
      fish.state = 'idle';
      fish.target = null;
    }
  });

  // 为空闲的鱼分配最近的饲料
  fishes.forEach(fish => {
    if (fish.state !== 'idle' || availableFoods.length === 0) return;

    let nearest = null;
    let nearestDist = Infinity;

    availableFoods.forEach(food => {
      const dx = food.x - fish.x;
      const dy = food.y - fish.y;
      const dist = dx * dx + dy * dy;
      if (dist < nearestDist) {
        nearestDist = dist;
        nearest = food;
      }
    });

    if (nearest) {
      fish.target = nearest;
      fish.state = 'chasing';
      fish.speed = fish.baseSpeed * 2.2;
      // 从可用列表中移除（避免两条鱼抢同一粒）
      const idx = availableFoods.indexOf(nearest);
      if (idx > -1) availableFoods.splice(idx, 1);
    }
  });
}

// ========== 点击事件 ==========
document.getElementById('tank').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const scaleX = 900 / rect.width;
  const scaleY = 600 / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top) * scaleY;

  // 只在鱼缸区域内响应
  if (cx >= TANK.x && cx <= TANK.x + TANK.w && cy >= TANK.y && cy <= TANK.y + TANK.h) {
    dropFood(cx, cy);
  }
});

// ========== 主动画循环 ==========
function gameLoop() {
  updateFoods();
  updateFish(FISH_LARGE);
  updateFish(FISH_SMALL);
  requestAnimationFrame(gameLoop);
}

// 启动
gameLoop();
</script>
