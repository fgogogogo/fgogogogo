<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指示剂变色实验模拟器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: 1.8rem;
    margin: 28px 0 8px;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }

  .subtitle {
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 24px;
  }

  .panel {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 900px;
    padding: 0 20px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 22px 26px 18px;
    width: 380px;
    backdrop-filter: blur(12px);
  }

  .card h2 {
    font-size: 1rem;
    color: #94a3b8;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card h2 .icon { font-size: 1.2rem; }

  .options { display: flex; gap: 10px; flex-wrap: wrap; }

  .opt-btn {
    flex: 1;
    min-width: 100px;
    padding: 12px 8px;
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    color: #ccc;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
    position: relative;
    user-select: none;
  }

  .opt-btn:hover {
    border-color: rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.06);
    transform: translateY(-1px);
  }

  .opt-btn.selected {
    border-color: var(--sel-color, #60a5fa);
    background: var(--sel-bg, rgba(96,165,250,0.12));
    color: #fff;
    box-shadow: 0 0 20px var(--sel-glow, rgba(96,165,250,0.2));
  }

  .opt-btn .tag {
    display: block;
    font-size: 0.7rem;
    color: #777;
    margin-top: 4px;
  }

  .opt-btn.selected .tag { color: inherit; opacity: 0.7; }

  /* Indicator specific colors */
  .opt-btn[data-ind="litmus"].selected {
    --sel-color: #c084fc;
    --sel-bg: rgba(192,132,252,0.12);
    --sel-glow: rgba(192,132,252,0.2);
  }
  .opt-btn[data-ind="pp"].selected {
    --sel-color: #f472b6;
    --sel-bg: rgba(244,114,182,0.12);
    --sel-glow: rgba(244,114,182,0.2);
  }

  /* Solution specific colors */
  .opt-btn[data-sol="vinegar"].selected {
    --sel-color: #fbbf24;
    --sel-bg: rgba(251,191,36,0.12);
    --sel-glow: rgba(251,191,36,0.2);
  }
  .opt-btn[data-sol="lime"].selected {
    --sel-color: #34d399;
    --sel-bg: rgba(52,211,153,0.12);
    --sel-glow: rgba(52,211,153,0.2);
  }
  .opt-btn[data-sol="salt"].selected {
    --sel-color: #94a3b8;
    --sel-bg: rgba(148,163,184,0.12);
    --sel-glow: rgba(148,163,184,0.2);
  }

  /* Experiment area */
  .experiment-area {
    width: 100%;
    max-width: 900px;
    padding: 0 20px;
    margin-top: 28px;
    display: flex;
    justify-content: center;
    gap: 48px;
    flex-wrap: wrap;
  }

  .tube-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .tube-label {
    font-size: 0.8rem;
    color: #666;
    letter-spacing: 1px;
  }

  /* Test tube SVG */
  .tube-wrap {
    position: relative;
    width: 120px;
    height: 280px;
  }

  .tube-wrap svg { width: 100%; height: 100%; }

  /* Liquid fill inside SVG via CSS transition */
  .liquid {
    transition: fill 2s cubic-bezier(0.4, 0, 0.2, 1),
                y 1.5s cubic-bezier(0.4, 0, 0.2, 1),
                height 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Bubble animation */
  .bubble {
    opacity: 0;
    transition: opacity 0.5s;
  }
  .bubble.active {
    opacity: 0.5;
    animation: rise 2s ease-in infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0); opacity: 0.6; }
    100% { transform: translateY(-80px); opacity: 0; }
  }

  /* Mixing glow */
  .tube-glow {
    transition: opacity 0.8s;
    opacity: 0;
  }
  .tube-glow.active {
    opacity: 1;
    animation: pulseg 1.5s ease-in-out infinite;
  }
  @keyframes pulseg {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  /* Arrow between tubes */
  .mix-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    align-self: center;
  }

  .mix-arrow svg { opacity: 0.4; }

  #mixBtn {
    padding: 10px 28px;
    border: 2px solid rgba(96,165,250,0.4);
    border-radius: 24px;
    background: rgba(96,165,250,0.1);
    color: #60a5fa;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  #mixBtn:hover:not(:disabled) {
    background: rgba(96,165,250,0.2);
    border-color: #60a5fa;
    box-shadow: 0 0 24px rgba(96,165,250,0.3);
  }
  #mixBtn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  #mixBtn.mixing {
    animation: btnpulse 1s ease-in-out infinite;
  }
  @keyframes btnpulse {
    0%,100% { box-shadow: 0 0 0 rgba(96,165,250,0); }
    50% { box-shadow: 0 0 30px rgba(96,165,250,0.4); }
  }

  /* Result area */
  .result {
    width: 100%;
    max-width: 900px;
    padding: 0 20px;
    margin-top: 24px;
    min-height: 80px;
  }

  .result-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 20px 24px;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .result-card.show {
    opacity: 1;
    transform: translateY(0);
  }

  .result-card h3 {
    font-size: 1.05rem;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .color-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    display: inline-block;
    border: 1px solid rgba(255,255,255,0.15);
    vertical-align: middle;
    transition: background 0.5s;
  }

  .result-card .principle {
    font-size: 0.88rem;
    line-height: 1.8;
    color: #aaa;
  }
  .result-card .principle strong { color: #ddd; }

  .formula {
    display: inline-block;
    margin: 8px 0 4px;
    padding: 6px 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    font-family: 'Georgia', serif;
    font-size: 0.92rem;
    color: #c4b5fd;
    letter-spacing: 0.5px;
  }

  footer {
    margin: 32px 0 24px;
    font-size: 0.75rem;
    color: #444;
  }

  /* Responsive */
  @media (max-width: 820px) {
    .experiment-area { gap: 20px; }
    .card { width: 100%; max-width: 420px; }
  }
  @media (max-width: 520px) {
    h1 { font-size: 1.3rem; }
    .tube-wrap { width: 90px; height: 210px; }
    .experiment-area { gap: 10px; }
  }
</style>
</head>
<body>

<h1>指示剂变色实验模拟器</h1>
<p class="subtitle">选择指示剂与溶液，观察试管中的颜色变化</p>

<div class="panel">
  <!-- Indicator selection -->
  <div class="card">
    <h2><span class="icon">&#x1f9ea;</span> 选择指示剂</h2>
    <div class="options">
      <button class="opt-btn" data-ind="litmus" onclick="selectIndicator('litmus')">
        石蕊指示剂
        <span class="tag">Litmus</span>
      </button>
      <button class="opt-btn" data-ind="pp" onclick="selectIndicator('pp')">
        酚酞指示剂
        <span class="tag">Phenolphthalein</span>
      </button>
    </div>
  </div>

  <!-- Solution selection -->
  <div class="card">
    <h2><span class="icon">&#x1f9ea;</span> 选择溶液</h2>
    <div class="options">
      <button class="opt-btn" data-sol="vinegar" onclick="selectSolution('vinegar')">
        醋（醋酸）
        <span class="tag">酸性 · CH&#8323;COOH</span>
      </button>
      <button class="opt-btn" data-sol="lime" onclick="selectSolution('lime')">
        石灰水
        <span class="tag">碱性 · Ca(OH)&#8322;</span>
      </button>
      <button class="opt-btn" data-sol="salt" onclick="selectSolution('salt')">
        盐水
        <span class="tag">中性 · NaCl</span>
      </button>
    </div>
  </div>
</div>

<!-- Experiment tubes -->
<div class="experiment-area">
  <!-- Indicator tube -->
  <div class="tube-section">
    <span class="tube-label">指示剂</span>
    <div class="tube-wrap" id="indicatorTube"></div>
  </div>

  <!-- Mix arrow -->
  <div class="mix-arrow">
    <svg width="48" height="24" viewBox="0 0 48 24">
      <path d="M4 12 L38 12" stroke="#555" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
      <path d="M34 6 L42 12 L34 18" stroke="#555" stroke-width="2" fill="none" stroke-linejoin="round"/>
    </svg>
    <button id="mixBtn" disabled onclick="mix()">混合实验</button>
  </div>

  <!-- Solution tube -->
  <div class="tube-section">
    <span class="tube-label">溶液</span>
    <div class="tube-wrap" id="solutionTube"></div>
  </div>

  <!-- Result tube -->
  <div class="tube-section">
    <span class="tube-label">混合结果</span>
    <div class="tube-wrap" id="resultTube"></div>
  </div>
</div>

<!-- Result explanation -->
<div class="result">
  <div class="result-card" id="resultCard">
    <h3 id="resultTitle"></h3>
    <div class="principle" id="resultBody"></div>
  </div>
</div>

<footer>指示剂变色实验模拟 · 化学课堂辅助工具</footer>

<script>
const state = {
  indicator: null, // 'litmus' | 'pp'
  solution: null,  // 'vinegar' | 'lime' | 'salt'
  mixed: false
};

// Color definitions
const COLORS = {
  // [indicator][solution] = { final, before, resultName }
  litmus: {
    vinegar: { final: '#e53e3e', before: '#9f7aea', name: '红色' },
    lime:    { final: '#3182ce', before: '#9f7aea', name: '蓝色' },
    salt:    { final: '#9f7aea', before: '#9f7aea', name: '紫色（不变色）' }
  },
  pp: {
    vinegar: { final: '#fefcbf', before: '#fefcbf', name: '无色（不变色）' },
    lime:    { final: '#e53e3e', before: '#fefcbf', name: '玫红色' },
    salt:    { final: '#fefcbf', before: '#fefcbf', name: '无色（不变色）' }
  }
};

const PRINCIPLES = {
  litmus_vinegar: {
    title: '石蕊遇酸变红',
    text: '醋酸（CH₃COOH）是弱酸，在水溶液中电离产生 H⁺。石蕊分子结构中的共轭体系在酸性条件下发生质子化，吸收光谱改变，呈现<strong>红色</strong>。'
  },
  litmus_lime: {
    title: '石蕊遇碱变蓝',
    text: '石灰水中 Ca(OH)₂ 电离产生 OH⁻，溶液呈碱性。石蕊在碱性条件下去质子化，分子结构变化导致吸收光谱改变，呈现<strong>蓝色</strong>。'
  },
  litmus_salt: {
    title: '石蕊遇中性溶液不变色',
    text: 'NaCl 是强酸强碱盐，在水溶液中呈中性（pH ≈ 7）。石蕊在中性条件下结构不发生变化，保持原有的<strong>紫色</strong>。'
  },
  pp_vinegar: {
    title: '酚酞遇酸不变色',
    text: '酚酞是一种有机弱酸，在酸性溶液中以无色的内酯式结构存在，共轭体系被破坏，不吸收可见光，因此呈现<strong>无色</strong>。'
  },
  pp_lime: {
    title: '酚酞遇碱变红',
    text: '碱性条件下，酚酞失去质子形成醌式结构，恢复大的共轭 π 键体系，吸收绿光后呈现<strong>玫红色</strong>。此反应在 pH 8.2~10.0 范围内最为明显。'
  },
  pp_salt: {
    title: '酚酞遇中性溶液不变色',
    text: '中性溶液（pH ≈ 7）不足以使酚酞发生结构转变，酚酞保持内酯式结构，呈现<strong>无色</strong>。酚酞的变色范围为 pH 8.2~10.0。'
  }
};

// Build tube SVG
function tubeSVG(liquidColor, liquidY, label, glowColor) {
  const ly = liquidY || 155;
  const lh = 110;
  return `
    <svg viewBox="0 0 120 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow-${label}" cx="50%" cy="70%" r="60%">
          <stop offset="0%" stop-color="${glowColor || '#60a5fa'}" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="${glowColor || '#60a5fa'}" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="glass-${label}" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
          <stop offset="50%" stop-color="rgba(255,255,255,0.14)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
        </linearGradient>
        <clipPath id="tubeClip-${label}">
          <path d="M38 18 L38 220 Q38 258 60 258 Q82 258 82 220 L82 18 Z"/>
        </clipPath>
      </defs>

      <!-- Glow -->
      <ellipse class="tube-glow" id="glow-${label}" cx="60" cy="230" rx="36" ry="36" fill="url(#glow-${label})" />

      <!-- Glass tube body -->
      <path d="M38 18 L38 220 Q38 258 60 258 Q82 258 82 220 L82 18" fill="none"
            stroke="rgba(255,255,255,0.12)" stroke-width="2.5"/>

      <!-- Rim -->
      <rect x="34" y="14" width="52" height="8" rx="3" fill="url(#glass-${label})"
            stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

      <!-- Liquid -->
      <g clip-path="url(#tubeClip-${label})">
        <rect class="liquid" id="liquid-${label}" x="36" y="${ly}" width="48" height="${lh}" rx="2"
              fill="${liquidColor}" opacity="0.85"/>
        <!-- Surface shine -->
        <rect x="36" y="${ly}" width="48" height="3" rx="1"
              fill="rgba(255,255,255,0.18)"/>
      </g>

      <!-- Glass highlight -->
      <path d="M42 24 L42 218 Q42 252 56 253" fill="none"
            stroke="rgba(255,255,255,0.06)" stroke-width="3"/>

      <!-- Bubbles -->
      ${[0,1,2].map(i => `
        <circle class="bubble" id="bub-${label}-${i}" cx="${52 + i*8}" cy="230"
                r="${2 + i}" fill="rgba(255,255,255,0.35)"/>
      `).join('')}
    </svg>`;
}

function renderTubes() {
  // Indicator tube
  const indColor = state.indicator === 'litmus' ? '#9f7aea' : '#fefcbf';
  const indLabel = state.indicator || 'ind-empty';
  document.getElementById('indicatorTube').innerHTML = tubeSVG(
    state.indicator ? indColor : 'rgba(255,255,255,0.04)',
    state.indicator ? 130 : 200,
    indLabel,
    state.indicator === 'litmus' ? '#c084fc' : '#f472b6'
  );

  // Solution tube
  const solColor = state.solution === 'vinegar' ? '#fef3c7' :
                   state.solution === 'lime' ? '#d1fae5' :
                   state.solution === 'salt' ? '#e2e8f0' : 'rgba(255,255,255,0.04)';
  document.getElementById('solutionTube').innerHTML = tubeSVG(
    solColor,
    state.solution ? 130 : 200,
    state.solution || 'sol-empty',
    state.solution === 'vinegar' ? '#fbbf24' : state.solution === 'lime' ? '#34d399' : '#94a3b8'
  );

  // Result tube
  if (state.mixed && state.indicator && state.solution) {
    const c = COLORS[state.indicator][state.solution];
    document.getElementById('resultTube').innerHTML = tubeSVG(
      c.before, 200, 'result',
      c.final
    );
    // Animate fill + color change
    requestAnimationFrame(() => {
      setTimeout(() => {
        const liq = document.getElementById('liquid-result');
        if (liq) {
          liq.setAttribute('y', '130');
          liq.setAttribute('height', '110');
        }
        // Activate glow + bubbles
        const glow = document.getElementById('glow-result');
        if (glow) glow.classList.add('active');
        [0,1,2].forEach(i => {
          const b = document.getElementById(`bub-result-${i}`);
          if (b) { b.classList.add('active'); b.style.animationDelay = `${i*0.4}s`; }
        });
      }, 100);
      // Color change after fill
      setTimeout(() => {
        const liq = document.getElementById('liquid-result');
        if (liq) liq.setAttribute('fill', c.final);
      }, 1400);
    });
  } else {
    document.getElementById('resultTube').innerHTML = tubeSVG(
      'rgba(255,255,255,0.03)', 210, 'result-empty', '#444'
    );
  }
}

function updateMixBtn() {
  const btn = document.getElementById('mixBtn');
  btn.disabled = !(state.indicator && state.solution);
}

function selectIndicator(ind) {
  state.indicator = ind;
  state.mixed = false;
  document.querySelectorAll('[data-ind]').forEach(b => b.classList.remove('selected'));
  document.querySelector(`[data-ind="${ind}"]`).classList.add('selected');
  document.getElementById('resultCard').classList.remove('show');
  renderTubes();
  updateMixBtn();
}

function selectSolution(sol) {
  state.solution = sol;
  state.mixed = false;
  document.querySelectorAll('[data-sol]').forEach(b => b.classList.remove('selected'));
  document.querySelector(`[data-sol="${sol}"]`).classList.add('selected');
  document.getElementById('resultCard').classList.remove('show');
  renderTubes();
  updateMixBtn();
}

function mix() {
  if (!state.indicator || !state.solution) return;
  state.mixed = true;

  const btn = document.getElementById('mixBtn');
  btn.classList.add('mixing');
  btn.disabled = true;

  renderTubes();

  // Animate bubbles on indicator and solution tubes too
  const indLabel = state.indicator;
  const solLabel = state.solution;
  [indLabel, solLabel].forEach(lbl => {
    const glow = document.getElementById(`glow-${lbl}`);
    if (glow) glow.classList.add('active');
    [0,1,2].forEach(i => {
      const b = document.getElementById(`bub-${lbl}-${i}`);
      if (b) b.classList.add('active');
    });
  });

  // Show result card
  setTimeout(() => {
    const key = `${state.indicator}_${state.solution}`;
    const p = PRINCIPLES[key];
    const c = COLORS[state.indicator][state.solution];
    document.getElementById('resultTitle').innerHTML =
      `<span class="color-dot" style="background:${c.final}"></span> ${p.title}`;
    document.getElementById('resultBody').innerHTML = p.text;
    document.getElementById('resultCard').classList.add('show');

    btn.classList.remove('mixing');
    btn.disabled = false;
  }, 2000);
}

// Initial render
renderTubes();
</script>
</body>
</html>
