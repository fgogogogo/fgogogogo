<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟教室平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部导航栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: #e94560;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary {
            background: #0f3460;
            color: #fff;
        }

        .btn-primary:hover {
            background: #1a4a7a;
        }

        .btn-danger {
            background: #e94560;
            color: #fff;
        }

        .btn-danger:hover {
            background: #ff6b6b;
        }

        .btn-success {
            background: #2ecc71;
            color: #fff;
        }

        .btn-success:hover {
            background: #27ae60;
        }

        .btn.active {
            box-shadow: 0 0 0 2px #fff;
        }

        .recording-indicator {
            display: none;
            align-items: center;
            gap: 5px;
            color: #e94560;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        .recording-indicator.active {
            display: flex;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .rec-dot {
            width: 10px;
            height: 10px;
            background: #e94560;
            border-radius: 50%;
        }

        /* 主内容区 */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左侧边栏 - 参与者列表 */
        .sidebar-left {
            width: 200px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #0f3460;
            font-weight: bold;
        }

        .participants-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .participant {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .participant:hover {
            background: #0f3460;
        }

        .participant.active {
            background: #0f3460;
            border: 1px solid #e94560;
        }

        .participant-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .participant-info {
            flex: 1;
        }

        .participant-name {
            font-size: 14px;
            font-weight: 500;
        }

        .participant-role {
            font-size: 12px;
            color: #888;
        }

        .participant-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
        }

        .participant-status.away {
            background: #f39c12;
        }

        /* 中间区域 - 白板 */
        .center-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .whiteboard-container {
            flex: 1;
            position: relative;
            background: #fff;
            overflow: hidden;
        }

        #whiteboard {
            cursor: crosshair;
            touch-action: none;
        }

        .whiteboard-tools {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(22, 33, 62, 0.95);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .tool-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 18px;
        }

        .tool-btn:hover {
            background: #0f3460;
        }

        .tool-btn.active {
            background: #e94560;
        }

        .color-picker {
            width: 30px;
            height: 30px;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
        }

        .color-picker input {
            width: 150%;
            height: 150%;
            transform: translate(-25%, -25%);
            cursor: pointer;
        }

        /* 屏幕共享高亮 */
        .share-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .share-overlay.active {
            display: flex;
        }

        .share-selection-box {
            border: 3px dashed #e94560;
            background: rgba(233, 69, 96, 0.1);
            position: absolute;
            cursor: move;
        }

        .share-label {
            position: absolute;
            top: -30px;
            left: 0;
            background: #e94560;
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
        }

        /* 右侧边栏 - 聊天 */
        .sidebar-right {
            width: 300px;
            background: #16213e;
            border-left: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .message-sender {
            font-weight: bold;
            font-size: 13px;
            color: #e94560;
        }

        .message-time {
            font-size: 11px;
            color: #888;
        }

        .message-content {
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-content.self {
            background: #1a4a7a;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #0f3460;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            background: #0f3460;
            border: none;
            border-radius: 20px;
            padding: 10px 15px;
            color: #fff;
            font-size: 14px;
            resize: none;
            max-height: 100px;
            min-height: 40px;
        }

        .chat-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #e94560;
        }

        .emoji-btn, .send-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: #0f3460;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .emoji-btn:hover, .send-btn:hover {
            background: #e94560;
        }

        .emoji-picker {
            position: absolute;
            bottom: 70px;
            right: 20px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            padding: 10px;
            display: none;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .emoji-picker.active {
            display: grid;
        }

        .emoji-item {
            cursor: pointer;
            font-size: 20px;
            padding: 5px;
            text-align: center;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .emoji-item:hover {
            background: #0f3460;
        }

        /* 移动端菜单按钮 */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e94560;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .mobile-chat-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #0f3460;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e94560;
            color: #fff;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .sidebar-left {
                position: fixed;
                left: 0;
                top: 60px;
                bottom: 0;
                z-index: 150;
                transform: translateX(-100%);
            }

            .sidebar-left.open {
                transform: translateX(0);
            }

            .sidebar-right {
                position: fixed;
                right: 0;
                top: 60px;
                bottom: 0;
                z-index: 150;
                transform: translateX(100%);
            }

            .sidebar-right.open {
                transform: translateX(0);
            }

            .mobile-menu-btn,
            .mobile-chat-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .overlay {
                display: none;
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 100;
            }

            .overlay.active {
                display: block;
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 10px;
            }

            .logo {
                font-size: 1rem;
            }

            .btn {
                padding: 6px 12px;
                font-size: 12px;
            }

            .whiteboard-tools {
                padding: 8px 15px;
                gap: 5px;
            }

            .tool-btn {
                width: 35px;
                height: 35px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">📚 虚拟教室</div>
            <div class="header-controls">
                <div class="recording-indicator" id="recordingIndicator">
                    <span class="rec-dot"></span>
                    <span>录制中</span>
                </div>
                <button class="btn btn-primary" id="shareBtn" onclick="toggleShare()">
                    🖥️ 屏幕共享
                </button>
                <button class="btn btn-danger" id="recordBtn" onclick="toggleRecording()">
                    🔴 录制
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧参与者列表 -->
            <aside class="sidebar-left" id="sidebarLeft">
                <div class="sidebar-header">
                    👥 参与者 (5)
                </div>
                <div class="participants-list" id="participantsList">
                    <div class="participant active">
                        <div class="participant-avatar" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">我</div>
                        <div class="participant-info">
                            <div class="participant-name">我 (主持人)</div>
                            <div class="participant-role">老师</div>
                        </div>
                        <div class="participant-status"></div>
                    </div>
                    <div class="participant">
                        <div class="participant-avatar" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">张</div>
                        <div class="participant-info">
                            <div class="participant-name">张小明</div>
                            <div class="participant-role">学生</div>
                        </div>
                        <div class="participant-status"></div>
                    </div>
                    <div class="participant">
                        <div class="participant-avatar" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">李</div>
                        <div class="participant-info">
                            <div class="participant-name">李小红</div>
                            <div class="participant-role">学生</div>
                        </div>
                        <div class="participant-status"></div>
                    </div>
                    <div class="participant">
                        <div class="participant-avatar" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">王</div>
                        <div class="participant-info">
                            <div class="participant-name">王大华</div>
                            <div class="participant-role">学生</div>
                        </div>
                        <div class="participant-status away"></div>
                    </div>
                    <div class="participant">
                        <div class="participant-avatar" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">陈</div>
                        <div class="participant-info">
                            <div class="participant-name">陈小美</div>
                            <div class="participant-role">学生</div>
                        </div>
                        <div class="participant-status"></div>
                    </div>
                </div>
            </aside>

            <!-- 中间白板区域 -->
            <main class="center-area">
                <div class="whiteboard-container" id="whiteboardContainer">
                    <canvas id="whiteboard"></canvas>
                    <div class="share-overlay" id="shareOverlay">
                        <div style="color: #fff; text-align: center;">
                            <p>拖动选择要共享的区域</p>
                        </div>
                        <div class="share-selection-box" id="shareSelectionBox" style="display: none;">
                            <span class="share-label">🔴 正在共享此区域</span>
                        </div>
                    </div>
                    <div class="whiteboard-tools">
                        <button class="tool-btn active" data-tool="pen" title="画笔">✏️</button>
                        <button class="tool-btn" data-tool="eraser" title="橡皮擦">🧼</button>
                        <button class="tool-btn" data-tool="clear" title="清空">🗑️</button>
                        <div class="color-picker" title="选择颜色">
                            <input type="color" id="colorPicker" value="#000000">
                        </div>
                        <button class="tool-btn" onclick="undo()" title="撤销">↩️</button>
                    </div>
                </div>
            </main>

            <!-- 右侧聊天区 -->
            <aside class="sidebar-right" id="sidebarRight">
                <div class="sidebar-header">
                    💬 聊天
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <div style="position: relative;">
                        <div class="emoji-picker" id="emojiPicker"></div>
                    </div>
                    <div class="chat-input-wrapper">
                        <button class="emoji-btn" onclick="toggleEmojiPicker()">😊</button>
                        <textarea class="chat-input" id="chatInput" placeholder="输入消息..." rows="1"></textarea>
                        <button class="send-btn" onclick="sendMessage()">📤</button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- 移动端按钮 -->
    <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleSidebar('left')">👥</button>
    <button class="mobile-chat-btn" id="mobileChatBtn" onclick="toggleSidebar('right')">
        💬
        <span class="badge" id="chatBadge" style="display: none;">0</span>
    </button>

    <!-- 遮罩层 -->
    <div class="overlay" id="overlay" onclick="closeSidebars()"></div>

    <script>
        // ==================== 全局状态 ====================
        const state = {
            isRecording: false,
            isSharing: false,
            drawing: false,
            currentTool: 'pen',
            currentColor: '#000000',
            lineWidth: 2,
            chatMessages: [],
            whiteboardHistory: [],
            unreadCount: 0
        };

        // ==================== 白板功能 ====================
        const canvas = document.getElementById('whiteboard');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('whiteboardContainer');

        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let lastX = 0;
        let lastY = 0;

        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDrawing(e) {
            if (state.isSharing) return;
            state.drawing = true;
            const pos = getPointerPos(e);
            lastX = pos.x;
            lastY = pos.y;

            // 保存当前状态用于撤销
            saveState();
        }

        function draw(e) {
            if (!state.drawing || state.isSharing) return;
            e.preventDefault();

            const pos = getPointerPos(e);

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);

            if (state.currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 20;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = state.currentColor;
                ctx.lineWidth = state.lineWidth;
            }

            ctx.stroke();

            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing() {
            state.drawing = false;
        }

        // 鼠标事件
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // 触摸事件
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);

        // 工具选择
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => {
                const tool = btn.dataset.tool;
                if (tool === 'clear') {
                    saveState();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    addSystemMessage('白板已清空');
                    return;
                }
                state.currentTool = tool;
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // 颜色选择
        document.getElementById('colorPicker').addEventListener('change', (e) => {
            state.currentColor = e.target.value;
            state.currentTool = 'pen';
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tool="pen"]').classList.add('active');
        });

        // 撤销功能
        function saveState() {
            state.whiteboardHistory.push(canvas.toDataURL());
            if (state.whiteboardHistory.length > 10) {
                state.whiteboardHistory.shift();
            }
        }

        function undo() {
            if (state.whiteboardHistory.length === 0) return;
            const img = new Image();
            img.src = state.whiteboardHistory.pop();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
        }

        // ==================== 屏幕共享功能 ====================
        let shareBox = null;
        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };

        function toggleShare() {
            const overlay = document.getElementById('shareOverlay');
            const btn = document.getElementById('shareBtn');
            const selectionBox = document.getElementById('shareSelectionBox');

            state.isSharing = !state.isSharing;

            if (state.isSharing) {
                overlay.classList.add('active');
                btn.classList.add('active');
                btn.textContent = '⏹️ 停止共享';
                addSystemMessage('开始屏幕共享，请选择共享区域');

                // 创建选择框
                selectionBox.style.display = 'block';
                selectionBox.style.width = '300px';
                selectionBox.style.height = '200px';
                selectionBox.style.left = '50%';
                selectionBox.style.top = '50%';
                selectionBox.style.transform = 'translate(-50%, -50%)';

                // 添加拖拽功能
                selectionBox.addEventListener('mousedown', startDrag);
                selectionBox.addEventListener('touchstart', startDrag, { passive: false });
            } else {
                overlay.classList.remove('active');
                btn.classList.remove('active');
                btn.textContent = '🖥️ 屏幕共享';
                selectionBox.style.display = 'none';
                addSystemMessage('屏幕共享已停止');
            }
        }

        function startDrag(e) {
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = document.getElementById('shareSelectionBox').getBoundingClientRect();
            dragOffset.x = clientX - rect.left;
            dragOffset.y = clientY - rect.top;
        }

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const container = document.getElementById('whiteboardContainer');
            const containerRect = container.getBoundingClientRect();
            const selectionBox = document.getElementById('shareSelectionBox');

            let x = e.clientX - containerRect.left - dragOffset.x;
            let y = e.clientY - containerRect.top - dragOffset.y;

            // 限制在容器内
            x = Math.max(0, Math.min(x, containerRect.width - selectionBox.offsetWidth));
            y = Math.max(0, Math.min(y, containerRect.height - selectionBox.offsetHeight));

            selectionBox.style.left = x + 'px';
            selectionBox.style.top = y + 'px';
            selectionBox.style.transform = 'none';
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const container = document.getElementById('whiteboardContainer');
            const containerRect = container.getBoundingClientRect();
            const selectionBox = document.getElementById('shareSelectionBox');

            let x = e.touches[0].clientX - containerRect.left - dragOffset.x;
            let y = e.touches[0].clientY - containerRect.top - dragOffset.y;

            x = Math.max(0, Math.min(x, containerRect.width - selectionBox.offsetWidth));
            y = Math.max(0, Math.min(y, containerRect.height - selectionBox.offsetHeight));

            selectionBox.style.left = x + 'px';
            selectionBox.style.top = y + 'px';
            selectionBox.style.transform = 'none';
        }, { passive: false });

        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('touchend', () => isDragging = false);

        // ==================== 录制功能 ====================
        function toggleRecording() {
            const indicator = document.getElementById('recordingIndicator');
            const btn = document.getElementById('recordBtn');

            state.isRecording = !state.isRecording;

            if (state.isRecording) {
                indicator.classList.add('active');
                btn.classList.add('active');
                btn.textContent = '⏹️ 停止';
                addSystemMessage('🎬 录制已开始');
            } else {
                indicator.classList.remove('active');
                btn.classList.remove('active');
                btn.textContent = '🔴 录制';
                addSystemMessage('🎬 录制已停止并保存');
            }
        }

        // ==================== 聊天功能 ====================
        const emojis = ['😀', '😃', '😄', '😁', '😅', '😂', '🤣', '😊', '😇', '🙂', '😉', '😌', '😍', '🥰', '😘', '😗', '😋', '😛', '😝', '😜', '🤪', '🤨', '🧐', '🤓', '😎', '🥸', '🤩', '🥳', '😏', '😒', '😞', '😔', '😟', '😕', '🙁', '☹️', '😣', '😖', '😫', '😩', '🥺', '😢', '😭', '😤', '😠', '😡', '🤬', '🤯', '😳', '🥵', '🥶', '😱', '😨', '😰', '😥', '😓', '🤗', '🤔', '🤭', '🤫', '🤥', '😶', '😐', '😑', '😬', '🙄', '😯', '😦', '😧', '😮', '😲', '🥱', '😴', '🤤', '😪', '😵', '🤐', '🥴', '🤢', '🤮', '🤧', '😷', '🤒', '🤕', '🤑', '🤠', '😈', '👿', '👹', '👺', '🤡', '💩', '👻', '💀', '☠️', '👽', '👾', '🤖', '🎃', '😺', '😸', '😹', '😻', '😼', '😽', '🙀', '😿', '😾'];

        function initEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            emojis.forEach(emoji => {
                const span = document.createElement('span');
                span.className = 'emoji-item';
                span.textContent = emoji;
                span.onclick = () => insertEmoji(emoji);
                picker.appendChild(span);
            });
        }

        function toggleEmojiPicker() {
            document.getElementById('emojiPicker').classList.toggle('active');
        }

        function insertEmoji(emoji) {
            const input = document.getElementById('chatInput');
            input.value += emoji;
            input.focus();
            document.getElementById('emojiPicker').classList.remove('active');
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            if (!content) return;

            addMessage('我', content, true);
            input.value = '';
            input.style.height = 'auto';

            // 模拟其他用户回复
            setTimeout(() => {
                const responses = [
                    { name: '张小明', content: '收到！👍' },
                    { name: '李小红', content: '明白了 😊' },
                    { name: '王大华', content: '好的' },
                    { name: '陈小美', content: '谢谢老师！🙏' }
                ];
                const response = responses[Math.floor(Math.random() * responses.length)];
                addMessage(response.name, response.content, false);
            }, 1000 + Math.random() * 2000);
        }

        function addMessage(sender, content, isSelf) {
            const container = document.getElementById('chatMessages');
            const message = document.createElement('div');
            message.className = 'message';

            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            message.innerHTML = `
                <div class="message-header">
                    <span class="message-sender">${sender}</span>
                    <span class="message-time">${time}</span>
                </div>
                <div class="message-content ${isSelf ? 'self' : ''}">${escapeHtml(content)}</div>
            `;

            container.appendChild(message);
            container.scrollTop = container.scrollHeight;

            // 更新未读消息数
            if (!isSelf && !document.getElementById('sidebarRight').classList.contains('open')) {
                state.unreadCount++;
                updateBadge();
            }

            state.chatMessages.push({ sender, content, time, isSelf });
        }

        function addSystemMessage(content) {
            const container = document.getElementById('chatMessages');
            const message = document.createElement('div');
            message.className = 'message';
            message.innerHTML = `
                <div class="message-content" style="background: #e94560; text-align: center;">${content}</div>
            `;
            container.appendChild(message);
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateBadge() {
            const badge = document.getElementById('chatBadge');
            if (state.unreadCount > 0) {
                badge.textContent = state.unreadCount;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }

        // 回车发送
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 自动调整高度
        document.getElementById('chatInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // ==================== 移动端侧边栏控制 ====================
        function toggleSidebar(side) {
            const sidebar = document.getElementById(`sidebar${side === 'left' ? 'Left' : 'Right'}`);
            const overlay = document.getElementById('overlay');

            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');

            if (side === 'right' && sidebar.classList.contains('open')) {
                state.unreadCount = 0;
                updateBadge();
            }
        }

        function closeSidebars() {
            document.getElementById('sidebarLeft').classList.remove('open');
            document.getElementById('sidebarRight').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }

        // 点击外部关闭表情选择器
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.chat-input-area')) {
                document.getElementById('emojiPicker').classList.remove('active');
            }
        });

        // ==================== 初始化 ====================
        initEmojiPicker();

        // 添加一些初始消息
        setTimeout(() => addMessage('张小明', '老师好！👋', false), 500);
        setTimeout(() => addMessage('李小红', '大家好！', false), 1000);
        setTimeout(() => addSystemMessage('欢迎进入虚拟教室！'), 1500);
    </script>
</body>
</html>
