<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子鱼缸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #e0e0e0;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .fish-tank {
            width: 600px;
            height: 450px;
            cursor: pointer;
            position: relative;
        }

        .instructions {
            color: #a0a0a0;
            margin-top: 15px;
            font-size: 14px;
        }

        @keyframes tailSwim {
            0%, 100% { transform: rotate(-15deg); }
            50% { transform: rotate(15deg); }
        }

        @keyframes foodFall {
            0% { opacity: 0; transform: translateY(0); }
            10% { opacity: 1; }
            100% { opacity: 0.8; transform: translateY(300px); }
        }

        @keyframes seaweedWave {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .tail-animate {
            animation: tailSwim 0.5s ease-in-out infinite;
            transform-origin: left center;
        }

        .seaweed-animate {
            animation: seaweedWave 3s ease-in-out infinite;
            transform-origin: bottom center;
        }

        .food {
            animation: foodFall 4s ease-in forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>电子鱼缸</h1>
        <svg class="fish-tank" id="fishTank" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- 水的渐变 -->
                <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.3" />
                    <stop offset="50%" style="stop-color:#29b6f6;stop-opacity:0.5" />
                    <stop offset="100%" style="stop-color:#0288d1;stop-opacity:0.7" />
                </linearGradient>

                <!-- 鱼缸玻璃反光 -->
                <linearGradient id="glassReflection" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
                    <stop offset="30%" style="stop-color:#ffffff;stop-opacity:0.05" />
                    <stop offset="70%" style="stop-color:#ffffff;stop-opacity:0.02" />
                    <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1" />
                </linearGradient>

                <!-- 鱼的渐变 -->
                <linearGradient id="fishGold" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#ffd54f" />
                    <stop offset="50%" style="stop-color:#ffb300" />
                    <stop offset="100%" style="stop-color:#ff8f00" />
                </linearGradient>

                <!-- 石头渐变 -->
                <radialGradient id="stoneGradient" cx="30%" cy="30%">
                    <stop offset="0%" style="stop-color:#8d6e63" />
                    <stop offset="100%" style="stop-color:#5d4037" />
                </radialGradient>

                <!-- 水草渐变 -->
                <linearGradient id="seaweedGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#66bb6a" />
                    <stop offset="100%" style="stop-color:#2e7d32" />
                </linearGradient>

                <!-- 鱼的阴影 -->
                <filter id="fishShadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.2"/>
                </filter>
            </defs>

            <!-- 鱼缸背景 -->
            <rect x="0" y="0" width="600" height="450" fill="#1a237e" rx="10" ry="10"/>

            <!-- 水体 -->
            <rect x="5" y="5" width="590" height="440" fill="url(#waterGradient)" rx="8" ry="8"/>

            <!-- 水草组 -->
            <g id="seaweedGroup">
                <!-- 左侧水草 -->
                <path class="seaweed-animate" d="M80 440 Q75 380 85 340 Q95 300 80 260 Q65 220 80 180" fill="none" stroke="url(#seaweedGradient)" stroke-width="8" stroke-linecap="round"/>
                <path class="seaweed-animate" style="animation-delay: 0.5s" d="M100 440 Q105 390 95 350 Q85 310 100 270 Q115 230 95 195" fill="none" stroke="url(#seaweedGradient)" stroke-width="6" stroke-linecap="round"/>
                <path class="seaweed-animate" style="animation-delay: 1s" d="M120 440 Q115 385 125 345 Q135 305 120 265" fill="none" stroke="url(#seaweedGradient)" stroke-width="7" stroke-linecap="round"/>

                <!-- 右侧水草 -->
                <path class="seaweed-animate" style="animation-delay: 0.3s" d="M480 440 Q485 380 475 340 Q465 300 480 260 Q495 220 480 180" fill="none" stroke="url(#seaweedGradient)" stroke-width="8" stroke-linecap="round"/>
                <path class="seaweed-animate" style="animation-delay: 0.8s" d="M500 440 Q495 390 505 350 Q515 310 500 270 Q485 230 505 195" fill="none" stroke="url(#seaweedGradient)" stroke-width="6" stroke-linecap="round"/>
                <path class="seaweed-animate" style="animation-delay: 1.2s" d="M520 440 Q525 385 515 345 Q505 305 520 265" fill="none" stroke="url(#seaweedGradient)" stroke-width="7" stroke-linecap="round"/>
            </g>

            <!-- 石头组 -->
            <g id="stoneGroup">
                <ellipse cx="200" cy="420" rx="40" ry="20" fill="url(#stoneGradient)"/>
                <ellipse cx="250" cy="430" rx="35" ry="18" fill="url(#stoneGradient)"/>
                <ellipse cx="300" cy="425" rx="45" ry="22" fill="url(#stoneGradient)"/>
                <ellipse cx="370" cy="435" rx="38" ry="19" fill="url(#stoneGradient)"/>
                <ellipse cx="420" cy="428" rx="32" ry="16" fill="url(#stoneGradient)"/>
            </g>

            <!-- 饲料组 -->
            <g id="foodGroup"></g>

            <!-- 大鱼 -->
            <g id="bigFish" filter="url(#fishShadow)">
                <!-- 身体 -->
                <ellipse cx="300" cy="200" rx="50" ry="30" fill="url(#fishGold)"/>
                <!-- 身体纹理 -->
                <path d="M270 195 Q300 180 330 195" fill="none" stroke="#ff8f00" stroke-width="1.5" opacity="0.5"/>
                <path d="M275 205 Q300 190 325 205" fill="none" stroke="#ff8f00" stroke-width="1.5" opacity="0.5"/>
                <!-- 背鳍 -->
                <path d="M280 175 Q300 150 320 175 Q300 165 280 175" fill="#ffb300"/>
                <!-- 胸鳍 -->
                <ellipse cx="280" cy="210" rx="12" ry="8" fill="#ff8f00" transform="rotate(-20 280 210)"/>
                <ellipse cx="320" cy="210" rx="12" ry="8" fill="#ff8f00" transform="rotate(20 320 210)"/>
                <!-- 尾巴 -->
                <g class="tail-animate">
                    <path d="M350 200 Q380 170 400 185 Q375 200 400 215 Q380 230 350 200" fill="#ff8f00"/>
                </g>
                <!-- 头部 -->
                <ellipse cx="250" cy="200" rx="20" ry="25" fill="url(#fishGold)"/>
                <!-- 眼睛 -->
                <circle cx="242" cy="195" r="5" fill="white"/>
                <circle cx="243" cy="195" r="3" fill="black"/>
                <!-- 鱼鳃 -->
                <path d="M265 185 Q270 200 265 215" fill="none" stroke="#ff6f00" stroke-width="2"/>
                <!-- 嘴巴 -->
                <path d="M230 200 Q235 205 230 210" fill="none" stroke="#e65100" stroke-width="1.5"/>
            </g>

            <!-- 小鱼 -->
            <g id="smallFish" filter="url(#fishShadow)">
                <!-- 身体 -->
                <ellipse cx="400" cy="300" rx="35" ry="20" fill="url(#fishGold)"/>
                <!-- 身体纹理 -->
                <path d="M382 297 Q400 287 418 297" fill="none" stroke="#ff8f00" stroke-width="1" opacity="0.5"/>
                <!-- 背鳍 -->
                <path d="M388 282 Q400 265 412 282 Q400 275 388 282" fill="#ffb300"/>
                <!-- 胸鳍 -->
                <ellipse cx="385" cy="308" rx="8" ry="5" fill="#ff8f00" transform="rotate(-20 385 308)"/>
                <ellipse cx="415" cy="308" rx="8" ry="5" fill="#ff8f00" transform="rotate(20 415 308)"/>
                <!-- 尾巴 -->
                <g class="tail-animate" style="animation-delay: 0.25s">
                    <path d="M435 300 Q455 278 470 290 Q450 300 470 310 Q455 322 435 300" fill="#ff8f00"/>
                </g>
                <!-- 头部 -->
                <ellipse cx="365" cy="300" rx="14" ry="17" fill="url(#fishGold)"/>
                <!-- 眼睛 -->
                <circle cx="360" cy="296" r="3.5" fill="white"/>
                <circle cx="361" cy="296" r="2" fill="black"/>
                <!-- 鱼鳃 -->
                <path d="M375 292 Q378 300 375 308" fill="none" stroke="#ff6f00" stroke-width="1.5"/>
                <!-- 嘴巴 -->
                <path d="M351 300 Q354 303 351 306" fill="none" stroke="#e65100" stroke-width="1"/>
            </g>

            <!-- 玻璃反光效果 -->
            <rect x="5" y="5" width="590" height="440" fill="url(#glassReflection)" rx="8" ry="8" pointer-events="none"/>

            <!-- 边框 -->
            <rect x="0" y="0" width="600" height="450" fill="none" stroke="#2c3e50" stroke-width="8" rx="10" ry="10"/>
        </svg>
        <p class="instructions">点击鱼缸任意位置投放饲料</p>
    </div>

    <script>
        const fishTank = document.getElementById('fishTank');
        const foodGroup = document.getElementById('foodGroup');
        const bigFish = document.getElementById('bigFish');
        const smallFish = document.getElementById('smallFish');

        // 鱼的状态
        const fishState = {
            big: { x: 300, y: 200, speed: 2, target: null, isEating: false },
            small: { x: 400, y: 300, speed: 2.5, target: null, isEating: false }
        };

        // 饲料数组
        let foods = [];

        // 点击投放饲料
        fishTank.addEventListener('click', (e) => {
            const rect = fishTank.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width * 600;
            const y = (e.clientY - rect.top) / rect.height * 450;

            // 投放3颗饲料
            for (let i = 0; i < 3; i++) {
                createFood(x + (Math.random() - 0.5) * 30, y + (Math.random() - 0.5) * 30);
            }
        });

        // 创建饲料
        function createFood(x, y) {
            const foodId = 'food_' + Date.now() + '_' + Math.random();
            const food = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            food.setAttribute('id', foodId);
            food.setAttribute('cx', x);
            food.setAttribute('cy', y);
            food.setAttribute('r', '4');
            food.setAttribute('fill', '#8d6e63');
            food.setAttribute('class', 'food');
            foodGroup.appendChild(food);

            foods.push({ id: foodId, x: x, y: y, eaten: false, element: food });

            // 饲料下沉动画
            let sinkY = y;
            const sinkInterval = setInterval(() => {
                const foodData = foods.find(f => f.id === foodId);
                if (!foodData || foodData.eaten) {
                    clearInterval(sinkInterval);
                    return;
                }
                sinkY += 0.5;
                foodData.y = sinkY;
                food.setAttribute('cy', sinkY);

                if (sinkY > 420) {
                    clearInterval(sinkInterval);
                }
            }, 50);
        }

        // 更新鱼的位置
        function updateFish() {
            updateSingleFish(bigFish, fishState.big, 'big');
            updateSingleFish(smallFish, fishState.small, 'small');
        }

        // 更新单条鱼
        function updateSingleFish(fishElement, fish, type) {
            // 如果有目标饲料，向饲料游动
            if (fish.target && !fish.target.eaten) {
                const dx = fish.target.x - fish.x;
                const dy = fish.target.y - fish.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 20) {
                    // 吃到饲料
                    eatFood(fish.target, type);
                    fish.target = null;
                } else {
                    // 向饲料游动
                    fish.x += (dx / distance) * fish.speed * 2;
                    fish.y += (dy / distance) * fish.speed * 2;
                }
            } else {
                // 找最近的饲料
                const nearestFood = findNearestFood(fish);
                if (nearestFood) {
                    fish.target = nearestFood;
                } else {
                    // 随机游动
                    if (Math.random() < 0.02) {
                        fish.randomTarget = {
                            x: 100 + Math.random() * 400,
                            y: 100 + Math.random() * 250
                        };
                    }

                    if (fish.randomTarget) {
                        const dx = fish.randomTarget.x - fish.x;
                        const dy = fish.randomTarget.y - fish.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance > 10) {
                            fish.x += (dx / distance) * fish.speed;
                            fish.y += (dy / distance) * fish.speed;
                        } else {
                            fish.randomTarget = null;
                        }
                    }
                }
            }

            // 边界检测
            fish.x = Math.max(60, Math.min(540, fish.x));
            fish.y = Math.max(60, Math.min(380, fish.y));

            // 应用变换
            const scaleX = fish.x < (fish.target ? fish.target.x : fish.x) ? 1 : -1;
            fishElement.setAttribute('transform', `translate(${fish.x - 300}, ${fish.y - 200}) scale(${scaleX}, 1)`);
        }

        // 找最近的饲料
        function findNearestFood(fish) {
            let nearest = null;
            let minDistance = Infinity;

            for (const food of foods) {
                if (food.eaten) continue;
                const dx = food.x - fish.x;
                const dy = food.y - fish.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < minDistance) {
                    minDistance = distance;
                    nearest = food;
                }
            }

            return minDistance < 300 ? nearest : null;
        }

        // 吃饲料
        function eatFood(food, fishType) {
            if (food.eaten) return;

            food.eaten = true;
            food.element.style.opacity = '0';

            setTimeout(() => {
                if (food.element.parentNode) {
                    food.element.parentNode.removeChild(food.element);
                }
                foods = foods.filter(f => f.id !== food.id);
            }, 300);

            // 清除鱼的目标
            fishState[fishType].target = null;
        }

        // 动画循环
        function animate() {
            updateFish();
            requestAnimationFrame(animate);
        }

        // 启动动画
        animate();
    </script>
</body>
</html>
