<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子鱼缸</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; background: #1a2a3a;
  font-family: 'Microsoft YaHei', sans-serif;
}
h1 { color: #88ccff; margin-bottom: 15px; font-size: 28px; text-shadow: 0 0 10px rgba(100,200,255,0.4); }
#tank-wrapper { position: relative; }
svg {
  border-radius: 16px; box-shadow: 0 0 40px rgba(100,200,255,0.15);
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============ 常量 ============
const W = 800, H = 560;
const TANK_MARGIN = 20;

// ============ SVG创建辅助 ============
const NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'text') { el.textContent = v; }
    else if (k === 'innerHTML') { el.innerHTML = v; }
    else el.setAttribute(k, v);
  }
  return el;
}

// ============ 游戏状态 ============
let fishes = [];
let foods = [];
let lastTime = 0;

// ============ 初始化场景 ============
function buildScene() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const title = document.createElement('h1');
  title.textContent = '电子鱼缸 - 点击投喂';
  app.appendChild(title);

  const wrapper = document.createElement('div');
  wrapper.id = 'tank-wrapper';

  const svg = svgEl('svg', { width: W, height: H, viewBox: `0 0 ${W} ${H}` });
  svg.id = 'tank';

  // 水背景
  const waterGrad = svgEl('defs', {});
  waterGrad.innerHTML = `
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4aa8c9" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#2d7a99" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1a4d5e" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.03)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="30%" stop-color="#ffe566"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="70%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffaa00"/>
      <stop offset="30%" stop-color="#ffdd44"/>
      <stop offset="50%" stop-color="#ff9900"/>
      <stop offset="70%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
    <linearGradient id="seaweedGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ea84a"/>
      <stop offset="100%" stop-color="#1a6030"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="tankClip">
      <rect x="${TANK_MARGIN}" y="${TANK_MARGIN}" width="${W - TANK_MARGIN * 2}" height="${H - TANK_MARGIN * 2}" rx="12"/>
    </clipPath>
  `;

  svg.appendChild(waterGrad);

  // 背景矩形
  svg.appendChild(svgEl('rect', {
    x: 0, y: 0, width: W, height: H, rx: 12,
    fill: '#0d1e2b'
  }));

  // 水体
  svg.appendChild(svgEl('rect', {
    x: TANK_MARGIN, y: TANK_MARGIN,
    width: W - TANK_MARGIN * 2, height: H - TANK_MARGIN * 2,
    rx: 12, fill: 'url(#waterGrad)',
    'clip-path': 'url(#tankClip)'
  }));

  // 气泡层
  const bubbleGroup = svgEl('g', { id: 'bubbles' });
  svg.appendChild(bubbleGroup);

  // 石头组
  const stonesGroup = svgEl('g', { id: 'stones' });
  svg.appendChild(stonesGroup);

  // 水草组
  const seaweedGroup = svgEl('g', { id: 'seaweed' });
  svg.appendChild(seaweedGroup);

  // 沙底
  svg.appendChild(svgEl('ellipse', {
    cx: W / 2, cy: H - TANK_MARGIN - 8,
    rx: W / 2 - 35, ry: 18,
    fill: '#b8925a', opacity: 0.6
  }));
  svg.appendChild(svgEl('ellipse', {
    cx: W / 2, cy: H - TANK_MARGIN - 12,
    rx: W / 2 - 50, ry: 14,
    fill: '#d4b078', opacity: 0.4
  }));

  // 鱼群组
  const fishGroup = svgEl('g', { id: 'fishes' });
  svg.appendChild(fishGroup);

  // 饲料组
  const foodGroup = svgEl('g', { id: 'foods' });
  svg.appendChild(foodGroup);

  // 玻璃反光效果
  svg.appendChild(svgEl('rect', {
    x: TANK_MARGIN, y: TANK_MARGIN,
    width: W - TANK_MARGIN * 2, height: H - TANK_MARGIN * 2,
    rx: 12, fill: 'url(#glassGrad)',
    'clip-path': 'url(#tankClip)',
    'pointer-events': 'none'
  }));

  // 左侧玻璃高光
  svg.appendChild(svgEl('path', {
    d: `M ${TANK_MARGIN + 20} ${TANK_MARGIN + 10} Q ${TANK_MARGIN + 5} ${H / 2} ${TANK_MARGIN + 20} ${H - TANK_MARGIN - 30}`,
    stroke: 'rgba(255,255,255,0.08)', 'stroke-width': 6, fill: 'none',
    'clip-path': 'url(#tankClip)', 'pointer-events': 'none'
  }));

  // 顶部玻璃反光条
  svg.appendChild(svgEl('rect', {
    x: TANK_MARGIN + 10, y: TANK_MARGIN + 5,
    width: W - TANK_MARGIN * 2 - 20, height: 4, rx: 2,
    fill: 'rgba(255,255,255,0.06)',
    'clip-path': 'url(#tankClip)', 'pointer-events': 'none'
  }));

  // 边框
  svg.appendChild(svgEl('rect', {
    x: TANK_MARGIN, y: TANK_MARGIN,
    width: W - TANK_MARGIN * 2, height: H - TANK_MARGIN * 2,
    rx: 12, fill: 'none', stroke: 'rgba(180,220,255,0.2)', 'stroke-width': 2
  }));

  wrapper.appendChild(svg);
  app.appendChild(wrapper);

  // 创建石头
  createStones(stonesGroup);

  // 创建水草
  createSeaweed(seaweedGroup);

  // 创建鱼
  createFish(fishGroup, 1.0, 400, 220);  // 大鱼
  createFish(fishGroup, 0.55, 250, 350); // 小鱼

  // 创建气泡
  createBubbles(bubbleGroup);

  // 点击事件
  svg.addEventListener('click', (e) => {
    const rect = svg.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    dropFood(x, y);
  });
}

// ============ 石头 ============
function createStones(group) {
  const positions = [
    { cx: 120, cy: H - TANK_MARGIN - 22, rx: 35, ry: 18, color: '#8b6914' },
    { cx: 200, cy: H - TANK_MARGIN - 16, rx: 25, ry: 12, color: '#6b4f10' },
    { cx: 680, cy: H - TANK_MARGIN - 20, rx: 38, ry: 16, color: '#7a5c12' },
    { cx: 600, cy: H - TANK_MARGIN - 14, rx: 22, ry: 11, color: '#5c4410' },
    { cx: 400, cy: H - TANK_MARGIN - 18, rx: 20, ry: 10, color: '#8b6914' },
    { cx: 50, cy: H - TANK_MARGIN - 12, rx: 15, ry: 9, color: '#6b4f10' },
  ];
  positions.forEach(s => {
    group.appendChild(svgEl('ellipse', {
      cx: s.cx, cy: s.cy, rx: s.rx, ry: s.ry, fill: s.color, opacity: 0.8
    }));
    // 石头高光
    group.appendChild(svgEl('ellipse', {
      cx: s.cx - s.rx * 0.3, cy: s.cy - s.ry * 0.4,
      rx: s.rx * 0.5, ry: s.ry * 0.3, fill: 'rgba(255,255,255,0.08)'
    }));
  });
}

// ============ 水草 ============
function createSeaweed(group) {
  const plants = [
    { x: 90, height: 80, width: 14, color1: '#2ea84a', color2: '#1a6030' },
    { x: 130, height: 110, width: 16, color1: '#3cb85c', color2: '#1d6a32' },
    { x: 640, height: 95, width: 14, color1: '#2ea84a', color2: '#1a6030' },
    { x: 690, height: 75, width: 12, color1: '#3cb85c', color2: '#1d6a32' },
    { x: 350, height: 65, width: 10, color1: '#2ea84a', color2: '#1a6030' },
  ];

  // 先在SVG defs中创建所有渐变
  const svgDefs = document.querySelector('#tank defs');
  plants.forEach((p, i) => {
    const grad = document.createElementNS(NS, 'linearGradient');
    grad.setAttribute('id', `sw${i}`);
    grad.setAttribute('x1', '0');
    grad.setAttribute('y1', '0');
    grad.setAttribute('x2', '0');
    grad.setAttribute('y2', '1');
    const stop1 = document.createElementNS(NS, 'stop');
    stop1.setAttribute('offset', '0%');
    stop1.setAttribute('stop-color', p.color1);
    const stop2 = document.createElementNS(NS, 'stop');
    stop2.setAttribute('offset', '100%');
    stop2.setAttribute('stop-color', p.color2);
    grad.appendChild(stop1);
    grad.appendChild(stop2);
    svgDefs.appendChild(grad);

    const path = svgEl('path', {
      fill: `url(#sw${i})`, opacity: 0.85
    });
    path.dataset.baseX = p.x;
    path.dataset.height = p.height;
    path.dataset.width = p.width;
    path.dataset.phase = i * 0.7;
    group.appendChild(path);
    // Store reference for animation
    if (!group._seaweeds) group._seaweeds = [];
    group._seaweeds.push(path);
  });
}

// ============ 气泡 ============
function createBubbles(group) {
  if (!group._bubbles) group._bubbles = [];
  for (let i = 0; i < 12; i++) {
    const b = svgEl('circle', {
      cx: 50 + Math.random() * (W - 100),
      cy: H - TANK_MARGIN - 30 - Math.random() * 150,
      r: 1 + Math.random() * 2.5,
      fill: 'rgba(200,240,255,0.25)',
      stroke: 'rgba(255,255,255,0.15)', 'stroke-width': 0.5
    });
    b.dataset.baseX = parseFloat(b.getAttribute('cx'));
    b.dataset.baseY = parseFloat(b.getAttribute('cy'));
    b.dataset.speed = 0.15 + Math.random() * 0.3;
    b.dataset.phase = Math.random() * Math.PI * 2;
    group.appendChild(b);
    group._bubbles.push(b);
  }
}

// ============ 鱼 ============
function createFish(group, scale, x, y) {
  const fishGroup = svgEl('g', {
    transform: `translate(${x},${y}) scale(${scale})`,
    'filter': 'url(#shadow)'
  });

  // 尾鳍 (独立动画元素)
  const tailGroup = svgEl('g', { id: 'tail' });
  tailGroup.innerHTML = `
    <path d="M -40 0 C -55 -15 -70 -8 -75 0 C -70 8 -55 15 -40 0"
      fill="url(#goldGrad)" opacity="0.9"/>
    <path d="M -38 -2 C -50 -12 -62 -6 -65 0 C -62 6 -50 12 -38 -2"
      fill="#ffdd66" opacity="0.3"/>
  `;
  fishGroup.appendChild(tailGroup);

  // 身体
  const body = svgEl('ellipse', {
    cx: 0, cy: 0, rx: 45, ry: 22,
    fill: 'url(#goldGrad)'
  });
  fishGroup.appendChild(body);

  // 身体条纹
  fishGroup.appendChild(svgEl('path', {
    d: 'M -15 -18 Q -10 -5 -5 -18', fill: 'none',
    stroke: '#cc8800', 'stroke-width': 1.5, opacity: 0.4
  }));
  fishGroup.appendChild(svgEl('path', {
    d: 'M 5 -16 Q 10 -4 15 -16', fill: 'none',
    stroke: '#cc8800', 'stroke-width': 1.5, opacity: 0.4
  }));
  fishGroup.appendChild(svgEl('path', {
    d: 'M -5 16 Q 0 5 5 16', fill: 'none',
    stroke: '#cc8800', 'stroke-width': 1.5, opacity: 0.4
  }));

  // 腹鳍
  fishGroup.appendChild(svgEl('path', {
    d: 'M -5 18 Q -15 35 -20 30 Q -10 20 -5 18',
    fill: '#ffaa00', opacity: 0.8
  }));
  fishGroup.appendChild(svgEl('path', {
    d: 'M 5 18 Q 15 35 20 30 Q 10 20 5 18',
    fill: '#ffaa00', opacity: 0.8
  }));

  // 背鳍
  fishGroup.appendChild(svgEl('path', {
    d: 'M -20 -20 Q -10 -38 5 -42 Q 15 -38 20 -22 Q 10 -18 0 -20 Q -10 -18 -20 -20',
    fill: 'url(#goldGrad2)', opacity: 0.9
  }));

  // 胸鳍
  fishGroup.appendChild(svgEl('path', {
    d: 'M 10 2 Q 30 10 25 25 Q 15 12 10 5',
    fill: 'url(#goldGrad2)', opacity: 0.8
  }));

  // 眼睛
  fishGroup.appendChild(svgEl('circle', {
    cx: 30, cy: -6, r: 7, fill: '#fff'
  }));
  fishGroup.appendChild(svgEl('circle', {
    cx: 32, cy: -5, r: 4, fill: '#111'
  }));
  fishGroup.appendChild(svgEl('circle', {
    cx: 33, cy: -6, r: 1.5, fill: '#fff'
  }));

  // 嘴
  fishGroup.appendChild(svgEl('ellipse', {
    cx: 44, cy: 3, rx: 3, ry: 2, fill: '#cc6600'
  }));

  // 鳃
  fishGroup.appendChild(svgEl('path', {
    d: 'M 12 -14 Q 18 -8 12 0', fill: 'none',
    stroke: '#cc7700', 'stroke-width': 1.2, opacity: 0.5
  }));

  group.appendChild(fishGroup);

  fishes.push({
    el: fishGroup,
    tail: tailGroup,
    x: x, y: y,
    scale: scale,
    vx: (Math.random() - 0.5) * 1.5,
    vy: (Math.random() - 0.5) * 0.8,
    baseSpeed: 0.6 + Math.random() * 0.4,
    targetX: x, targetY: y,
    facingRight: true,
    tailPhase: Math.random() * Math.PI * 2,
    tailSpeed: 0.12 + Math.random() * 0.06,
    wanderTimer: 0,
    wanderInterval: 1500 + Math.random() * 2000,
    boundLeft: TANK_MARGIN + 60,
    boundRight: W - TANK_MARGIN - 60,
    boundTop: TANK_MARGIN + 40,
    boundBottom: H - TANK_MARGIN - 50,
    eating: false
  });
}

// ============ 投饲料 ============
function dropFood(x, y) {
  const count = 4 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    const fx = x + (Math.random() - 0.5) * 40;
    const fy = y + (Math.random() - 0.5) * 15;
    const pellet = svgEl('ellipse', {
      cx: fx, cy: fy, rx: 3.5, ry: 2.5,
      fill: '#d4763a', stroke: '#b85a20', 'stroke-width': 0.5
    });
    pellet.dataset.x = fx;
    pellet.dataset.y = fy;
    pellet.dataset.vx = (Math.random() - 0.5) * 0.3;
    pellet.dataset.vy = 0.25 + Math.random() * 0.35;
    pellet.dataset.eaten = 'false';
    document.getElementById('foods').appendChild(pellet);
    foods.push({
      el: pellet,
      x: fx, y: fy,
      vx: parseFloat(pellet.dataset.vx),
      vy: parseFloat(pellet.dataset.vy),
      eaten: false
    });
  }
}

// ============ 动画循环 ============
function animate(time) {
  if (!lastTime) lastTime = time;
  const dt = Math.min((time - lastTime) / 16.67, 3); // 归一化帧时间
  lastTime = time;

  const t = time * 0.001;

  // 更新水草
  const seaweedGroup = document.getElementById('seaweed');
  if (seaweedGroup && seaweedGroup._seaweeds) {
    seaweedGroup._seaweeds.forEach(sw => {
      const bx = parseFloat(sw.dataset.baseX);
      const h = parseFloat(sw.dataset.height);
      const w = parseFloat(sw.dataset.width);
      const phase = parseFloat(sw.dataset.phase);
      const sway = Math.sin(t * 1.5 + phase) * 8;
      sw.setAttribute('d',
        `M ${bx} ${H - TANK_MARGIN - 5} ` +
        `Q ${bx + sway} ${H - TANK_MARGIN - h * 0.4} ${bx + sway * 1.5} ${H - TANK_MARGIN - h} ` +
        `Q ${bx + w + sway * 0.5} ${H - TANK_MARGIN - h * 0.4} ${bx + w} ${H - TANK_MARGIN - 5} Z`
      );
    });
  }

  // 更新气泡
  const bubbleGroup = document.getElementById('bubbles');
  if (bubbleGroup && bubbleGroup._bubbles) {
    bubbleGroup._bubbles.forEach(b => {
      let cy = parseFloat(b.getAttribute('cy'));
      let cx = parseFloat(b.getAttribute('cx'));
      const baseX = parseFloat(b.dataset.baseX);
      const speed = parseFloat(b.dataset.speed);
      const phase = parseFloat(b.dataset.phase);

      cy -= speed * dt;
      cx = baseX + Math.sin(t * 2 + phase) * 5;

      if (cy < TANK_MARGIN + 20) {
        cy = H - TANK_MARGIN - 30 - Math.random() * 150;
        cx = baseX;
      }

      b.setAttribute('cy', cy);
      b.setAttribute('cx', cx);
    });
  }

  // 更新饲料
  foods = foods.filter(f => {
    if (f.eaten) return false;
    f.y += f.vy * dt;
    f.x += f.vx * dt;
    f.vx *= 0.995;
    f.el.setAttribute('cy', f.y);
    f.el.setAttribute('cx', f.x);
    if (f.y > H - TANK_MARGIN - 25) {
      f.el.remove();
      return false;
    }
    return true;
  });

  // 更新鱼
  fishes.forEach(fish => {
    // 寻找最近的饲料
    let nearestFood = null;
    let nearestDist = Infinity;
    foods.forEach(fd => {
      if (fd.eaten) return;
      const dx = fd.x - fish.x;
      const dy = fd.y - fish.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < nearestDist) {
        nearestDist = dist;
        nearestFood = fd;
      }
    });

    if (nearestFood && nearestDist < 350) {
      // 朝饲料游动
      fish.eating = true;
      const dx = nearestFood.x - fish.x;
      const dy = nearestFood.y - fish.y;
      const angle = Math.atan2(dy, dx);
      const speed = fish.baseSpeed * 2.2 * dt;
      fish.vx = Math.cos(angle) * speed;
      fish.vy = Math.sin(angle) * speed;
      fish.targetX = nearestFood.x;
      fish.targetY = nearestFood.y;

      // 吃饲料
      if (nearestDist < 18 * fish.scale) {
        nearestFood.eaten = true;
        nearestFood.el.style.transition = 'opacity 0.2s';
        nearestFood.el.style.opacity = '0';
        setTimeout(() => { if (nearestFood.el.parentNode) nearestFood.el.remove(); }, 200);
        fish.eating = false;
      }
    } else {
      fish.eating = false;
      fish.wanderTimer += 16.67 * dt;
      if (fish.wanderTimer > fish.wanderInterval) {
        fish.wanderTimer = 0;
        fish.wanderInterval = 1500 + Math.random() * 2000;
        const angle = Math.random() * Math.PI * 2;
        fish.targetX = fish.x + Math.cos(angle) * (100 + Math.random() * 150);
        fish.targetY = fish.y + Math.sin(angle) * (60 + Math.random() * 100);
        // 保持在边界内
        fish.targetX = Math.max(fish.boundLeft, Math.min(fish.boundRight, fish.targetX));
        fish.targetY = Math.max(fish.boundTop, Math.min(fish.boundBottom, fish.targetY));
      }

      const dx = fish.targetX - fish.x;
      const dy = fish.targetY - fish.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 3) {
        const speed = fish.baseSpeed * dt;
        fish.vx = (dx / dist) * speed;
        fish.vy = (dy / dist) * speed;
      } else {
        fish.vx *= 0.95;
        fish.vy *= 0.95;
      }
    }

    // 移动
    fish.x += fish.vx;
    fish.y += fish.vy;

    // 边界碰撞
    if (fish.x < fish.boundLeft) { fish.x = fish.boundLeft; fish.vx *= -0.5; fish.targetX = fish.boundRight - 50; }
    if (fish.x > fish.boundRight) { fish.x = fish.boundRight; fish.vx *= -0.5; fish.targetX = fish.boundLeft + 50; }
    if (fish.y < fish.boundTop) { fish.y = fish.boundTop; fish.vy *= -0.5; fish.targetY = fish.boundBottom - 50; }
    if (fish.y > fish.boundBottom) { fish.y = fish.boundBottom; fish.vy *= -0.5; fish.targetY = fish.boundTop + 50; }

    // 朝向
    const shouldFaceRight = fish.vx > 0.01;
    if (shouldFaceRight !== fish.facingRight) {
      fish.facingRight = shouldFaceRight;
      const currentScale = fish.scale * (fish.facingRight ? 1 : -1);
      fish.el.setAttribute('transform',
        `translate(${fish.x},${fish.y}) scale(${fish.scale * (fish.facingRight ? 1 : -1)},${fish.scale})`);
    } else {
      fish.el.setAttribute('transform',
        `translate(${fish.x},${fish.y}) scale(${fish.scale * (fish.facingRight ? 1 : -1)},${fish.scale})`);
    }

    // 尾鳍摇摆
    fish.tailPhase += fish.tailSpeed * dt;
    const tailAngle = Math.sin(fish.tailPhase) * 18;
    const waggleSpeed = fish.eating ? 1.8 : 1;
    fish.tail.setAttribute('transform', `rotate(${tailAngle * waggleSpeed})`);
  });

  requestAnimationFrame(animate);
}

// ============ 启动 ============
buildScene();
requestAnimationFrame(animate);
</script>
</body>
</html>
