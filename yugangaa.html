<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>电子鱼缸</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #1a2a3a, #0d1b2a);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Microsoft YaHei', sans-serif;
    overflow: hidden;
  }
  .wrapper {
    text-align: center;
  }
  .title {
    color: #8ec8e8;
    font-size: 28px;
    margin-bottom: 12px;
    text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
    letter-spacing: 8px;
  }
  .subtitle {
    color: #6aa8c8;
    font-size: 13px;
    margin-bottom: 16px;
    opacity: 0.7;
  }
  .tank-container {
    position: relative;
    display: inline-block;
    border-radius: 20px;
    padding: 4px;
    background: linear-gradient(135deg, #e8e8e8, #f0f0f0, #d8d8d8);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255,255,255,0.6);
  }
  #tank {
    cursor: pointer;
    border-radius: 16px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="title">电子鱼缸</div>
  <div class="subtitle">点击鱼缸任意位置投放饲料</div>
  <div class="tank-container">
    <svg id="tank" width="720" height="520" viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Water gradient -->
        <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#1a4a6e;stop-opacity:0.45"/>
          <stop offset="30%" style="stop-color:#1b5a7a;stop-opacity:0.5"/>
          <stop offset="70%" style="stop-color:#0d3a5a;stop-opacity:0.55"/>
          <stop offset="100%" style="stop-color:#082a40;stop-opacity:0.6"/>
        </linearGradient>

        <!-- Glass shine -->
        <linearGradient id="glassShine" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:rgba(255,255,255,0.22)"/>
          <stop offset="35%" style="stop-color:rgba(255,255,255,0.06)"/>
          <stop offset="50%" style="stop-color:rgba(255,255,255,0)"/>
          <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
        </linearGradient>

        <!-- Glass edge -->
        <linearGradient id="glassEdge" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:rgba(255,255,255,0.5)"/>
          <stop offset="50%" style="stop-color:rgba(255,255,255,0.1)"/>
          <stop offset="100%" style="stop-color:rgba(255,255,255,0.3)"/>
        </linearGradient>

        <!-- Stone gradient -->
        <radialGradient id="stoneGrad" cx="35%" cy="35%">
          <stop offset="0%" style="stop-color:#8B6914"/>
          <stop offset="50%" style="stop-color:#6B4F0A"/>
          <stop offset="100%" style="stop-color:#4A3000"/>
        </radialGradient>

        <radialGradient id="stoneGrad2" cx="30%" cy="30%">
          <stop offset="0%" style="stop-color:#9B7A1E"/>
          <stop offset="60%" style="stop-color:#7A5A0A"/>
          <stop offset="100%" style="stop-color:#5A3D00"/>
        </radialGradient>

        <radialGradient id="stoneGrad3" cx="40%" cy="35%">
          <stop offset="0%" style="stop-color:#A08830"/>
          <stop offset="55%" style="stop-color:#806818"/>
          <stop offset="100%" style="stop-color:#604500"/>
        </radialGradient>

        <!-- Seaweed gradient -->
        <linearGradient id="weedGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%" style="stop-color:#1a4a1a"/>
          <stop offset="60%" style="stop-color:#2a7a2a"/>
          <stop offset="100%" style="stop-color:#3aaa3a"/>
        </linearGradient>

        <linearGradient id="weedGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%" style="stop-color:#154015"/>
          <stop offset="60%" style="stop-color:#2a6a2a"/>
          <stop offset="100%" style="stop-color:#389838"/>
        </linearGradient>

        <linearGradient id="weedGrad3" x1="0%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%" style="stop-color:#1a501a"/>
          <stop offset="60%" style="stop-color:#2d802d"/>
          <stop offset="100%" style="stop-color:#40b840"/>
        </linearGradient>

        <!-- Fish body gradient -->
        <linearGradient id="fishBodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#FFD700"/>
          <stop offset="40%" style="stop-color:#FFC800"/>
          <stop offset="70%" style="stop-color:#E8A800"/>
          <stop offset="100%" style="stop-color:#CC8800"/>
        </linearGradient>

        <!-- Fish belly gradient -->
        <linearGradient id="fishBellyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#FFE880"/>
          <stop offset="100%" style="stop-color:#FFD050"/>
        </linearGradient>

        <!-- Tail fin gradient -->
        <linearGradient id="tailFinGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#FFB800"/>
          <stop offset="50%" style="stop-color:#E89A00"/>
          <stop offset="100%" style="stop-color:#CC7A00"/>
        </linearGradient>

        <!-- Food gradient -->
        <radialGradient id="foodGrad" cx="35%" cy="35%">
          <stop offset="0%" style="stop-color:#FFE080"/>
          <stop offset="100%" style="stop-color:#D4A030"/>
        </radialGradient>

        <!-- Clip path for tank interior -->
        <clipPath id="tankClip">
          <rect x="4" y="4" width="712" height="512" rx="12"/>
        </clipPath>

        <!-- Fish clip path (for clipping fish to stay inside tank) -->
        <clipPath id="fishClip">
          <rect x="20" y="20" width="680" height="480" rx="8"/>
        </clipPath>

        <!-- Bubble filter -->
        <filter id="bubbleFilter" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="blur"/>
        </filter>
      </defs>

      <!-- Tank background (glass) -->
      <rect x="0" y="0" width="720" height="520" rx="16" fill="url(#glassEdge)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>

      <!-- Water -->
      <rect x="4" y="4" width="712" height="512" rx="12" fill="url(#waterGrad)"/>

      <!-- Light rays in water -->
      <g opacity="0.06">
        <polygon points="200,0 240,0 300,520 180,520" fill="#a0d8ff"/>
        <polygon points="380,0 430,0 520,520 420,520" fill="#a0d8ff"/>
        <polygon points="540,0 580,0 640,520 560,520" fill="#a0d8ff"/>
      </g>

      <!-- Group for tank contents (clipped) -->
      <g clip-path="url(#tankClip)">

        <!-- Sand bottom -->
        <rect x="0" y="460" width="720" height="60" fill="#d4c4a0"/>
        <rect x="0" y="470" width="720" height="50" fill="#c8b890"/>

        <!-- Seaweed -->
        <g id="seaweeds">
          <path id="weed1" d="M60,520 Q55,460 65,400 Q55,350 70,290 Q60,250 72,200"
                stroke="url(#weedGrad1)" stroke-width="8" stroke-linecap="round" fill="none"/>
          <path id="weed2" d="M100,520 Q108,450 95,390 Q108,330 92,280 Q105,230 88,190"
                stroke="url(#weedGrad2)" stroke-width="6" stroke-linecap="round" fill="none"/>
          <path id="weed3" d="M620,520 Q610,460 625,400 Q612,340 630,280 Q618,230 635,180"
                stroke="url(#weedGrad3)" stroke-width="9" stroke-linecap="round" fill="none"/>
          <path id="weed4" d="M660,520 Q670,450 655,390 Q672,330 658,280 Q670,230 652,190"
                stroke="url(#weedGrad1)" stroke-width="5" stroke-linecap="round" fill="none"/>
          <path id="weed5" d="M140,520 Q145,470 138,430 Q148,380 140,340"
                stroke="url(#weedGrad2)" stroke-width="4" stroke-linecap="round" fill="none"/>
          <path id="weed6" d="M580,520 Q572,470 580,420 Q570,380 580,340"
                stroke="url(#weedGrad3)" stroke-width="5" stroke-linecap="round" fill="none"/>
        </g>

        <!-- Stones -->
        <g id="stones">
          <ellipse cx="200" cy="485" rx="35" ry="18" fill="url(#stoneGrad)"/>
          <ellipse cx="280" cy="490" rx="28" ry="15" fill="url(#stoneGrad2)"/>
          <ellipse cx="450" cy="482" rx="40" ry="20" fill="url(#stoneGrad3)"/>
          <ellipse cx="520" cy="488" rx="25" ry="14" fill="url(#stoneGrad)"/>
          <ellipse cx="350" cy="492" rx="22" ry="12" fill="url(#stoneGrad2)"/>
          <ellipse cx="590" cy="485" rx="18" ry="10" fill="url(#stoneGrad3)"/>
          <!-- Stone highlights -->
          <ellipse cx="195" cy="478" rx="8" ry="4" fill="rgba(255,255,255,0.15)"/>
          <ellipse cx="445" cy="475" rx="10" ry="5" fill="rgba(255,255,255,0.12)"/>
          <ellipse cx="275" cy="484" rx="6" ry="3" fill="rgba(255,255,255,0.15)"/>
        </g>

        <!-- Fish container -->
        <g id="fishLayer"></g>

        <!-- Food container -->
        <g id="foodLayer"></g>

        <!-- Bubbles -->
        <g id="bubbles"></g>

      </g>

      <!-- Glass reflection overlay -->
      <rect x="4" y="4" width="712" height="512" rx="12" fill="url(#glassShine)" pointer-events="none"/>

      <!-- Top glass edge highlight -->
      <path d="M16,4 L704,4" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round" pointer-events="none"/>
      <path d="M4,16 L4,504" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round" pointer-events="none"/>

      <!-- Corner glass highlights -->
      <path d="M4,20 Q4,4 20,4" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none" pointer-events="none"/>
      <path d="M716,4 Q700,4 700,20" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" fill="none" pointer-events="none"/>
    </svg>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const TANK_W = 720;
const TANK_H = 520;
const BOUND_L = 30;
const BOUND_R = 690;
const BOUND_T = 40;
const BOUND_B = 440;
const FOOD_SINK_SPEED = 0.4;
const FOOD_COUNT = 6;
const EAT_DISTANCE = 28;

// ==================== STATE ====================
let foods = [];
let fishes = [];
let animationId = null;

// ==================== FISH CLASS ====================
class Fish {
  constructor(id, x, y, size, scale) {
    this.id = id;
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 1.5;
    this.vy = (Math.random() - 0.5) * 1;
    this.size = size;
    this.scale = scale;
    this.facing = 1; // 1 = right, -1 = left
    this.tailPhase = Math.random() * Math.PI * 2;
    this.targetX = null;
    this.targetY = null;
    this.state = 'idle'; // 'idle' | 'chasing' | 'eating'
    this.eatTimer = 0;
    this.baseSpeed = 1.2 + Math.random() * 0.8;
    this.chaseSpeed = 3.5 + Math.random() * 1.5;
    this.wanderTimer = 0;
    this.wanderTarget = { x: x, y: y };

    this.el = this.createFishSVG();
    document.getElementById('fishLayer').appendChild(this.el);
  }

  createFishSVG() {
    const s = this.scale;
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.id = 'fish-' + this.id;
    g.style.transformOrigin = 'center center';

    // --- Tail fin (swings) ---
    this.tailGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    this.tailGroup.id = 'tail-' + this.id;

    // Upper tail lobe
    const upperTail = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    upperTail.setAttribute('d',
      `M ${-s*35} ${0} ` +
      `Q ${-s*70} ${-s*22} ${-s*55} ${-s*45} ` +
      `Q ${-s*40} ${-s*30} ${-s*25} ${-s*15} ` +
      `Q ${-s*18} ${-s*8} ${-s*35} ${0} Z`
    );
    upperTail.setAttribute('fill', 'url(#tailFinGrad)');
    upperTail.setAttribute('opacity', '0.9');

    // Lower tail lobe
    const lowerTail = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    lowerTail.setAttribute('d',
      `M ${-s*35} ${0} ` +
      `Q ${-s*70} ${s*22} ${-s*55} ${s*45} ` +
      `Q ${-s*40} ${s*30} ${-s*25} ${s*15} ` +
      `Q ${-s*18} ${s*8} ${-s*35} ${0} Z`
    );
    lowerTail.setAttribute('fill', 'url(#tailFinGrad)');
    lowerTail.setAttribute('opacity', '0.9');

    // Tail center stripe
    const tailStripe = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    tailStripe.setAttribute('d',
      `M ${-s*35} ${0} L ${-s*55} ${-s*5} L ${-s*52} ${0} L ${-s*55} ${s*5} Z`
    );
    tailStripe.setAttribute('fill', '#CC5500');
    tailStripe.setAttribute('opacity', '0.7');

    this.tailGroup.appendChild(upperTail);
    this.tailGroup.appendChild(lowerTail);
    this.tailGroup.appendChild(tailStripe);

    // --- Body ---
    const body = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    body.setAttribute('d',
      `M ${-s*35} ${0} ` +
      `Q ${-s*15} ${-s*18} ${s*15} ${-s*18} ` +
      `Q ${s*45} ${-s*14} ${s*55} ${0} ` +
      `Q ${s*45} ${s*14} ${s*15} ${s*18} ` +
      `Q ${-s*15} ${s*18} ${-s*35} ${0} Z`
    );
    body.setAttribute('fill', 'url(#fishBodyGrad)');

    // Belly highlight
    const belly = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    belly.setAttribute('d',
      `M ${-s*25} ${s*2} ` +
      `Q ${-s*10} ${s*12} ${s*10} ${s*12} ` +
      `Q ${s*35} ${s*8} ${s*45} ${s*2} ` +
      `Q ${s*35} ${-s*2} ${s*10} ${-s*2} ` +
      `Q ${-s*10} ${-s*2} ${-s*25} ${s*2} Z`
    );
    belly.setAttribute('fill', 'url(#fishBellyGrad)');
    belly.setAttribute('opacity', '0.6');

    // Body stripe
    const stripe = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    stripe.setAttribute('d',
      `M ${-s*5} ${-s*5} Q ${s*10} ${-s*8} ${s*25} ${-s*3} Q ${s*15} ${s*3} ${s*5} ${s*6} Q ${-s*8} ${s*4} ${-s*5} ${-s*5} Z`
    );
    stripe.setAttribute('fill', '#CC5500');
    stripe.setAttribute('opacity', '0.5');

    // --- Dorsal fin ---
    const dorsalFin = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    dorsalFin.setAttribute('d',
      `M ${s*5} ${-s*18} ` +
      `Q ${s*15} ${-s*38} ${s*30} ${-s*30} ` +
      `Q ${s*22} ${-s*20} ${s*12} ${-s*16} Z`
    );
    dorsalFin.setAttribute('fill', '#E8A000');
    dorsalFin.setAttribute('opacity', '0.85');

    // --- Pectoral fin ---
    const pectoralFin = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    pectoralFin.setAttribute('d',
      `M ${s*8} ${s*6} ` +
      `Q ${s*18} ${s*22} ${s*25} ${s*12} ` +
      `Q ${s*18} ${s*8} ${s*8} ${s*6} Z`
    );
    pectoralFin.setAttribute('fill', '#E8A000');
    pectoralFin.setAttribute('opacity', '0.7');

    // --- Pelvic fin ---
    const pelvicFin = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    pelvicFin.setAttribute('d',
      `M ${s*2} ${s*15} Q ${s*8} ${s*28} ${s*14} ${s*18} Q ${s*8} ${s*14} ${s*2} ${s*15} Z`
    );
    pelvicFin.setAttribute('fill', '#D49400');
    pelvicFin.setAttribute('opacity', '0.7');

    // --- Anal fin ---
    const analFin = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    analFin.setAttribute('d',
      `M ${-s*10} ${s*16} Q ${-s*18} ${s*28} ${-s*5} ${s*18} Q ${0} ${s*15} ${-s*10} ${s*16} Z`
    );
    analFin.setAttribute('fill', '#D49400');
    analFin.setAttribute('opacity', '0.7');

    // --- Eye ---
    const eyeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const eyeWhite = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    eyeWhite.setAttribute('cx', s * 38);
    eyeWhite.setAttribute('cy', -s * 5);
    eyeWhite.setAttribute('r', s * 6);
    eyeWhite.setAttribute('fill', '#FFFFFF');
    const eyePupil = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    eyePupil.setAttribute('cx', s * 40);
    eyePupil.setAttribute('cy', -s * 5);
    eyePupil.setAttribute('r', s * 3);
    eyePupil.setAttribute('fill', '#1a1a2e');
    const eyeHighlight = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    eyeHighlight.setAttribute('cx', s * 41);
    eyeHighlight.setAttribute('cy', -s * 7);
    eyeHighlight.setAttribute('r', s * 1.5);
    eyeHighlight.setAttribute('fill', '#FFFFFF');
    eyeGroup.appendChild(eyeWhite);
    eyeGroup.appendChild(eyePupil);
    eyeGroup.appendChild(eyeHighlight);

    // --- Mouth ---
    const mouth = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
    mouth.setAttribute('cx', s * 55);
    mouth.setAttribute('cy', s * 2);
    mouth.setAttribute('rx', s * 2);
    mouth.setAttribute('ry', s * 1.5);
    mouth.setAttribute('fill', '#CC6600');

    // --- Barbels (whiskers) ---
    const barbels = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const b1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    b1.setAttribute('d', `M ${s*52} ${s*3} Q ${s*65} ${s*12} ${s*58} ${s*15}`);
    b1.setAttribute('stroke', '#CC6600');
    b1.setAttribute('stroke-width', s * 1);
    b1.setAttribute('fill', 'none');
    b1.setAttribute('opacity', '0.7');
    const b2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    b2.setAttribute('d', `M ${s*52} ${s*4} Q ${s*62} ${s*18} ${s*54} ${s*20}`);
    b2.setAttribute('stroke', '#CC6600');
    b2.setAttribute('stroke-width', s * 0.8);
    b2.setAttribute('fill', 'none');
    b2.setAttribute('opacity', '0.6');
    barbels.appendChild(b1);
    barbels.appendChild(b2);

    // --- Scales pattern ---
    const scales = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    scales.setAttribute('opacity', '0.15');
    for (let i = 0; i < 4; i++) {
      const sx = -s * 20 + i * s * 12;
      const scale = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
      scale.setAttribute('cx', sx);
      scale.setAttribute('cy', -s * 4);
      scale.setAttribute('rx', s * 5);
      scale.setAttribute('ry', s * 8);
      scale.setAttribute('fill', 'none');
      scale.setAttribute('stroke', '#FFF8DC');
      scale.setAttribute('stroke-width', s * 0.5);
      scales.appendChild(scale);
    }

    // Assemble
    g.appendChild(this.tailGroup);
    g.appendChild(body);
    g.appendChild(belly);
    g.appendChild(scales);
    g.appendChild(stripe);
    g.appendChild(dorsalFin);
    g.appendChild(analFin);
    g.appendChild(pectoralFin);
    g.appendChild(pelvicFin);
    g.appendChild(eyeGroup);
    g.appendChild(mouth);
    g.appendChild(barbels);

    return g;
  }

  update(dt) {
    this.tailPhase += dt * 8;

    // Check if chasing a food target
    if (this.state === 'chasing') {
      const dx = this.targetX - this.x;
      const dy = this.targetY - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < EAT_DISTANCE) {
        // Eat the food
        this.state = 'eating';
        this.eatTimer = 0;
        this.eatFood();
      } else {
        // Chase
        const speed = this.chaseSpeed;
        this.vx = (dx / dist) * speed;
        this.vy = (dy / dist) * speed;
      }
    } else if (this.state === 'eating') {
      this.eatTimer += dt;
      this.vx *= 0.85;
      this.vy *= 0.85;
      if (this.eatTimer > 0.8) {
        this.state = 'idle';
        this.targetX = null;
        this.targetY = null;
      }
    } else {
      // Idle wandering
      this.wanderTimer += dt;
      if (this.wanderTimer > 3 + Math.random() * 4) {
        this.wanderTimer = 0;
        this.wanderTarget = {
          x: BOUND_L + Math.random() * (BOUND_R - BOUND_L),
          y: BOUND_T + Math.random() * (BOUND_B - BOUND_T)
        };
      }

      const dx = this.wanderTarget.x - this.x;
      const dy = this.wanderTarget.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > 5) {
        const speed = this.baseSpeed;
        this.vx += (dx / dist) * speed * 0.03;
        this.vy += (dy / dist) * speed * 0.03;
      }

      // Gentle random movement
      this.vx += (Math.random() - 0.5) * 0.08;
      this.vy += (Math.random() - 0.5) * 0.05;

      // Speed limit
      const maxSpeed = this.baseSpeed * 1.2;
      const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
      if (currentSpeed > maxSpeed) {
        this.vx = (this.vx / currentSpeed) * maxSpeed;
        this.vy = (this.vy / currentSpeed) * maxSpeed;
      }

      // Damping
      this.vx *= 0.995;
      this.vy *= 0.995;
    }

    // Update position
    this.x += this.vx;
    this.y += this.vy;

    // Boundary bounce
    const margin = 40 * this.scale;
    if (this.x < BOUND_L + margin) { this.x = BOUND_L + margin; this.vx = Math.abs(this.vx) * 0.6; }
    if (this.x > BOUND_R - margin) { this.x = BOUND_R - margin; this.vx = -Math.abs(this.vx) * 0.6; }
    if (this.y < BOUND_T + margin) { this.y = BOUND_T + margin; this.vy = Math.abs(this.vy) * 0.6; }
    if (this.y > BOUND_B - margin) { this.y = BOUND_B - margin; this.vy = -Math.abs(this.vy) * 0.6; }

    // Update facing direction
    if (Math.abs(this.vx) > 0.1) {
      this.facing = this.vx > 0 ? 1 : -1;
    }

    // Apply transforms
    const tailSwing = Math.sin(this.tailPhase) * 15;
    this.tailGroup.style.transform = `rotate(${tailSwing}deg)`;
    this.el.style.transform = `translate(${this.x}px, ${this.y}px) scaleX(${this.facing})`;
  }

  eatFood() {
    // Find and remove nearest food
    let nearestIdx = -1;
    let nearestDist = Infinity;
    for (let i = 0; i < foods.length; i++) {
      const dx = foods[i].x - this.x;
      const dy = foods[i].y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < nearestDist) {
        nearestDist = dist;
        nearestIdx = i;
      }
    }
    if (nearestIdx >= 0) {
      const food = foods[nearestIdx];
      if (food.el && food.el.parentNode) {
        food.el.parentNode.removeChild(food.el);
      }
      foods.splice(nearestIdx, 1);
    }
  }

  chaseFood(x, y) {
    if (this.state !== 'eating') {
      this.state = 'chasing';
      this.targetX = x;
      this.targetY = y;
    }
  }
}

// ==================== FOOD CLASS ====================
class Food {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.vy = FOOD_SINK_SPEED + Math.random() * 0.3;
    this.drift = (Math.random() - 0.5) * 0.3;
    this.eaten = false;

    this.el = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
    this.el.setAttribute('rx', 3.5);
    this.el.setAttribute('ry', 2.5);
    this.el.setAttribute('fill', 'url(#foodGrad)');
    this.el.setAttribute('opacity', '0.9');

    // Add glow
    const glow = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
    glow.setAttribute('rx', 5);
    glow.setAttribute('ry', 3.5);
    glow.setAttribute('fill', 'rgba(255, 220, 100, 0.2)');
    glow.setAttribute('filter', 'blur(1px)');

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.appendChild(glow);
    g.appendChild(this.el);
    g.id = 'food-' + Math.random().toString(36).substr(2, 9);

    document.getElementById('foodLayer').appendChild(g);
    this.container = g;
  }

  update(dt) {
    this.y += this.vy;
    this.x += this.drift;
    this.drift += (Math.random() - 0.5) * 0.1;
    this.drift = Math.max(-0.5, Math.min(0.5, this.drift));

    this.container.style.transform = `translate(${this.x}px, ${this.y}px)`;

    // Stop at bottom sand
    if (this.y > 475) {
      this.y = 475;
      this.vy = 0;
    }

    return this.y < 475;
  }

  remove() {
    if (this.container && this.container.parentNode) {
      this.container.parentNode.removeChild(this.container);
    }
  }
}

// ==================== BUBBLE SYSTEM ====================
const bubbles = [];
let bubbleTimer = 0;

function spawnBubble() {
  const x = 50 + Math.random() * (TANK_W - 100);
  const r = 1.5 + Math.random() * 4;
  const bubble = {
    x, y: 480 + Math.random() * 20, r,
    vx: (Math.random() - 0.5) * 0.3,
    vy: -(0.5 + Math.random() * 1.5),
    wobble: Math.random() * Math.PI * 2
  };

  const el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  el.setAttribute('cx', 0);
  el.setAttribute('cy', 0);
  el.setAttribute('r', bubble.r);
  el.setAttribute('fill', 'rgba(180, 220, 255, 0.25)');
  el.setAttribute('stroke', 'rgba(200, 235, 255, 0.4)');
  el.setAttribute('stroke-width', '0.5');
  el.style.transform = `translate(${bubble.x}px, ${bubble.y}px)`;

  document.getElementById('bubbles').appendChild(el);
  bubble.el = el;
  bubbles.push(bubble);
}

function updateBubbles(dt) {
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.wobble += dt * 3;
    b.x += b.vx + Math.sin(b.wobble) * 0.3;
    b.y += b.vy;
    b.el.style.transform = `translate(${b.x}px, ${b.y}px)`;

    if (b.y < 30) {
      if (b.el.parentNode) b.el.parentNode.removeChild(b.el);
      bubbles.splice(i, 1);
    }
  }

  bubbleTimer += dt;
  if (bubbleTimer > 0.8 + Math.random() * 1.5) {
    bubbleTimer = 0;
    if (Math.random() > 0.3) spawnBubble();
  }
}

// ==================== SEAWEED ANIMATION ====================
let weedTime = 0;
function animateSeaweed(dt) {
  weedTime += dt;
  const weeds = document.querySelectorAll('[id^="weed"]');
  weeds.forEach((weed, i) => {
    const phase = weedTime * 1.5 + i * 0.7;
    const sway = Math.sin(phase) * 3;
    weed.style.transform = `rotate(${sway}deg)`;
    weed.style.transformOrigin = 'bottom center';
  });
}

// ==================== FOOD DROP ====================
function dropFood(clickX, clickY) {
  // Drop FOOD_COUNT pellets spread around click point
  for (let i = 0; i < FOOD_COUNT; i++) {
    const offsetX = (Math.random() - 0.5) * 40;
    const offsetY = (Math.random() - 0.5) * 20;
    const food = new Food(clickX + offsetX, Math.max(30, clickY + offsetY));
    foods.push(food);
  }

  // Tell fish to chase
  fishes.forEach(fish => {
    if (fish.state !== 'eating') {
      // Each fish targets a different food
      const foodIdx = fishes.indexOf(fish) % Math.min(foods.length, 2);
      if (foods[foodIdx]) {
        fish.chaseFood(foods[foodIdx].x, foods[foodIdx].y);
      }
    }
  });
}

// ==================== MAIN LOOP ====================
let lastTime = 0;

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;

  // Update fish
  fishes.forEach(fish => fish.update(dt));

  // Update food
  for (let i = foods.length - 1; i >= 0; i--) {
    if (!foods[i].update(dt)) {
      foods[i].remove();
      foods.splice(i, 1);
    }
  }

  // If fish is chasing but its target food was eaten by another fish, re-target
  fishes.forEach(fish => {
    if (fish.state === 'chasing') {
      let hasTarget = false;
      for (const food of foods) {
        const dx = food.x - fish.targetX;
        const dy = food.y - fish.targetY;
        if (Math.sqrt(dx*dx + dy*dy) < 20) {
          hasTarget = true;
          break;
        }
      }
      if (!hasTarget && foods.length > 0) {
        // Find nearest remaining food
        let nearest = null;
        let nearestDist = Infinity;
        for (const food of foods) {
          const dx = food.x - fish.x;
          const dy = food.y - fish.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < nearestDist) {
            nearestDist = dist;
            nearest = food;
          }
        }
        if (nearest) {
          fish.targetX = nearest.x;
          fish.targetY = nearest.y;
        }
      }
      if (foods.length === 0) {
        fish.state = 'idle';
        fish.targetX = null;
        fish.targetY = null;
      }
    }
  });

  // Update bubbles and seaweed
  updateBubbles(dt);
  animateSeaweed(dt);

  animationId = requestAnimationFrame(gameLoop);
}

// ==================== INIT ====================
function init() {
  // Create two koi fish
  const bigFish = new Fish('big', 300, 200, 'large', 1.6);
  const smallFish = new Fish('small', 450, 300, 'small', 1.0);
  fishes.push(bigFish, smallFish);

  // Click handler
  document.getElementById('tank').addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const scaleX = 720 / rect.width;
    const scaleY = 520 / rect.height;
    const clickX = (e.clientX - rect.left) * scaleX;
    const clickY = (e.clientY - rect.top) * scaleY;

    // Only drop food if inside the water area
    if (clickX > 20 && clickX < 700 && clickY > 20 && clickY < 480) {
      dropFood(clickX, clickY);
    }
  });

  // Start animation loop
  lastTime = 0;
  animationId = requestAnimationFrame(gameLoop);
}

init();
</script>
