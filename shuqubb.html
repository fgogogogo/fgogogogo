<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时区地图工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a1628;
    color: #e0e7ff;
    min-height: 100vh;
  }
  .header {
    text-align: center;
    padding: 16px;
    background: linear-gradient(135deg, #1a2744, #0d1b2a);
    border-bottom: 1px solid rgba(100, 150, 255, 0.2);
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
  }
  .header p {
    font-size: 13px;
    color: #8fa3c7;
    margin-top: 4px;
  }
  .layout {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 12px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (min-width: 900px) {
    .layout { flex-direction: row; align-items: flex-start; }
  }
  .map-section {
    flex: 1;
    min-width: 0;
  }
  .map-container {
    background: #0d1f3c;
    border-radius: 12px;
    border: 1px solid rgba(100, 150, 255, 0.15);
    overflow: hidden;
    position: relative;
  }
  #map {
    width: 100%;
    height: auto;
    display: block;
  }
  .city-dot {
    cursor: pointer;
    transition: all 0.2s;
  }
  .city-dot:hover { r: 6; fill: #fbbf24; }
  .city-dot.selected { r: 7; fill: #34d399; stroke: #fff; stroke-width: 1.5; }
  .city-label {
    font-size: 9px;
    fill: #94a3b8;
    pointer-events: none;
    opacity: 0.8;
  }
  .panel {
    width: 100%;
    max-width: 360px;
    background: #0d1f3c;
    border-radius: 12px;
    border: 1px solid rgba(100, 150, 255, 0.15);
    padding: 16px;
  }
  @media (min-width: 900px) {
    .panel { position: sticky; top: 12px; }
  }
  .panel-title {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title span {
    font-size: 11px;
    color: #64748b;
    font-weight: 400;
  }
  .clear-btn {
    background: #ef4444;
    color: #fff;
    border: none;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .clear-btn:hover { background: #dc2626; }
  .search-box {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid rgba(100, 150, 255, 0.2);
    border-radius: 8px;
    background: #1a2744;
    color: #e0e7ff;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
  }
  .search-box:focus { border-color: #3b82f6; }
  .search-box::placeholder { color: #64748b; }
  .city-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 60vh;
    overflow-y: auto;
  }
  .city-card {
    background: linear-gradient(135deg, #1a2744, #162033);
    border: 1px solid rgba(100, 150, 255, 0.1);
    border-radius: 10px;
    padding: 12px;
    position: relative;
    transition: border-color 0.2s;
  }
  .city-card:hover { border-color: rgba(100, 150, 255, 0.3); }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .card-city {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
  }
  .card-country {
    font-size: 12px;
    color: #64748b;
  }
  .card-time {
    font-size: 28px;
    font-weight: 700;
    color: #60a5fa;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
  }
  .card-date {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 2px;
  }
  .card-info {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .card-info-item {
    font-size: 11px;
    color: #94a3b8;
  }
  .card-info-item strong { color: #60a5fa; }
  .card-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: #64748b;
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .card-remove:hover { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #64748b;
    font-size: 14px;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .diff-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .diff-ahead { background: rgba(52, 211, 153, 0.15); color: #34d399; }
  .diff-behind { background: rgba(251, 146, 60, 0.15); color: #fb923c; }
  .diff-same { background: rgba(100, 116, 139, 0.15); color: #94a3b8; }
  .night-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-left: 6px;
    vertical-align: middle;
  }
  .night { background: #1e3a5f; box-shadow: 0 0 4px #1e3a5f; }
  .day { background: #fbbf24; box-shadow: 0 0 4px #fbbf24; }
  .sunrise { background: linear-gradient(135deg, #fb923c, #fbbf24); }
  .sunset { background: linear-gradient(135deg, #ef4444, #fb923c); }
  .city-list::-webkit-scrollbar { width: 4px; }
  .city-list::-webkit-scrollbar-track { background: transparent; }
  .city-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  .my-time-section {
    background: linear-gradient(135deg, #1e3a8a, #1e293b);
    border: 1px solid rgba(59, 130, 246, 0.3);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .my-time-label {
    font-size: 12px;
    color: #93c5fd;
    margin-bottom: 4px;
  }
  .my-time {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }
  .my-time-date {
    font-size: 12px;
    color: #93c5fd;
  }
  .time-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-top: 12px;
  }
  .time-cell {
    background: #1a2744;
    border: 1px solid rgba(100, 150, 255, 0.1);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .time-cell-name {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .time-cell-time {
    font-size: 18px;
    font-weight: 700;
    color: #60a5fa;
    font-variant-numeric: tabular-nums;
  }
  .time-cell-daynight {
    font-size: 10px;
    color: #64748b;
    margin-top: 2px;
  }
  .search-dropdown {
    position: absolute;
    background: #1a2744;
    border: 1px solid rgba(59, 130, 246, 0.3);
    border-radius: 8px;
    z-index: 100;
    max-height: 240px;
    overflow-y: auto;
    width: calc(100% - 2px);
    margin-top: 4px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
  }
  .search-dropdown::-webkit-scrollbar { width: 4px; }
  .search-dropdown::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
</style>
</head>
<body>
  <div class="header">
    <h1>🌍 时区地图工具</h1>
    <p>点击地图上的城市圆点，或使用搜索添加城市进行时区对比</p>
  </div>

  <div class="layout">
    <div class="map-section">
      <div class="map-container">
        <svg id="map" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>

    <div class="panel">
      <div class="my-time-section">
        <div class="my-time-label">我的本地时间</div>

        <div class="my-time-date" id="myDate">----年--月--日 星期-</div>
      </div>

      <div class="panel-title">
        已选城市 <span id="cityCount">(0)</span>
        <button class="clear-btn" id="clearAll" style="display:none;">清空全部</button>
      </div>
      <div style="position:relative;">
        <input class="search-box" id="searchBox" placeholder="搜索城市名称..." />
      </div>
      <div class="city-list" id="cityList">
        <div class="empty-state">
          <div class="icon">🕐</div>
          点击地图上的城市圆点开始添加
        </div>
      </div>
    </div>
  </div>

  return ((lon + 180) / 360) * 1000;
}
function latToY(lat) {
  return ((90 - lat) / 180) * 500;
}

// ========== 状态 ==========
let selectedCities = [];

// ========== 渲染地图 ==========
function renderMap() {
  const mapEl = document.getElementById('map');
  let svg = getWorldMapSVG();

  // 渲染城市圆点
  CITIES.forEach(city => {
    const x = lonToX(city.lon);
    const y = latToY(city.lat);
    const isSelected = selectedCities.some(c => c.id === city.id);
    svg += `
    <g class="city-dot-group" data-city="${city.id}">
      <circle class="city-dot ${isSelected ? 'selected' : ''}" cx="${x}" cy="${y}" r="4"
        fill="${isSelected ? '#34d399' : '#60a5fa'}" stroke="${isSelected ? '#fff' : 'transparent'}"
        stroke-width="${isSelected ? 1.5 : 0}" data-city="${city.id}" />
      <text class="city-label" x="${x + 6}" y="${y + 3}" data-city="${city.id}">${city.name}</text>
    </g>`;
  });

  mapEl.innerHTML = svg;

  // 绑定点击事件
  mapEl.querySelectorAll('.city-dot').forEach(dot => {
    dot.addEventListener('click', (e) => {
      const cityId = e.target.dataset.city;
      toggleCity(cityId);
    });
  });
}

// ========== 切换城市选中状态 ==========
function toggleCity(cityId) {
  const city = CITIES.find(c => c.id === cityId);
  if (!city) return;

  const idx = selectedCities.findIndex(c => c.id === cityId);
  if (idx >= 0) {
    selectedCities.splice(idx, 1);
  } else {
    selectedCities.push(city);
  }

  renderMap();
  renderCityList();
}

// ========== 移除城市 ==========
function removeCity(cityId) {
  selectedCities = selectedCities.filter(c => c.id !== cityId);
  renderMap();
  renderCityList();
}

// ========== 清空所有 ==========
function clearAll() {
  selectedCities = [];
  renderMap();
  renderCityList();
}

// ========== 获取时区时间 ==========
function getTimeInZone(tz) {
  try {
    return new Date().toLocaleString('zh-CN', { timeZone: tz });
  } catch {
    return '--';
  }
}

function getTimeParts(tz) {
  const now = new Date();
  try {
    const opts = { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    const time = now.toLocaleTimeString('zh-CN', opts);
    const dateOpts = { timeZone: tz, year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
    const date = now.toLocaleDateString('zh-CN', dateOpts);
    const hour = parseInt(time.split(':')[0]);
    const offsetStr = getTZOffset(tz);
    const utcOffset = getUTCOffsetHours(tz);
    return { time, date, hour, offsetStr, utcOffset };
  } catch {
    return { time: '--:--:--', date: '', hour: 0, offsetStr: '', utcOffset: 0 };
  }
}

// ========== 时区偏移 ==========
function getTZOffset(tz) {
  try {
    const now = new Date();
    const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
    const tzDate = new Date(now.toLocaleString('en-US', { timeZone: tz }));
    const diffMs = tzDate - utcDate;
    const diffHours = diffMs / (1000 * 60 * 60);
    const sign = diffHours >= 0 ? '+' : '';
    return `UTC${sign}${diffHours}`;
  } catch {
    return '';
  }
}

function getUTCOffsetHours(tz) {
  try {
    const now = new Date();
    const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
    const tzDate = new Date(now.toLocaleString('en-US', { timeZone: tz }));
    return (tzDate - utcDate) / (1000 * 60 * 60);
  } catch {
    return 0;
  }
}

// ========== 日夜判断 ==========
function getDayNightStatus(tz) {
  const { hour } = getTimeParts(tz);
  if (hour >= 6 && hour < 8) return { cls: 'sunrise', label: '日出' };
  if (hour >= 8 && hour < 18) return { cls: 'day', label: '白天' };
  if (hour >= 18 && hour < 20) return { cls: 'sunset', label: '日落' };
  return { cls: 'night', label: '夜晚' };
}

// ========== 时差计算 ==========
function getTimeDiff(tz1, tz2) {
  const offset1 = getUTCOffsetHours(tz1);
  const offset2 = getUTCOffsetHours(tz2);
  const diff = offset2 - offset1;
  if (Math.abs(diff) < 0.01) return { label: '相同', cls: 'diff-same' };
  const sign = diff > 0 ? '快' : '慢';
  const absH = Math.abs(diff);
  const m = Math.round((absH % 1) * 60);
  let text = `${sign} ${Math.floor(absH)}小时`;
  if (m > 0) text += `${m}分钟`;
  return { label: text, cls: diff > 0 ? 'diff-ahead' : 'diff-behind' };
}

// ========== 渲染城市列表 ==========
function renderCityList() {
  const listEl = document.getElementById('cityList');
  const countEl = document.getElementById('cityCount');
  const clearBtn = document.getElementById('clearAll');

  countEl.textContent = `(${selectedCities.length})`;
  clearBtn.style.display = selectedCities.length > 0 ? 'inline' : 'none';

  if (selectedCities.length === 0) {
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="icon">🕐</div>
        点击地图上的城市圆点开始添加
      </div>`;
    return;
  }

  const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const localOffset = getUTCOffsetHours(localTz);

  listEl.innerHTML = selectedCities.map(city => {
    const parts = getTimeParts(city.tz);
    const dayNight = getDayNightStatus(city.tz);
    const timeDiff = getTimeDiff(localTz, city.tz);
    return `
    <div class="city-card" data-city-id="${city.id}">
      <button class="card-remove" onclick="removeCity('${city.id}')">&times;</button>
      <div class="card-header">
        <div>
          <span class="card-city">${city.name}</span>
          <span class="card-country">${city.country}</span>
        </div>
        <span class="diff-tag ${timeDiff.cls}">${timeDiff.label}</span>
      </div>
      <div class="card-time">${parts.time}</div>
      <div class="card-date">${parts.date}</div>
      <div class="card-info">
        <span class="card-info-item"><strong>时区</strong> ${parts.offsetStr}</span>
        <span class="card-info-item"><strong>日夜</strong> ${dayNight.label}</span>
        <span class="card-info-item"><span class="night-indicator ${dayNight.cls}"></span></span>
      </div>
    </div>`;
  }).join('');
}

// ========== 更新我的时间 ==========
function updateMyTime() {
  const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const now = new Date();
  const timeOpts = { timeZone: localTz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
  const dateOpts = { timeZone: localTz, year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
  document.getElementById('myTime').textContent = now.toLocaleTimeString('zh-CN', timeOpts);
  document.getElementById('myDate').textContent = now.toLocaleDateString('zh-CN', dateOpts);
}

// ========== 搜索功能 ==========
const searchBox = document.getElementById('searchBox');
let searchResults = [];

searchBox.addEventListener('input', (e) => {
  const query = e.target.value.trim().toLowerCase();
  if (!query) {
    document.querySelectorAll('.search-dropdown').forEach(d => d.remove());
    return;
  }
  const results = CITIES.filter(c =>
    c.name.includes(query) || c.nameEn.toLowerCase().includes(query) || c.country.includes(query)
  ).slice(0, 8);

  // 移除旧的下拉
  document.querySelectorAll('.search-dropdown').forEach(d => d.remove());

  if (results.length === 0) return;

  const dropdown = document.createElement('div');
  dropdown.className = 'search-dropdown';
  dropdown.innerHTML = results.map(c => `
    <div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid rgba(100,150,255,0.05);font-size:13px;"
      onmouseover="this.style.background='#0d1f3c'" onmouseout="this.style.background=''"
      onclick="addCityFromSearch('${c.id}')">
      <span style="color:#fff;font-weight:500;">${c.name}</span>
      <span style="color:#64748b;margin-left:4px;">${c.country}</span>
      <span style="color:#60a5fa;margin-left:4px;font-size:11px;">${c.tz.split('/').pop().replace(/_/g, ' ')}</span>
    </div>
  `).join('');
  searchBox.parentElement.appendChild(dropdown);
});

searchBox.addEventListener('blur', () => {
  setTimeout(() => document.querySelectorAll('.search-dropdown').forEach(d => d.remove()), 200);
});

function addCityFromSearch(cityId) {
  const city = CITIES.find(c => c.id === cityId);
  if (city && !selectedCities.some(c => c.id === cityId)) {
    selectedCities.push(city);
    renderMap();
    renderCityList();
  }
  searchBox.value = '';
  document.querySelectorAll('.search-dropdown').forEach(d => d.remove());
}

// ========== 定时器 ==========
function tick() {
  updateMyTime();
  if (selectedCities.length > 0) {
    // 只更新时间文本，不重新渲染整个列表
    document.querySelectorAll('.city-card').forEach(card => {
      const cityId = card.dataset.cityId;
      const city = selectedCities.find(c => c.id === cityId);
      if (city) {
        const parts = getTimeParts(city.tz);
        const timeEl = card.querySelector('.card-time');
        const dateEl = card.querySelector('.card-date');
        if (timeEl) timeEl.textContent = parts.time;
        if (dateEl) dateEl.textContent = parts.date;

        // 更新日夜指示
        const dayNight = getDayNightStatus(city.tz);
        const indicator = card.querySelector('.night-indicator');
        const labelEl = card.querySelector('.card-info-item:nth-child(2)');
        if (indicator) indicator.className = `night-indicator ${dayNight.cls}`;
        if (labelEl) labelEl.innerHTML = `<strong>日夜</strong> ${dayNight.label}`;

        // 更新时差
        const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const timeDiff = getTimeDiff(localTz, city.tz);
        const diffTag = card.querySelector('.diff-tag');
        if (diffTag) {
          diffTag.className = `diff-tag ${timeDiff.cls}`;
          diffTag.textContent = timeDiff.label;
        }
      }
    });
  }
}

// ========== 初始化 ==========
document.getElementById('clearAll').addEventListener('click', clearAll);

renderMap();
renderCityList();
updateMyTime();
setInterval(tick, 1000);

</script>
